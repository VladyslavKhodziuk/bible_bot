# Пул молитв на каждый день (365 дней).
# Поля:
#   id     — стабильный slug темы и номера дня
#   title  — короткий заголовок молитвы на 4 языках
#   text   — собственно текст молитвы на 4 языках (около 150 символов)
#   ref    — ссылка на стих «abbrev:chapter:verse»

- id: gratitude_praise_01
  ref: ps:100:4
  title:
    ru: Вход с хвалой
    en: Entrance with Praise
    es: Entrada con Alabanza
    uk: Вхід з хвалою
  text:
    ru: Господь, благодарю Тебя за новый день и за возможность войти в Твои врата
      с хвалой. Мое сердце наполняется радостью от Твоего присутствия.
    en: Lord, I thank You for this new day and the chance to enter Your gates with
      praise. My heart overflows with joy in Your presence.
    es: Señor, te agradezco por este nuevo día y la oportunidad de entrar por Tus
      puertas con alabanza. Mi corazón se llena de alegría en Tu presencia.
    uk: Господи, дякую Тобі за новий день і можливість увійти в Твої ворота з хвалою.
      Моє серце сповнюється радістю від Твоєї присутності.
- id: gratitude_praise_02
  ref: ph:4:6
  title:
    ru: Благодарность во всем
    en: Gratitude in Everything
    es: Gratitud en Todo
    uk: Вдячність у всьому
  text:
    ru: Отче, учусь приносить Тебе все мои заботы с благодарностью. Помоги мне доверять
      Твоей мудрости и видеть Твою руку в каждой ситуации.
    en: Father, I learn to bring all my concerns to You with thanksgiving. Help me
      trust Your wisdom and see Your hand in every situation.
    es: Padre, aprendo a traerte todas mis preocupaciones con gratitud. Ayúdame a
      confiar en Tu sabiduría y a ver Tu mano en cada situación.
    uk: Отче, вчуся приносити Тобі всі мої турботи з вдячністю. Допоможи мені довіряти
      Твоїй мудрості та бачити Твою руку в кожній ситуації.
- id: gratitude_praise_03
  ref: cl:3:17
  title:
    ru: Жизнь во Христе
    en: Life in Christ
    es: Vida en Cristo
    uk: Життя у Христі
  text:
    ru: Боже, пусть каждое мое слово и дело будет во имя Иисуса, принося Тебе славу
      и благодарность. Хочу жить так, чтобы это радовало Тебя.
    en: God, may every word and deed of mine be in Jesus' name, bringing You glory
      and thanks. I want to live in a way that pleases You.
    es: Dios, que cada palabra y obra mía sea en el nombre de Jesús, trayéndote gloria
      y gratitud. Quiero vivir de una manera que te agrade.
    uk: Боже, нехай кожне моє слово і діло буде в ім'я Ісуса, приносячи Тобі славу
      і вдячність. Хочу жити так, щоб це радувало Тебе.
- id: gratitude_praise_04
  ref: 1ts:5:18
  title:
    ru: Благодарность всегда
    en: Always Giving Thanks
    es: Siempre Agradecido
    uk: Завжди вдячний
  text:
    ru: Владыка, научи меня быть благодарным во всех обстоятельствах. Помоги мне видеть
      Твою благость даже в трудностях и находить повод для хвалы.
    en: Sovereign Lord, teach me to be thankful in all circumstances. Help me see
      Your goodness even in difficulties and find reason for praise.
    es: Señor Soberano, enséñame a ser agradecido en todas las circunstancias. Ayúdame
      a ver Tu bondad incluso en las dificultades y a encontrar motivos para alabarte.
    uk: Владико, навчи мене бути вдячним у всіх обставинах. Допоможи мені бачити Твою
      доброту навіть у труднощах і знаходити привід для хвали.
- id: gratitude_praise_05
  ref: ps:9:1
  title:
    ru: Всем сердцем
    en: With All My Heart
    es: Con Todo Mi Corazón
    uk: Усім серцем
  text:
    ru: Господь, я буду славить Тебя всем моим сердцем и рассказывать о всех Твоих
      чудесных делах. Ты достоин всей хвалы и поклонения.
    en: Lord, I will praise You with all my heart and tell of all Your wonderful deeds.
      You are worthy of all praise and worship.
    es: Señor, te alabaré con todo mi corazón y contaré todas Tus obras maravillosas.
      Eres digno de toda alabanza y adoración.
    uk: Господи, я буду славити Тебе всім моїм серцем і розповідати про всі Твої чудесні
      діла. Ти гідний всієї хвали і поклоніння.
- id: gratitude_praise_06
  ref: ps:107:1
  title:
    ru: Благодарность за доброту
    en: Thanks for Goodness
    es: Gracias por la bondad
    uk: Подяка за доброту
  text:
    ru: Господи, благодарю Тебя за Твою безграничную доброту и вечную милость, которые
      наполняют каждый мой день. Ты так благ ко мне!
    en: Lord, I thank You for Your boundless goodness and eternal mercy that fill
      my every day. You are so good to me!
    es: Señor, Te agradezco Tu bondad ilimitada y Tu misericordia eterna que llenan
      cada uno de mis días. ¡Eres tan bueno conmigo!
    uk: Господи, дякую Тобі за Твою безмежну доброту і вічну милість, що наповнюють
      кожен мій день. Ти такий добрий до мене!
- id: gratitude_praise_07
  ref: lm:3:22
  title:
    ru: Хвала за верность
    en: Praise for Faithfulness
    es: Alabanza por la fidelidad
    uk: Хвала за вірність
  text:
    ru: Отец, хвалю Тебя за Твою непоколебимую верность. Твои милости не истощаются,
      и благодаря Тебе я существую. Благодарю за всё!
    en: Father, I praise You for Your unwavering faithfulness. Your mercies never
      cease, and because of You, I exist. Thank You for everything!
    es: Padre, Te alabo por Tu fidelidad inquebrantable. Tus misericordias nunca terminan,
      y gracias a Ti existo. ¡Gracias por todo!
    uk: Отче, хвалю Тебе за Твою непохитну вірність. Твої милості не вичерпуються,
      і завдяки Тобі я існую. Дякую за все!
- id: gratitude_praise_08
  ref: ph:4:19
  title:
    ru: Благодарность за обеспечение
    en: Thanks for Provision
    es: Gracias por la provisión
    uk: Подяка за забезпечення
  text:
    ru: Мой Бог, благодарю Тебя за то, что Ты восполняешь всякую мою нужду. Твои богатства
      в славе Христом Иисусом бесконечны. Хвала Тебе!
    en: My God, I thank You for supplying all my needs. Your riches in glory through
      Christ Jesus are endless. Praise You!
    es: Dios mío, Te agradezco por suplir todas mis necesidades. Tus riquezas en gloria
      por Cristo Jesús son infinitas. ¡Alabado seas!
    uk: Мій Боже, дякую Тобі за те, що Ти задовольняєш усі мої потреби. Твої багатства
      в славі Христом Ісусом нескінченні. Хвала Тобі!
- id: gratitude_praise_09
  ref: 1jo:4:10
  title:
    ru: Благодарность за любовь
    en: Thanks for Love
    es: Gracias por el amor
    uk: Подяка за любов
  text:
    ru: Боже, благодарю Тебя за Твою совершенную любовь, которая спасла меня. Это
      не я возлюбил Тебя, а Ты возлюбил меня первым. Слава Тебе!
    en: God, I thank You for Your perfect love that saved me. It was not I who loved
      You, but You who loved me first. Glory to You!
    es: Dios, Te agradezco por Tu amor perfecto que me salvó. No fui yo quien Te amó,
      sino Tú quien me amó primero. ¡Gloria a Ti!
    uk: Боже, дякую Тобі за Твою досконалу любов, що врятувала мене. Це не я полюбив
      Тебе, а Ти полюбив мене першим. Слава Тобі!
- id: gratitude_praise_10
  ref: prv:3:5
  title:
    ru: Хвала за мудрость
    en: Praise for Wisdom
    es: Alabanza por la sabiduría
    uk: Хвала за мудрість
  text:
    ru: Господи, хвалю Тебя за Твою бесконечную мудрость. Помоги мне доверять Тебе
      всем сердцем и не полагаться на своё понимание. Веди меня!
    en: Lord, I praise You for Your infinite wisdom. Help me trust You with all my
      heart and not lean on my own understanding. Guide me!
    es: Señor, Te alabo por Tu sabiduría infinita. Ayúdame a confiar en Ti de todo
      corazón y no apoyarme en mi propio entendimiento. ¡Guíame!
    uk: Господи, хвалю Тебе за Твою нескінченну мудрість. Допоможи мені довіряти Тобі
      всім серцем і не покладатися на своє розуміння. Веди мене!
- id: gratitude_praise_11
  ref: ps:100:4
  title:
    ru: Радостная хвала
    en: Joyful Praise
    es: Alabanza Gozosa
    uk: Радісна хвала
  text:
    ru: Господи, я вхожу в Твои врата с благодарностью и в Твои дворы с хвалой. Славлю
      и благословляю Твое святое имя за Твою безмерную доброту.
    en: Lord, I enter Your gates with thanksgiving and Your courts with praise. I
      glorify and bless Your holy name for Your immeasurable goodness.
    es: Señor, entro por Tus puertas con acción de gracias y por Tus atrios con alabanza.
      Glorifico y bendigo Tu santo nombre por Tu bondad inmensurable.
    uk: Господи, я входжу в Твої ворота з вдячністю і в Твої двори з хвалою. Славитиму
      й благословлятиму Твоє святе ім'я за Твою безмірну доброту.
- id: gratitude_praise_12
  ref: ph:4:6
  title:
    ru: Благодарность в молитве
    en: Thanksgiving in Prayer
    es: Gratitud en Oración
    uk: Подяка в молитві
  text:
    ru: Отец, я не беспокоюсь ни о чем, но с благодарением приношу Тебе все мои нужды.
      Знаю, что Ты заботишься обо мне и отвечаешь на мои молитвы.
    en: Father, I am anxious for nothing, but with thanksgiving, I bring all my needs
      to You. I know You care for me and answer my prayers.
    es: Padre, no me preocupo por nada, sino que con acción de gracias te presento
      todas mis necesidades. Sé que me cuidas y respondes a mis oraciones.
    uk: Отче, я ні про що не турбуюсь, але з подякою приношу Тобі всі мої потреби.
      Знаю, що Ти піклуєшся про мене і відповідаєш на мої молитви.
- id: gratitude_praise_13
  ref: cl:3:17
  title:
    ru: Жизнь в благодарности
    en: Life in Gratitude
    es: Vida en Gratitud
    uk: Життя у вдячності
  text:
    ru: Господь, помоги мне все, что я делаю, словом или делом, делать во имя Иисуса,
      благодаря Тебя, Отца, через Него. Пусть моя жизнь будет хвалой Тебе.
    en: Lord, help me to do everything I do, in word or deed, in the name of Jesus,
      giving thanks to You, Father, through Him. Let my life be a praise to You.
    es: Señor, ayúdame a hacer todo lo que hago, de palabra o de obra, en el nombre
      de Jesús, dándote gracias a Ti, Padre, por medio de Él. Que mi vida sea una
      alabanza para Ti.
    uk: Господи, допоможи мені все, що я роблю, словом чи ділом, робити в ім'я Ісуса,
      дякуючи Тобі, Отче, через Нього. Нехай моє життя буде хвалою Тобі.
- id: gratitude_praise_14
  ref: 1ts:5:18
  title:
    ru: Благодарность за всё
    en: Thanks for Everything
    es: Gracias por Todo
    uk: Подяка за все
  text:
    ru: Боже, я учусь благодарить Тебя за все обстоятельства моей жизни, ибо это Твоя
      воля во Христе Иисусе. В Тебе я нахожу покой и силу.
    en: God, I learn to give You thanks in all circumstances of my life, for this
      is Your will in Christ Jesus. In You, I find peace and strength.
    es: Dios, aprendo a darte gracias en todas las circunstancias de mi vida, porque
      esta es Tu voluntad en Cristo Jesús. En Ti encuentro paz y fortaleza.
    uk: Боже, я вчуся дякувати Тобі за всі обставини мого життя, бо це Твоя воля в
      Христі Ісусі. В Тобі я знаходжу спокій і силу.
- id: gratitude_praise_15
  ref: hb:13:15
  title:
    ru: Жертва хвалы
    en: Sacrifice of Praise
    es: Sacrificio de Alabanza
    uk: Жертва хвали
  text:
    ru: Мой Спаситель, через Тебя я непрестанно приношу Богу жертву хвалы — плод моих
      уст, прославляющих Твое святое имя. Ты достоин всей славы.
    en: My Savior, through You, I continually offer God a sacrifice of praise — the
      fruit of my lips that glorify Your holy name. You are worthy of all glory.
    es: 'Mi Salvador, a través de Ti, ofrezco continuamente a Dios un sacrificio de
      alabanza: el fruto de mis labios que glorifican Tu santo nombre. Eres digno
      de toda gloria.'
    uk: Мій Спасителю, через Тебе я безперестанку приношу Богові жертву хвали — плід
      моїх уст, що прославляють Твоє святе ім'я. Ти гідний всієї слави.
- id: gratitude_praise_16
  ref: ps:100:4
  title:
    ru: Врата благодарения
    en: Gates of Thanksgiving
    es: Puertas de Gratitud
    uk: Брама подяки
  text:
    ru: Господи, вхожу в Твои врата с благодарением, а во дворы Твои – с хвалой. Мое
      сердце переполнено радостью за Твое присутствие и доброту. Благодарю Тебя за
      Твою неизменную любовь.
    en: Lord, I enter Your gates with thanksgiving and Your courts with praise. My
      heart overflows with joy for Your presence and goodness. Thank You for Your
      unfailing love.
    es: Señor, entro por Tus puertas con acción de gracias y por Tus atrios con alabanza.
      Mi corazón rebosa de alegría por Tu presencia y bondad. Gracias por Tu amor
      inagotable.
    uk: Господи, входжу до Твоїх воріт з подякою, а до Твоїх дворів – з хвалою. Моє
      серце переповнене радістю за Твою присутність та доброту. Дякую Тобі за Твою
      незмінну любов.
- id: gratitude_praise_17
  ref: ph:4:6
  title:
    ru: С благодарным сердцем
    en: With a Thankful Heart
    es: Con Corazón Agradecido
    uk: З вдячним серцем
  text:
    ru: Отец, приношу Тебе все мои просьбы с благодарным сердцем. Я выбираю доверять
      Тебе и хвалить Тебя, зная, что Ты заботишься обо мне и обеспечишь все необходимое.
      Спасибо за Твой мир.
    en: Father, I bring all my requests to You with a thankful heart. I choose to
      trust You and praise You, knowing You care for me and will provide all I need.
      Thank You for Your peace.
    es: Padre, te presento todas mis peticiones con un corazón agradecido. Elijo confiar
      en Ti y alabarte, sabiendo que me cuidas y proveerás todo lo que necesito. Gracias
      por Tu paz.
    uk: Отче, приношу Тобі всі мої прохання з вдячним серцем. Я обираю довіряти Тобі
      і хвалити Тебе, знаючи, що Ти піклуєшся про мене і забезпечиш усім необхідним.
      Дякую за Твій мир.
- id: gratitude_praise_18
  ref: 1ch:16:34
  title:
    ru: Вечная любовь
    en: Eternal Love
    es: Amor Eterno
    uk: Вічна любов
  text:
    ru: Боже мой, благодарю Тебя, потому что Ты благ, и Твоя неизменная любовь пребывает
      вовек. Моя душа радуется Твоей верности и милости. Вся хвала Твоему святому
      имени!
    en: My God, I thank You because You are good, and Your steadfast love endures
      forever. My soul rejoices in Your faithfulness and mercy. All praise to Your
      holy name!
    es: Dios mío, te doy gracias porque eres bueno y Tu amor inquebrantable perdura
      para siempre. Mi alma se regocija en Tu fidelidad y misericordia. ¡Toda alabanza
      a Tu santo nombre!
    uk: Мій Боже, дякую Тобі, бо Ти добрий, і Твоя незмінна любов триває повік. Моя
      душа радіє Твоїй вірності та милості. Вся хвала Твоєму святому імені!
- id: gratitude_praise_19
  ref: cl:3:17
  title:
    ru: Во всём благодарение
    en: In Everything Give Thanks
    es: En Todo Agradecimiento
    uk: У всьому подяка
  text:
    ru: Господи, помоги мне делать всё во имя Твоё, благодаря Тебя, Отец, через Иисуса.
      Пусть моя жизнь будет непрерывным приношением благодарности за Твою благодать.
    en: Lord, help me to do everything in Your name, giving thanks to You, Father,
      through Jesus. May my life be a continuous offering of gratitude for Your grace.
    es: Señor, ayúdame a hacer todo en Tu nombre, dándote gracias a Ti, Padre, por
      medio de Jesús. Que mi vida sea una ofrenda continua de gratitud por Tu gracia.
    uk: Господи, допоможи мені робити все в Твоє ім'я, дякуючи Тобі, Отче, через Ісуса.
      Нехай моє життя буде безперервним приношенням подяки за Твою благодать.
- id: gratitude_praise_20
  ref: hb:13:15
  title:
    ru: Уста, что славят
    en: Lips That Praise
    es: Labios que alaban
    uk: Уста, що славлять
  text:
    ru: Небесный Отец, через Иисуса я приношу Тебе жертву хвалы. Мои уста провозглашают
      Твое имя и Твои дивные дела. Благодарю Тебя за радость поклонения Тебе.
    en: Heavenly Father, through Jesus, I offer You a sacrifice of praise. My lips
      declare Your name and Your wonderful works. Thank You for the joy of worshiping
      You.
    es: Padre Celestial, por medio de Jesús, te ofrezco un sacrificio de alabanza.
      Mis labios declaran Tu nombre y Tus obras maravillosas. Gracias por la alegría
      de adorarte.
    uk: Небесний Отче, через Ісуса я приношу Тобі жертву хвали. Мої уста проголошують
      Твоє ім'я і Твої дивні діла. Дякую Тобі за радість поклоніння Тобі.
- id: gratitude_praise_21
  ref: ps:100:4
  title:
    ru: Вхожу с хвалой
    en: Enter with Praise
    es: Entro con Alabanza
    uk: Входжу з хвалою
  text:
    ru: Господи, благодарю Тебя за новый день! Вхожу в Твои врата с хвалой и в Твои
      дворы с благодарением. Ты благ, и милость Твоя вовек.
    en: Lord, I thank You for this new day! I enter Your gates with thanksgiving and
      Your courts with praise. You are good, and Your mercy endures forever.
    es: Señor, ¡te doy gracias por este nuevo día! Entro por tus puertas con acción
      de gracias y por tus atrios con alabanza. Eres bueno, tu misericordia es eterna.
    uk: Господи, дякую Тобі за новий день! Входжу в Твої брами з хвалою і в Твої двори
      з подякою. Ти добрий, і милість Твоя навіки.
- id: gratitude_praise_22
  ref: 1ts:5:18
  title:
    ru: Твоя рука во всём
    en: Your Hand in All
    es: Tu mano en todo
    uk: Твоя рука в усьому
  text:
    ru: Боже мой, учусь благодарить Тебя во всем, ибо в этом воля Твоя. Помоги мне
      видеть Твою руку в каждом событии и быть всегда благодарным.
    en: My God, I learn to give You thanks in everything, for this is Your will. Help
      me to see Your hand in every event and always be grateful.
    es: Dios mío, aprendo a darte gracias en todo, porque esta es tu voluntad. Ayúdame
      a ver tu mano en cada evento y a ser siempre agradecido.
    uk: Боже мій, вчуся дякувати Тобі за все, бо в цьому воля Твоя. Допоможи мені
      бачити Твою руку в кожній події і бути завжди вдячним.
- id: gratitude_praise_23
  ref: ph:4:6
  title:
    ru: С благодарностью молюсь
    en: Pray with Thanksgiving
    es: Orar con Gratitud
    uk: З подякою молюся
  text:
    ru: Отец, я приношу свои нужды к Тебе с молитвой и благодарением. Я знаю, что
      Ты слышишь меня и заботишься обо мне. Твой мир превыше всего.
    en: Father, I bring my needs to You with prayer and thanksgiving. I know You hear
      me and care for me. Your peace is beyond all understanding.
    es: Padre, te presento mis necesidades con oración y acción de gracias. Sé que
      me escuchas y cuidas de mí. Tu paz está más allá de todo entendimiento.
    uk: Отче, я приношу свої потреби до Тебе з молитвою та подякою. Я знаю, що Ти
      чуєш мене і дбаєш про мене. Твій мир понад усе.
- id: gratitude_praise_24
  ref: cl:3:17
  title:
    ru: Во имя Иисуса
    en: In Jesus' Name
    es: En el Nombre de Jesús
    uk: В ім'я Ісуса
  text:
    ru: Господь, помоги мне все делать во имя Иисуса, благодаря Тебя, Отца, через
      Него. Пусть каждое мое слово и дело прославляет Тебя.
    en: Lord, help me to do everything in the name of Jesus, giving thanks to You,
      Father, through Him. May every word and deed glorify You.
    es: Señor, ayúdame a hacer todo en el nombre de Jesús, dándote gracias a Ti, Padre,
      por medio de Él. Que cada palabra y obra te glorifiquen.
    uk: Господи, допоможи мені все робити в ім'я Ісуса, дякуючи Тобі, Отче, через
      Нього. Нехай кожне моє слово і діло прославляє Тебе.
- id: gratitude_praise_25
  ref: ps:9:1
  title:
    ru: Всем сердцем хвалю
    en: Praise with All Heart
    es: Alabanza de Corazón
    uk: Усім серцем хвалю
  text:
    ru: Всевышний, я буду славить Тебя всем моим сердцем и возвещать все Твои дивные
      дела. Ты достоин всей хвалы и поклонения.
    en: Most High, I will praise You with all my heart and declare all Your wonderful
      deeds. You are worthy of all praise and worship.
    es: Altísimo, te alabaré con todo mi corazón y proclamaré todas tus maravillosas
      obras. Eres digno de toda alabanza y adoración.
    uk: Всевишній, я буду славити Тебе всім моїм серцем і сповіщати всі Твої дивні
      діла. Ти гідний всієї хвали і поклоніння.
- id: gratitude_praise_26
  ref: ps:100:4
  title:
    ru: Окружён добротой
    en: Surrounded by His Goodness
    es: Rodeado de su bondad
    uk: Оточений добротою
  text:
    ru: Господь, вхожу в Твои врата с благодарностью и в дворы Твои с хвалой. Благодарю
      Тебя за Твою безмерную доброту, милость и верность, которые окружают меня каждый
      день. Ты — мой Бог, и я славлю Тебя.
    en: Lord, I come to You with heartfelt thanksgiving and praise. Thank You for
      Your boundless goodness, mercy, and faithfulness that surround me daily. You
      are my God, I praise You always.
    es: Señor, entro en Tu presencia con gratitud y alabanza. Gracias por Tu bondad,
      misericordia y fidelidad que me rodean cada día. Eres mi Dios, te alabo siempre.
    uk: Господи, входжу в Твої ворота з подякою і в Твої двори з хвалою. Дякую Тобі
      за безмежну доброту, милість і вірність, що оточують мене щодня. Ти мій Бог,
      і я славлю Тебе.
- id: gratitude_praise_27
  ref: lm:3:22
  title:
    ru: Милость не иссякает
    en: Mercies Never Cease
    es: Misericordias que no cesan
    uk: Милість не вичерпується
  text:
    ru: Господи, Твоя великая милость и сострадание никогда не иссякают. Благодарю
      Тебя за Твою верность, которая обновляется каждое утро. Твоя любовь неизменна,
      и на нее я уповаю.
    en: Lord, Your great mercy and compassion never cease. I thank You for Your faithfulness,
      which is new every morning. Your love is unchanging, and in it I find my hope.
    es: Señor, Tu gran misericordia y compasión nunca cesan. Te doy gracias por Tu
      fidelidad, que se renueva cada mañana. Tu amor es inmutable, y en él pongo mi
      esperanza.
    uk: Господи, Твоя велика милість та співчуття ніколи не вичерпуються. Дякую Тобі
      за Твою вірність, яка оновлюється щоранку. Твоя любов незмінна, і на неї я покладаю
      надію.
- id: gratitude_praise_28
  ref: eph:2:8
  title:
    ru: Благодарность за спасение
    en: Gratitude for Salvation
    es: Gratitud por la Salvación
    uk: Вдячність за спасіння
  text:
    ru: Отец, я благодарен за Твою несказанную благодать, которой я спасен через веру.
      Это не от меня, это Твой дар. Спасибо за Иисуса Христа, моего Спасителя и Господа.
    en: Father, I am grateful for Your indescribable grace, through which I am saved
      by faith. It is not from me; it is Your gift. Thank You for Jesus Christ, my
      Savior and Lord.
    es: Padre, estoy agradecido por Tu gracia inefable, por la cual soy salvo mediante
      la fe. No es de mí, es Tu regalo. Gracias por Jesucristo, mi Salvador y Señor.
    uk: Отче, я вдячний за Твою невимовну благодать, якою я врятований через віру.
      Це не від мене, це Твій дар. Дякую за Ісуса Христа, мого Спасителя і Господа.
- id: gratitude_praise_29
  ref: prv:3:5
  title:
    ru: Надёжный Путеводитель
    en: My Reliable Guide
    es: Mi Guía fiel
    uk: Надійний Провідник
  text:
    ru: Господь, я доверяю Тебе всем своим сердцем и не полагаюсь на свой разум. Благодарю
      Тебя за Твою мудрость, которая направляет меня и указывает верный путь. Ты —
      мой надежный Путеводитель.
    en: Lord, I trust You with all my heart and do not lean on my own understanding.
      Thank You for Your wisdom that guides me and shows me the right path. You are
      my reliable Guide.
    es: Señor, confío en Ti de todo corazón y no me apoyo en mi propio entendimiento.
      Gracias por Tu sabiduría que me guía y me muestra el camino correcto. Eres mi
      Guía confiable.
    uk: Господи, я довіряю Тобі всім своїм серцем і не покладаюся на свій розум. Дякую
      Тобі за Твою мудрість, яка направляє мене і вказує вірний шлях. Ти — мій надійний
      Провідник.
- id: gratitude_praise_30
  ref: 1ts:5:18
  title:
    ru: Хвала в любых обстоятельствах
    en: Praise in All Circumstances
    es: Alabanza en toda circunstancia
    uk: Хвала в усіх обставинах
  text:
    ru: Боже, благодарю Тебя за все обстоятельства моей жизни, ведь это Твоя воля.
      Я признаю Твою руку во всём, и за каждую мелочь, за радости и испытания, я приношу
      Тебе хвалу и благодарность.
    en: God, I thank You in all circumstances of my life, for this is Your will. I
      recognize Your hand in everything, and for every small detail, for joys and
      trials, I bring You praise and thanks.
    es: Dios, te doy gracias en todas las circunstancias de mi vida, porque esta es
      Tu voluntad. Reconozco Tu mano en todo, y por cada detalle, por las alegrías
      y las pruebas, te doy alabanza y gratitud.
    uk: Боже, дякую Тобі за всі обставини мого життя, бо це Твоя воля. Я визнаю Твою
      руку у всьому, і за кожну дрібницю, за радощі та випробування, я приношу Тобі
      хвалу і вдячність.
- id: faith_trust_01
  ref: mt:6:33
  title:
    ru: Моя ежедневная пища
    en: My Daily Sustenance
    es: Mi Sustento Diario
    uk: Мій щоденний хліб
  text:
    ru: Господи, я верю, что когда я ищу Твоего Царства, Ты обеспечиваешь все мои
      нужды. Помоги мне доверять Твоей заботе сегодня и всегда.
    en: Lord, I believe that as I seek Your Kingdom, You provide for all my needs.
      Help me trust in Your unfailing care today and always.
    es: Señor, creo que al buscar Tu Reino, Tú provees todas mis necesidades. Ayúdame
      a confiar en Tu cuidado inagotable hoy y siempre.
    uk: Господи, я вірю, що коли я шукаю Твого Царства, Ти забезпечуєш усі мої потреби.
      Допоможи мені довіряти Твоїй турботі сьогодні й завжди.
- id: faith_trust_02
  ref: prv:3:5
  title:
    ru: Веди меня, Господь
    en: Guide Me, Lord
    es: Guíame, Señor
    uk: Веди мене, Господи
  text:
    ru: Отец, я доверяю Тебе всем сердцем и не полагаюсь на свой разум. Направь мои
      шаги, сделай путь мой прямым.
    en: Father, I trust You with all my heart and lean not on my own understanding.
      Guide my steps, make my path straight.
    es: Padre, confío en Ti de todo corazón y no me apoyo en mi propio entendimiento.
      Guía mis pasos, haz mi camino recto.
    uk: Отче, я довіряю Тобі всім серцем і не покладаюся на свій розум. Спрямуй мої
      кроки, зроби мій шлях прямим.
- id: faith_trust_03
  ref: ph:4:6
  title:
    ru: Мир превыше всего
    en: Peace Above All
    es: Paz Ante Todo
    uk: Мир понад усе
  text:
    ru: Боже, я отдаю Тебе все свои тревоги. Благодарю Тебя за Твой мир, который превосходит
      всякое понимание и хранит мое сердце и разум.
    en: God, I surrender all my anxieties to You. Thank You for Your peace, which
      transcends all understanding and guards my heart and mind.
    es: Dios, te entrego todas mis ansiedades. Gracias por Tu paz, que sobrepasa todo
      entendimiento y guarda mi corazón y mi mente.
    uk: Боже, я віддаю Тобі всі свої тривоги. Дякую Тобі за Твій мир, що перевищує
      всяке розуміння і береже моє серце та розум.
- id: faith_trust_04
  ref: is:41:10
  title:
    ru: Моя сила в Тебе
    en: My Strength in You
    es: Mi Fuerza en Ti
    uk: Моя сила в Тобі
  text:
    ru: Господи, я не боюсь, потому что Ты со мной. Ты мой Бог, и Ты укрепляешь меня.
      Я доверяю Твоей силе в каждой ситуации.
    en: Lord, I will not fear, for You are with me. You are my God, and You strengthen
      me. I trust in Your power in every situation.
    es: Señor, no temeré, porque Tú estás conmigo. Eres mi Dios y me fortaleces. Confío
      en Tu poder en cada situación.
    uk: Господи, я не боюся, бо Ти зі мною. Ти мій Бог, і Ти зміцнюєш мене. Я довіряю
      Твоїй силі в кожній ситуації.
- id: faith_trust_05
  ref: lm:3:22
  title:
    ru: Твоя верность велика
    en: Great Is Your Faithfulness
    es: Grande es Tu Fidelidad
    uk: Велика Твоя вірність
  text:
    ru: Неизменная любовь Твоя, Господи, никогда не иссякает. Твои милости обновляются
      каждое утро. Велики Твоя верность и благость ко мне.
    en: Your unfailing love, Lord, never ceases. Your mercies are new every morning.
      Great is Your faithfulness and goodness to me.
    es: Tu amor inagotable, Señor, nunca cesa. Tus misericordias son nuevas cada mañana.
      Grande es Tu fidelidad y bondad hacia mí.
    uk: Твоя незмінна любов, Господи, ніколи не вичерпується. Твої милості оновлюються
      щоранку. Велика Твоя вірність і доброта до мене.
- id: faith_trust_06
  ref: prv:3:5
  title:
    ru: Полное доверие
    en: Complete Trust
    es: Confianza Plena
    uk: Повна довіра
  text:
    ru: Господи, научи меня доверять Тебе всем сердцем моим, не полагаясь на свой
      разум. Пусть Твоя мудрость направляет каждый мой шаг.
    en: Lord, teach me to trust You with all my heart, not leaning on my own understanding.
      May Your wisdom guide my every step.
    es: Señor, enséñame a confiar en Ti con todo mi corazón, no apoyándome en mi propio
      entendimiento. Que Tu sabiduría guíe cada uno de mis pasos.
    uk: Господи, навчи мене довіряти Тобі всім серцем моїм, не покладаючись на свій
      розум. Нехай Твоя мудрість керує кожним моїм кроком.
- id: faith_trust_07
  ref: is:41:10
  title:
    ru: Не бойся
    en: Do Not Fear
    es: No Temas
    uk: Не бійся
  text:
    ru: Боже, благодарю Тебя, что Ты всегда со мной. Помоги мне не бояться, ведь Твоя
      правая рука поддерживает меня в любой ситуации.
    en: God, I thank You that You are always with me. Help me not to fear, for Your
      right hand upholds me in every situation.
    es: Dios, Te doy gracias porque siempre estás conmigo. Ayúdame a no temer, porque
      Tu diestra me sostiene en cada situación.
    uk: Боже, дякую Тобі, що Ти завжди зі мною. Допоможи мені не боятися, адже Твоя
      права рука підтримує мене в будь-якій ситуації.
- id: faith_trust_08
  ref: is:26:3
  title:
    ru: Мир в доверии
    en: Peace in Trust
    es: Paz en la Confianza
    uk: Мир у довірі
  text:
    ru: Отец, даруй мне совершенный мир, когда мой разум твердо уповает на Тебя. Укрепи
      мою веру, чтобы я всегда пребывал в Твоем покое.
    en: Father, grant me perfect peace as my mind is steadfastly fixed on You. Strengthen
      my faith so I may always abide in Your calm.
    es: Padre, concédeme paz perfecta mientras mi mente está firmemente puesta en
      Ti. Fortalece mi fe para que siempre permanezca en Tu calma.
    uk: Отче, даруй мені досконалий мир, коли мій розум міцно уповає на Тебе. Зміцни
      мою віру, щоб я завжди перебував у Твоєму спокої.
- id: faith_trust_09
  ref: ph:4:6
  title:
    ru: Без тревог
    en: Without Anxiety
    es: Sin Ansiedad
    uk: Без тривог
  text:
    ru: Господи, я отдаю Тебе все свои тревоги. Научи меня молиться с благодарностью,
      зная, что Твой мир превосходит всякое разумение и хранит мое сердце.
    en: Lord, I surrender all my anxieties to You. Teach me to pray with thanksgiving,
      knowing Your peace surpasses all understanding and guards my heart.
    es: Señor, Te entrego todas mis ansiedades. Enséñame a orar con gratitud, sabiendo
      que Tu paz sobrepasa todo entendimiento y guarda mi corazón.
    uk: Господи, я віддаю Тобі всі свої тривоги. Навчи мене молитися з вдячністю,
      знаючи, що Твій мир перевершує всяке розуміння і береже моє серце.
- id: faith_trust_10
  ref: 1pe:5:7
  title:
    ru: Отдай бремя
    en: Cast Your Burden
    es: Echa Tu Carga
    uk: Віддай тягар
  text:
    ru: Мой Бог, я возлагаю на Тебя все свои заботы и бремена. Ты заботишься обо мне
      и никогда не дашь праведнику поколебаться.
    en: My God, I cast all my cares and burdens upon You. You care for me and will
      never allow the righteous to be shaken.
    es: Dios mío, echo sobre Ti todas mis preocupaciones y cargas. Tú cuidas de mí
      y nunca permitirás que el justo sea conmovido.
    uk: Мій Боже, я покладаю на Тебе всі свої турботи та тягарі. Ти дбаєш про мене
      і ніколи не даси праведнику похитнутися.
- id: faith_trust_11
  ref: jr:29:11
  title:
    ru: Твои благие планы
    en: Your Good Plans
    es: Tus Buenos Planes
    uk: Твої добрі плани
  text:
    ru: Господь, я верю, что у Тебя есть планы мира и надежды для меня. Помоги мне
      доверять Твоей мудрости, когда я не вижу пути, зная, что Твое будущее для меня
      благословенно.
    en: Lord, I believe You have plans of peace and hope for me. Help me trust Your
      wisdom when I don't see the way, knowing Your future for me is blessed.
    es: Señor, creo que tienes planes de paz y esperanza para mí. Ayúdame a confiar
      en Tu sabiduría cuando no veo el camino, sabiendo que Tu futuro para mí es bendito.
    uk: Господи, я вірю, що Ти маєш плани миру та надії для мене. Допоможи мені довіряти
      Твоїй мудрості, коли я не бачу шляху, знаючи, що Твоє майбутнє для мене благословенне.
- id: faith_trust_12
  ref: rm:8:28
  title:
    ru: Все во благо
    en: All for Good
    es: Todo para Bien
    uk: Все на благо
  text:
    ru: Отец, я доверяю, что Ты обращаешь все обстоятельства моей жизни во благо.
      Даже когда трудно, я знаю, что Твоя любовь действует, чтобы привести меня к
      лучшему.
    en: Father, I trust You work all circumstances of my life for good. Even when
      it's hard, I know Your love is at work to bring me to a better place.
    es: Padre, confío en que Tú obras todas las circunstancias de mi vida para bien.
      Incluso cuando es difícil, sé que Tu amor está obrando para llevarme a un lugar
      mejor.
    uk: Отче, я довіряю, що Ти обертаєш усі обставини мого життя на благо. Навіть
      коли важко, я знаю, що Твоя любов діє, щоб привести мене до кращого.
- id: faith_trust_13
  ref: ph:4:13
  title:
    ru: Твоя сила во мне
    en: Your Strength in Me
    es: Tu Fuerza en Mí
    uk: Твоя сила в мені
  text:
    ru: Господи, я верю, что могу всё через Христа, укрепляющего меня. Пусть Твоя
      сила будет моей силой, чтобы преодолевать любые вызовы и жить для Твоей славы.
    en: Lord, I believe I can do all things through Christ who strengthens me. Let
      Your power be my power, to overcome any challenge and live for Your glory.
    es: Señor, creo que puedo hacer todas las cosas a través de Cristo que me fortalece.
      Que Tu poder sea mi poder para superar cualquier desafío y vivir para Tu gloria.
    uk: Господи, я вірю, що можу все через Христа, що зміцнює мене. Нехай Твоя сила
      буде моєю силою, щоб долати будь-які виклики і жити для Твоєї слави.
- id: faith_trust_14
  ref: mt:6:33
  title:
    ru: Мой Податель всего
    en: My Provider
    es: Mi Proveedor
    uk: Мій Подавець усього
  text:
    ru: Боже, я стремлюсь прежде всего к Твоему Царству и праведности. Помоги мне
      доверять, что Ты добавишь мне всё необходимое, зная, что Ты заботишься о моих
      нуждах.
    en: God, I seek Your Kingdom and righteousness first. Help me trust You will add
      all I need, knowing You care for my every necessity.
    es: Dios, busco Tu Reino y justicia primero. Ayúdame a confiar en que Tú añadirás
      todo lo que necesito, sabiendo que Tú cuidas de cada una de mis necesidades.
    uk: Боже, я прагну насамперед до Твого Царства і праведності. Допоможи мені довіряти,
      що Ти додаси мені все необхідне, знаючи, що Ти дбаєш про мої потреби.
- id: faith_trust_15
  ref: ps:62:5
  title:
    ru: Покой в Тебе
    en: Rest in You
    es: Descanso en Ti
    uk: Спокій у Тобі
  text:
    ru: Душа моя, только в Боге найди покой. Я возлагаю на Тебя всю свою надежду,
      Господь. Помоги мне отпустить тревоги и покоиться в Твоей верности и неизменной
      любви.
    en: My soul, find rest in God alone. I place all my hope in You, Lord. Help me
      release my worries and rest in Your faithfulness and unfailing love.
    es: Alma mía, solo en Dios halla reposo. Pongo toda mi esperanza en Ti, Señor.
      Ayúdame a soltar mis preocupaciones y descansar en Tu fidelidad y amor inquebrantable.
    uk: Душе моя, тільки в Бозі знайди спокій. Я покладаю на Тебе всю свою надію,
      Господи. Допоможи мені відпустити тривоги і спочивати у Твоїй вірності та незмінній
      любові.
- id: faith_trust_16
  ref: hb:11:1
  title:
    ru: Уверенность веры
    en: Assurance of Faith
    es: Certeza de Fe
    uk: Впевненість віри
  text:
    ru: Господи, помоги мне ходить верой, доверяя Твоей невидимой руке и совершенному
      плану, зная, что Ты верен.
    en: Lord, help me walk by faith, trusting Your unseen hand and perfect plan, knowing
      You are always faithful.
    es: Señor, ayúdame a caminar por fe, confiando en Tu mano invisible y Tu plan
      perfecto, sabiendo que eres fiel.
    uk: Господи, допоможи мені ходити вірою, довіряючи Твоїй невидимій руці і досконалому
      плану, знаючи, що Ти вірний.
- id: faith_trust_17
  ref: ph:4:6
  title:
    ru: Свобода от тревог
    en: Freedom from Worry
    es: Libertad de Preocupaciones
    uk: Свобода від тривог
  text:
    ru: Отец, я возлагаю на Тебя все свои тревоги. Помоги мне молиться с благодарением,
      доверяя Твоему обеспечению.
    en: Father, I cast all my anxieties on You. Help me pray with thanks, trusting
      You will provide and care for every need.
    es: Padre, pongo todas mis ansiedades en Ti. Ayúdame a orar con gratitud, confiando
      en que proveerás cada necesidad.
    uk: Отче, я покладаю на Тебе всі свої тривоги. Допоможи мені молитися з вдячністю,
      довіряючи Твоєму забезпеченню.
- id: faith_trust_18
  ref: prv:3:5
  title:
    ru: Доверие сердцем
    en: Trusting Your Heart
    es: Confiando de Corazón
    uk: Довіра серцем
  text:
    ru: Господи, я отдаю Тебе все свое сердце. Руководи моими шагами, ибо я доверяю
      Твоей мудрости, а не своей.
    en: Lord, I give You my whole heart. Guide my steps and understanding, for I trust
      in Your wisdom, not my own.
    es: Señor, te entrego todo mi corazón. Guía mis pasos y entendimiento, pues confío
      en Tu sabiduría, no en la mía.
    uk: Господи, я віддаю Тобі все своє серце. Керуй моїми кроками, бо я довіряю Твоїй
      мудрості, а не своїй.
- id: faith_trust_19
  ref: ps:33:4
  title:
    ru: Верное Слово Божье
    en: God's Faithful Word
    es: Fiel Palabra de Dios
    uk: Вірне Слово Боже
  text:
    ru: Боже, Твое Слово истинно, и Твоя верность пребывает вовек. Я доверяю Твоим
      обещаниям, зная, что Ты никогда не подводишь.
    en: God, Your Word is true and Your faithfulness endures forever. I trust in Your
      promises, knowing You never fail.
    es: Dios, Tu Palabra es verdadera y Tu fidelidad perdura para siempre. Confío
      en Tus promesas, sabiendo que nunca fallas.
    uk: Боже, Твоє Слово істинне, і Твоя вірність перебуває навіки. Я довіряю Твоїм
      обіцянкам, знаючи, що Ти ніколи не підводиш.
- id: faith_trust_20
  ref: is:41:10
  title:
    ru: Моя Сила и Помощь
    en: My Strength and Help
    es: Mi Fuerza y Ayuda
    uk: Моя Сила і Допомога
  text:
    ru: Небесный Отец, я не буду бояться, ибо Ты со мной. Укрепи и поддержи меня,
      ибо моя надежда в Твоей могучей руке.
    en: Heavenly Father, I will not fear, for You are with me. Strengthen and uphold
      me, for my trust is in Your mighty hand.
    es: Padre Celestial, no temeré, porque Tú estás conmigo. Fortaléceme y sostenme,
      pues mi confianza está en Tu mano poderosa.
    uk: Небесний Отче, я не буду боятися, бо Ти зі мною. Зміцни і підтримай мене,
      бо моя надія в Твоїй могутній руці.
- id: faith_trust_21
  ref: prv:3:5
  title:
    ru: Доверяя Твоему Пути
    en: Trusting Your Path
    es: Confiando en Tu Camino
    uk: Довіряючи Твоєму Шляху
  text:
    ru: Господи, я доверяю Тебе всем сердцем, не полагаясь на свое разумение. Направляй
      мои шаги, ибо я знаю, что Твои пути совершенны.
    en: Lord, I trust in You with all my heart, not leaning on my own understanding.
      Guide my steps, for I know Your ways are perfect.
    es: Señor, confío en Ti con todo mi corazón, sin apoyarme en mi propio entendimiento.
      Guía mis pasos, pues sé que Tus caminos son perfectos.
    uk: Господи, я довіряю Тобі всім серцем, не покладаючись на власне розуміння.
      Спрямовуй мої кроки, бо я знаю, що Твої шляхи досконалі.
- id: faith_trust_22
  ref: is:41:10
  title:
    ru: Без Страха, Мой Бог
    en: No Fear, My God
    es: Sin Miedo, Mi Dios
    uk: Без Страху, Мій Боже
  text:
    ru: 'Отче, когда страх пытается овладеть мной, я вспоминаю Твое обещание: «Не
      бойся, ибо Я с тобой». Я доверяю Твоему постоянному присутствию и силе.'
    en: 'Father, when fear tries to grip me, I remember Your promise: "Do not fear,
      for I am with you." I trust in Your constant presence and strength.'
    es: 'Padre, cuando el miedo intenta apoderarse de mí, recuerdo Tu promesa: "No
      temas, porque Yo estoy contigo". Confío en Tu presencia y fuerza constantes.'
    uk: 'Отче, коли страх намагається охопити мене, я згадую Твою обіцянку: "Не бійся,
      бо Я з тобою". Я довіряю Твоїй постійній присутності та силі.'
- id: faith_trust_23
  ref: 1pe:5:7
  title:
    ru: Возлагая Заботы
    en: Casting My Cares
    es: Echando Mis Ansiedades
    uk: Покладаючи Турботи
  text:
    ru: Господи, я возлагаю на Тебя все свои заботы, ибо знаю, что Ты глубоко заботишься
      обо мне. Помоги мне покоиться в Твоем любящем обеспечении и непоколебимой верности.
    en: Lord, I cast all my anxieties on You, for I know You care for me deeply. Help
      me to rest in Your loving provision and unwavering faithfulness.
    es: Señor, echo todas mis ansiedades sobre Ti, porque sé que Te preocupas profundamente
      por mí. Ayúdame a descansar en Tu amorosa provisión y fidelidad inquebrantable.
    uk: Господи, я покладаю на Тебе всі свої тривоги, бо знаю, що Ти глибоко дбаєш
      про мене. Допоможи мені спочивати у Твоєму любовному забезпеченні та непохитній
      вірності.
- id: faith_trust_24
  ref: hb:11:1
  title:
    ru: Уверенность в Надежде
    en: Assurance of Hope
    es: Seguridad de Esperanza
    uk: Впевненість у Надії
  text:
    ru: Боже, Ты источник моей веры. Даруй мне уверенность в Твоих обещаниях и твердость
      в том, чего я еще не вижу. Моя надежда твердо в Тебе.
    en: God, You are the source of my faith. Grant me confidence in Your promises
      and assurance in what I cannot yet see. My hope is firmly in You.
    es: Dios, Tú eres la fuente de mi fe. Concédeme confianza en Tus promesas y seguridad
      en lo que aún no veo. Mi esperanza está firmemente en Ti.
    uk: Боже, Ти джерело моєї віри. Даруй мені впевненість у Твоїх обіцянках і твердість
      у тому, чого я ще не бачу. Моя надія міцно в Тобі.
- id: faith_trust_25
  ref: ph:4:19
  title:
    ru: Бог Мой Обеспечитель
    en: God My Provider
    es: Dios Mi Proveedor
    uk: Бог Мій Забезпечник
  text:
    ru: Небесный Отче, я верю, что Ты восполнишь все мои нужды по Своим славным богатствам.
      Благодарю Тебя за Твое безграничное обеспечение и верную заботу в каждой сфере
      моей жизни.
    en: Heavenly Father, I trust that You will meet all my needs according to Your
      glorious riches. Thank You for Your boundless provision and faithful care in
      every area of my life.
    es: Padre Celestial, confío en que suplirás todas mis necesidades conforme a Tus
      gloriosas riquezas. Gracias por Tu provisión ilimitada y Tu cuidado fiel en
      cada área de mi vida.
    uk: Небесний Отче, я вірю, що Ти задовольниш усі мої потреби згідно з Твоїми славними
      багатствами. Дякую Тобі за Твоє безмежне забезпечення та вірну турботу в кожній
      сфері мого життя.
- id: faith_trust_26
  ref: prv:3:5
  title:
    ru: Доверие Его Мудрости
    en: Trusting His Wisdom
    es: Confiando en Su Sabiduría
    uk: Довіра Його Мудрості
  text:
    ru: Господи, я доверяю Тебе всем сердцем и не полагаюсь на свой разум. Направь
      мои пути, и я знаю, что Ты сделаешь их прямыми. Аминь.
    en: Lord, I trust You with all my heart and lean not on my own understanding.
      Guide my paths, and I know You will make them straight. Amen.
    es: Señor, confío en Ti de todo corazón y no me apoyo en mi propio entendimiento.
      Guía mis caminos, y sé que Tú los enderezarás. Amén.
    uk: Господи, я довіряю Тобі всім серцем і не покладаюся на свій розум. Спрямуй
      мої шляхи, і я знаю, що Ти зробиш їх прямими. Амінь.
- id: faith_trust_27
  ref: is:41:10
  title:
    ru: Не бойся, Я с тобой
    en: Fear Not, I Am With You
    es: No Temas, Estoy Contigo
    uk: Не бійся, Я з тобою
  text:
    ru: Отец, я не боюсь, ибо Ты со мной. Ты мой Бог, Ты укрепляешь меня и помогаешь
      мне. Твоя правая рука поддерживает меня всегда. Слава Тебе!
    en: Father, I do not fear, for You are with me. You are my God, You strengthen
      me and help me. Your right hand upholds me always. Glory to You!
    es: Padre, no temo, porque Tú estás conmigo. Tú eres mi Dios, Tú me fortaleces
      y me ayudas. Tu diestra me sostiene siempre. ¡Gloria a Ti!
    uk: Отче, я не боюся, бо Ти зі мною. Ти мій Бог, Ти зміцнюєш мене і допомагаєш
      мені. Твоя права рука підтримує мене завжди. Слава Тобі!
- id: faith_trust_28
  ref: hb:11:1
  title:
    ru: Основа Надежды
    en: Foundation of Hope
    es: Cimiento de Esperanza
    uk: Основа Надії
  text:
    ru: Господь, вера – это уверенность в невидимом. Я верю в Твои обетования, даже
      когда не вижу их исполнения. Укрепи мою надежду в Тебе. Аминь.
    en: Lord, faith is the assurance of things unseen. I believe in Your promises,
      even when I don't see their fulfillment. Strengthen my hope in You. Amen.
    es: Señor, la fe es la certeza de lo invisible. Creo en Tus promesas, incluso
      cuando no veo su cumplimiento. Fortalece mi esperanza en Ti. Amén.
    uk: Господи, віра – це впевненість у невидимому. Я вірю в Твої обітниці, навіть
      коли не бачу їх виконання. Зміцни мою надію в Тобі. Амінь.
- id: faith_trust_29
  ref: mt:6:33
  title:
    ru: В Его Обеспечении
    en: In His Provision
    es: En Su Provisión
    uk: В Його Забезпеченні
  text:
    ru: Боже, я ищу прежде всего Твоего Царства и праведности. Я верю, что Ты позаботишься
      обо всех моих нуждах, как Ты обещал. Благодарю Тебя.
    en: God, I seek Your Kingdom and righteousness first. I trust You will provide
      for all my needs, just as You promised. Thank You. Amen.
    es: Dios, busco Tu Reino y justicia primero. Confío en que proveerás para todas
      mis necesidades, tal como prometiste. Gracias. Amén.
    uk: Боже, я шукаю насамперед Твого Царства та праведності. Я вірю, що Ти подбаєш
      про всі мої потреби, як Ти обіцяв. Дякую Тобі. Амінь.
- id: faith_trust_30
  ref: ph:4:6
  title:
    ru: Мир через Доверие
    en: Peace Through Trust
    es: Paz por la Confianza
    uk: Мир через Довіру
  text:
    ru: Отец, я не беспокоюсь ни о чем, но в любой ситуации приношу свои просьбы Тебе.
      Доверяю Тебе все свои заботы и получаю Твой мир. Аминь.
    en: Father, I am not anxious about anything, but in every situation I bring my
      requests to You. I trust You with all my worries and receive Your peace. Amen.
    es: Padre, no me angustio por nada, sino que en cada situación te presento mis
      peticiones. Confío en Ti con todas mis preocupaciones y recibo Tu paz. Amén.
    uk: Отче, я не турбуюся ні про що, але в будь-якій ситуації приношу свої прохання
      Тобі. Довіряю Тобі всі свої турботи та отримую Твій мир. Амінь.
- id: peace_rest_01
  ref: ps:23:2
  title:
    ru: Тихие воды
    en: Quiet Waters
    es: Aguas Tranquilas
    uk: Тихі води
  text:
    ru: Господи, благодарю Тебя за то, что ведешь меня к тихим водам. В Твоем присутствии
      моя душа находит истинный покой и мир от всех жизненных бурь.
    en: Lord, thank You for leading me to quiet waters. In Your presence, my soul
      finds true rest and peace from all life's storms. I trust in Your gentle guidance.
    es: Señor, gracias por guiarme a aguas tranquilas. En Tu presencia, mi alma encuentra
      verdadero descanso y paz de todas las tormentas de la vida.
    uk: Господи, дякую Тобі за те, що ведеш мене до тихих вод. У Твоїй присутності
      моя душа знаходить справжній спокій і мир від усіх життєвих бур.
- id: peace_rest_02
  ref: ph:4:7
  title:
    ru: Божий мир
    en: God's Peace
    es: Paz de Dios
    uk: Божий мир
  text:
    ru: Отец, молюсь, чтобы Твой мир, превосходящий всякое разумение, охранял мое
      сердце и разум сегодня. Пусть он успокоит всякий страх и принесет Твою безмятежность.
    en: Father, I pray for Your peace that surpasses understanding to guard my heart
      and mind today. Let it calm every fear and bring Your tranquility to my soul.
    es: Padre, pido que Tu paz, que sobrepasa todo entendimiento, guarde mi corazón
      y mi mente hoy. Que calme todo temor y traiga Tu tranquilidad.
    uk: Отче, молюся, щоб Твій мир, який перевищує всяке розуміння, охороняв моє серце
      і розум сьогодні. Нехай він заспокоїть кожен страх і принесе Твій спокій.
- id: peace_rest_03
  ref: mt:11:28
  title:
    ru: Приди ко Мне
    en: Come to Me
    es: Ven a Mí
    uk: Прийди до Мене
  text:
    ru: Иисус, я прихожу к Тебе, утомленный и обремененный. Благодарю Тебя за Твое
      обещание покоя. Я возлагаю свои бремена к Твоим ногам и принимаю Твой мир для
      моей души.
    en: Jesus, I come to You, weary and burdened. Thank You for Your promise of rest.
      I lay my burdens at Your feet and receive Your peace for my soul today.
    es: Jesús, vengo a Ti, cansado y cargado. Gracias por Tu promesa de descanso.
      Pongo mis cargas a Tus pies y recibo Tu paz para mi alma.
    uk: Ісусе, я приходжу до Тебе, стомлений і обтяжений. Дякую Тобі за Твою обіцянку
      спокою. Я складаю свої тягарі до Твоїх ніг і приймаю Твій мир для моєї душі.
- id: peace_rest_04
  ref: is:26:3
  title:
    ru: Совершенный мир
    en: Perfect Peace
    es: Paz Perfecta
    uk: Досконалий мир
  text:
    ru: Боже мой, я сосредотачиваю свой разум на Тебе, доверяя Твоей неизменной любви.
      Даруй мне Твой совершенный мир, который успокаивает всякую тревогу и сомнение
      сегодня.
    en: My God, I fix my mind on You, trusting in Your unfailing love. Grant me Your
      perfect peace that calms every anxiety and doubt today and always.
    es: Dios mío, fijo mi mente en Ti, confiando en Tu amor inquebrantable. Concédeme
      Tu paz perfecta que calma toda ansiedad y duda hoy.
    uk: Мій Боже, я зосереджую свій розум на Тобі, довіряючи Твоїй незмінній любові.
      Даруй мені Твій досконалий мир, що заспокоює всяку тривогу і сумнів сьогодні.
- id: peace_rest_05
  ref: ps:23:1
  title:
    ru: Мой Пастырь
    en: My Shepherd
    es: Mi Pastor
    uk: Мій Пастир
  text:
    ru: Господи, Ты мой Пастырь, и я ни в чем не нуждаюсь. В Твоей заботе я нахожу
      истинный мир и безопасность. Веди меня сегодня и наполни мое сердце Своим спокойствием.
    en: Lord, You are my Shepherd, and I lack nothing. In Your care, I find true peace
      and security. Guide me today and fill my heart with Your tranquility.
    es: Señor, Tú eres mi Pastor, y nada me falta. En Tu cuidado, encuentro verdadera
      paz y seguridad. Guíame hoy y llena mi corazón con Tu tranquilidad.
    uk: Господи, Ти мій Пастир, і я ні в чому не потребую. У Твоїй турботі я знаходжу
      справжній мир і безпеку. Веди мене сьогодні і наповни моє серце Своїм спокоєм.
- id: peace_rest_06
  ref: ph:4:7
  title:
    ru: Непостижимый мир
    en: Incomprehensible Peace
    es: Paz Incomprensible
    uk: Незбагненний мир
  text:
    ru: Господь, наполни мое сердце Твоим совершенным миром, который превыше всякого
      ума, и сохрани мои мысли в Иисусе Христе.
    en: Lord, fill my heart with Your perfect peace that surpasses all understanding,
      and guard my mind and thoughts in Christ Jesus.
    es: Señor, llena mi corazón con Tu paz perfecta que sobrepasa todo entendimiento,
      y guarda mis pensamientos en Cristo Jesús.
    uk: Господи, наповни моє серце Твоїм досконалим миром, що вищий за всякий розум,
      і збережи мої думки в Ісусі Христі.
- id: peace_rest_07
  ref: is:26:3
  title:
    ru: Твердость духа
    en: Steadfast Spirit
    es: Espíritu Firme
    uk: Твердість духу
  text:
    ru: Отец, укрепи мой разум, чтобы я всегда уповал на Тебя. Даруй мне Твой глубокий
      покой посреди любых жизненных бурь.
    en: Father, strengthen my mind so I may always trust in You. Grant me Your deep
      peace in the midst of any life storms.
    es: Padre, fortalece mi mente para confiar siempre en Ti. Concédeme Tu profunda
      paz en medio de cualquier tormenta de la vida.
    uk: Отче, зміцни мій розум, щоб я завжди уповав на Тебе. Даруй мені Твій глибокий
      спокій посеред будь-яких життєвих бур.
- id: peace_rest_08
  ref: mt:11:28
  title:
    ru: Призыв к покою
    en: Call to Rest
    es: Llamado al Descanso
    uk: Заклик до спокою
  text:
    ru: Иисус, я прихожу к Тебе со всеми своими заботами и усталостью. Обнови мои
      силы и подари Твой обещанный покой моей душе.
    en: Jesus, I come to You with all my worries and weariness. Refresh my strength
      and grant Your promised rest to my soul.
    es: Jesús, vengo a Ti con todas mis cargas y cansancio. Renueva mis fuerzas y
      dale a mi alma el descanso que has prometido.
    uk: Ісусе, я приходжу до Тебе з усіма своїми турботами та втомою. Онови мої сили
      та подаруй Твій обіцяний спокій моїй душі.
- id: peace_rest_09
  ref: jo:14:27
  title:
    ru: Твой дар мира
    en: Your Gift of Peace
    es: Tu Regalo de Paz
    uk: Твій дар миру
  text:
    ru: Господь, спасибо за Твой уникальный мир, который не похож на мирской. Пусть
      мое сердце не тревожится и не боится ничего.
    en: Lord, thank You for Your unique peace, unlike that of the world. Let my heart
      not be troubled or afraid of anything today.
    es: Señor, gracias por Tu paz única, que no es como la del mundo. Que mi corazón
      no se turbe ni tenga miedo de nada hoy.
    uk: Господи, дякую за Твій унікальний мир, який не схожий на мирський. Нехай моє
      серце не тривожиться і не лякається нічого.
- id: peace_rest_10
  ref: ps:23:2
  title:
    ru: Зелёные пажити
    en: Green Pastures
    es: Verdes pastos
    uk: Зелені пасовища
  text:
    ru: Боже, веди меня к тихим водам Твоей благодати. Дай мне отдохнуть на Твоих
      зеленых пажитях и восстанови мою уставшую душу.
    en: God, lead me beside the quiet waters of Your grace. Let me rest in Your green
      pastures and restore my weary soul today.
    es: Dios, guíame junto a aguas de reposo de Tu gracia. Permíteme descansar en
      Tus verdes pastos y restaura mi alma cansada.
    uk: Боже, веди мене до тихих вод Твоєї благодаті. Дай мені відпочити на Твоїх
      зелених пасовищах і віднови мою втомлену душу.
- id: peace_rest_11
  ref: 2ts:3:16
  title:
    ru: Мир во всем
    en: Peace Always
    es: Paz en Todo
    uk: Мир у всьому
  text:
    ru: Господь мира, даруй мне Свой покой всегда и во всем. Будь рядом со мной в
      каждый момент этого дня и направляй мои шаги.
    en: Lord of peace, give me Your peace at all times and in every way. Be close
      to me every moment today and guide my steps.
    es: Señor de paz, dame Tu paz en todo momento y de todas las maneras. Permanece
      cerca de mí hoy y guía cada uno de mis pasos.
    uk: Господи миру, даруй мені Свій спокій завжди і в усьому. Будь поруч зі мною
      в кожну мить цього дня і спрямовуй мої кроки.
- id: peace_rest_12
  ref: ph:4:6
  title:
    ru: Свобода от тревоги
    en: Freedom from Anxiety
    es: Libre de Ansiedad
    uk: Свобода від тривоги
  text:
    ru: Отец, я отдаю Тебе все свои тревоги в молитве. Наполни меня благодарностью
      и заменяй мое беспокойство Твоим тихим покоем.
    en: Father, I surrender all my anxieties to You in prayer. Fill me with gratitude
      and replace my worries with Your quiet peace.
    es: Padre, te entrego todas mis ansiedades en oración. Lléname de gratitud y reemplaza
      mi preocupación con Tu paz silenciosa.
    uk: Отче, я віддаю Тобі всі свої тривоги в молитві. Наповни мене вдячністю і заміни
      моє занепокоєння Твоїм тихим спокоем.
- id: peace_rest_13
  ref: is:32:17
  title:
    ru: Плод праведности
    en: Fruit of Righteousness
    es: Fruto de Justicia
    uk: Плід праведності
  text:
    ru: Господь, пусть Твоя праведность принесет в мою жизнь истинную тишину, безопасность
      и непоколебимую уверенность в Твоей любви.
    en: Lord, let Your righteousness bring true quietness, safety, and unwavering
      confidence in Your love into my daily life.
    es: Señor, que Tu justicia traiga a mi vida verdadera quietud, seguridad y una
      confianza inquebrantable en Tu inmenso amor.
    uk: Господи, нехай Твоя праведність принесе в моє життя справжню тишу, безпеку
      та непохитну впевненість у Твоїй любові.
- id: peace_rest_14
  ref: rm:15:13
  title:
    ru: Бог надежды
    en: God of Hope
    es: Dios de Esperanza
    uk: Бог надії
  text:
    ru: Бог надежды, наполни меня радостью и миром в вере, чтобы силой Духа Святого
      я преизобиловал надеждой каждый новый день.
    en: God of hope, fill me with all joy and peace as I trust in You, so that I may
      overflow with hope by the Holy Spirit's power.
    es: Dios de esperanza, lléname de gozo y paz al confiar en Ti, para que abunde
      en esperanza por el poder del Espíritu Santo.
    uk: Бог надії, наповни мене радістю та миром у вірі, щоб силою Духа Святого я
      мав надлишок надії кожного нового дня.
- id: peace_rest_15
  ref: 2ts:3:16
  title:
    ru: Сила и благословение
    en: Strength and Blessing
    es: Fuerza y Bendición
    uk: Сила і благословення
  text:
    ru: Господь, даруй силу Твоему народу и благослови меня Своим миром. Пусть Твое
      присутствие укрепляет меня во всех испытаниях.
    en: Lord, give strength to Your people and bless me with Your peace. May Your
      presence strengthen me in every trial I face today.
    es: Señor, da fuerza a Tu pueblo y bendíceme con Tu paz. Que Tu hermosa presencia
      me fortalezca en medio de cada prueba hoy.
    uk: Господи, даруй силу Твоєму народові та благослови мене Своїм миром. Нехай
      Твоя присутність зміцнює мене в усіх випробуваннях.
- id: peace_rest_16
  ref: jo:14:27
  title:
    ru: Любовь к Слову
    en: Love for the Word
    es: Amor por la Palabra
    uk: Любов до Слова
  text:
    ru: Отец, даруй великий мир моей душе через любовь к Твоему Слову. Пусть ничто
      не станет для меня преткновением на Твоем пути.
    en: Father, grant great peace to my soul through my love for Your Word. Let nothing
      cause me to stumble or lose my way today.
    es: Padre, concede gran paz a mi alma a través de mi amor por Tu Palabra. Que
      nada me haga tropezar ni perder el rumbo hoy.
    uk: Отче, даруй великий мир моїй душі через любов до Твого Слова. Нехай ніщо не
      стане для мене перешкодою на Твоєму шляху.
- id: peace_rest_17
  ref: cl:3:15
  title:
    ru: Владычество Христа
    en: Rule of Christ
    es: Reinado de Cristo
    uk: Владарювання Христа
  text:
    ru: Иисус, пусть Твой мир владычествует в моем сердце. Помоги мне жить в согласии
      с окружающими и всегда быть благодарным Тебе.
    en: Jesus, let Your peace rule in my heart. Help me to live in harmony with those
      around me and to always be grateful to You.
    es: Jesús, deja que Tu paz reine en mi corazón. Ayúdame a vivir en armonía con
      los que me rodean y a ser siempre agradecido.
    uk: Ісусе, нехай Твій мир владарює в моєму серці. Допоможи мені жити в злагоді
      з оточуючими та завжди бути вдячним Тобі.
- id: peace_rest_18
  ref: is:30:15
  title:
    ru: Тишина и упование
    en: Quietness and Trust
    es: Quietud y Confianza
    uk: Тиша та уповання
  text:
    ru: Господь, помоги мне находить спасение в тихом возвращении к Тебе. Даруй мне
      силу через спокойствие и полное доверие Тебе.
    en: Lord, help me find salvation in quietly returning to You. Grant me strength
      through peaceful rest and complete trust in You.
    es: Señor, ayúdame a encontrar salvación al volver a Ti. Dame fortaleza a través
      del descanso apacible y la confianza total en Ti.
    uk: Господи, допоможи мені знаходити спасіння у тихому поверненні до Тебе. Даруй
      мені силу через спокій та повну довіру Тобі.
- id: peace_rest_19
  ref: ps:62:1
  title:
    ru: Покой в Боге
    en: Rest in God
    es: Descanso en Dios
    uk: Спокій у Бозі
  text:
    ru: Боже, только в Тебе успокаивается моя душа. От Тебя приходит мое спасение,
      моя надежная крепость и мое утешение во всем.
    en: God, only in You does my soul find rest. From You comes my salvation, my strong
      fortress, and my comfort in all things.
    es: Dios, solo en Ti encuentra descanso mi alma. De Ti viene mi salvación, mi
      fortaleza segura y mi consuelo en todo momento.
    uk: Боже, тільки в Тобі заспокоюється моя душа. Від Тебе приходить моє спасіння,
      моя надійна фортеця та моє втішення в усьому.
- id: peace_rest_20
  ref: rm:8:6
  title:
    ru: Мысли Духа
    en: Mind of the Spirit
    es: Mente del Espíritu
    uk: Думки Духа
  text:
    ru: Дух Святой, направляй мои мысли к жизни и миру. Освободи мой разум от плотских
      забот и наполни его Твоей божественной тишиной.
    en: Holy Spirit, guide my thoughts toward life and peace. Free my mind from fleshly
      worries and fill it with Your divine silence.
    es: Espíritu Santo, guía mis pensamientos hacia la vida y la paz. Libera mi mente
      de afanes y llénala de Tu silencio divino.
    uk: Духу Святий, спрямовуй мої думки до життя та миру. Визволи мій розум від плотських
      турбот і наповни його Твоєю божественною тишею.
- id: peace_rest_21
  ref: mt:11:28
  title:
    ru: Возвращение души
    en: Return of the Soul
    es: Retorno del Alma
    uk: Повернення душі
  text:
    ru: Душа моя, вернись в свой покой, ибо Господь явил тебе милость Свою. Спасибо,
      Боже, за Твою бесконечную доброту и заботу.
    en: Return to your rest, my soul, for the Lord has been good to you. Thank You,
      God, for Your endless kindness and daily care.
    es: Vuelve a tu reposo, oh alma mía, porque el Señor te ha hecho bien. Gracias,
      Dios, por Tu infinita bondad y Tu cuidado diario.
    uk: Душе моя, повернися у свій спокій, бо Господь виявив до тебе милість Свою.
      Дякую, Боже, за Твою нескінченну доброту і турботу.
- id: peace_rest_22
  ref: gl:5:22
  title:
    ru: Плод Духа
    en: Fruit of the Spirit
    es: Fruto del Espíritu
    uk: Плід Духа
  text:
    ru: Господь, взрасти во мне плод Твоего Духа — любовь, радость и глубокий мир.
      Пусть эти качества преображают мою жизнь и общение.
    en: 'Lord, grow the fruit of Your Spirit in me: love, joy, and deep peace. Let
      these qualities transform my life and relationships.'
    es: 'Señor, cultiva en mí el fruto de Tu Espíritu: amor, gozo y paz profunda.
      Que estas virtudes transformen mi vida y relaciones.'
    uk: Господи, вирости в мені плід Твого Духа — любов, радість і глибокий мир. Нехай
      ці якості перетворюють моє життя та спілкування.
- id: peace_rest_23
  ref: hb:4:9
  title:
    ru: Обещанный покой
    en: Promised Rest
    es: Reposo Prometido
    uk: Обіцяний спокій
  text:
    ru: Отец, спасибо за Твой вечный покой, приготовленный для Твоего народа. Помоги
      мне верою входить в этот покой каждый день.
    en: Father, thank You for Your eternal rest prepared for Your people. Help me
      to enter into this rest by faith every single day.
    es: Padre, gracias por Tu reposo eterno preparado para Tu pueblo. Ayúdame a entrar
      en este descanso por la fe cada día de mi vida.
    uk: Отче, дякую за Твій вічний спокій, приготовлений для Твого народу. Допоможи
      мені вірою входити в цей спокій кожного дня.
- id: peace_rest_24
  ref: prv:3:24
  title:
    ru: Сладкий сон
    en: Sweet Sleep
    es: Sueño Dulce
    uk: Солодкий сон
  text:
    ru: Господь, когда я ложусь спать, избавь меня от страха. Даруй мне крепкий, сладкий
      и мирный сон под Твоей надежной защитой.
    en: Lord, when I lie down, deliver me from fear. Grant me sweet, peaceful, and
      deep sleep under Your secure and loving protection.
    es: Señor, cuando me acueste, líbrame del temor. Concédeme un sueño dulce, profundo
      y tranquilo bajo Tu amorosa protección.
    uk: Господи, коли я лягаю спати, визволи мене від страху. Даруй мені міцний, солодкий
      і мирний сон під Твоїм надійним захистом.
- id: peace_rest_25
  ref: is:54:10
  title:
    ru: Завет мира
    en: Covenant of Peace
    es: Pacto de Paz
    uk: Заповіт миру
  text:
    ru: Боже, Твоя милость никогда не отступит от меня, и Твой завет мира не поколеблется.
      Я доверяю Твоей вечной и верной любви.
    en: God, Your mercy will never depart from me, and Your covenant of peace will
      not be shaken. I trust in Your eternal, faithful love.
    es: Dios, Tu misericordia nunca se apartará de mí, ni Tu pacto de paz se moverá.
      Confío plenamente en Tu amor eterno y fiel.
    uk: Боже, Твоя милість ніколи не відступить від мене, і Твій заповіт миру не похитнеться.
      Я довіряю Твоїй вічній та вірній любові.
- id: peace_rest_26
  ref: ph:4:7
  title:
    ru: Превыше ума
    en: Beyond Understanding
    es: Más allá de la razón
    uk: Понад усякий розум
  text:
    ru: Господи, наполни мое сердце Твоим миром, который выше всякого ума. Пусть он
      хранит мои мысли и чувства от тревог в Иисусе Христе.
    en: Lord, fill my heart with Your peace that surpasses all understanding. Guard
      my mind and feelings from worries in Christ Jesus.
    es: Señor, llena mi corazón con Tu paz que sobrepasa todo entendimiento. Guarda
      mis pensamientos y sentimientos de la ansiedad en Cristo.
    uk: Господи, наповни моє серце Твоїм миром, що вищий за всякий розум. Нехай він
      береже мої думки та почуття від тривог у Христі Ісусі.
- id: peace_rest_27
  ref: jo:14:27
  title:
    ru: Сердце без страха
    en: Heart Without Fear
    es: Corazón sin temor
    uk: Серце без страху
  text:
    ru: Иисус, я принимаю Твой мир, который Ты оставил нам. Помоги моему сердцу не
      смущаться и не бояться, ведь Ты всегда рядом со мной.
    en: Jesus, I receive the peace You left for us. Help my heart not to be troubled
      or afraid, knowing that You are always with me.
    es: Jesús, recibo la paz que nos dejaste. Ayuda a mi corazón a no turbarse ni
      tener miedo, sabiendo que siempre estás conmigo.
    uk: Ісусе, я приймаю Твій мир, який Ти залишив нам. Допоможи моєму серцю не тривожитися
      і не лякатися, адже Ти завжди поруч зі мною.
- id: peace_rest_28
  ref: mt:11:28
  title:
    ru: Покой для души
    en: Rest for the Soul
    es: Descanso del alma
    uk: Спокій для душі
  text:
    ru: Господи, я прихожу к Тебе со всеми своими заботами и усталостью. Даруй моей
      душе Твой глубокий покой и облегчи мое бремя сегодня.
    en: Lord, I come to You with all my cares and weariness. Grant my soul Your deep
      rest and gently lighten my burden today according to Your promise.
    es: Señor, vengo a Ti con todas mis cargas y cansancio. Concede a mi alma Tu descanso
      profundo y alivia suavemente mi carga hoy.
    uk: Господи, я приходжу до Тебе з усіма своїми турботами та втомою. Даруй моїй
      душі Твій глибокий спокій і полегши мій тягар сьогодні.
- id: peace_rest_29
  ref: is:26:3
  title:
    ru: Разум, укреплённый в Тебе
    en: Mind Anchored in You
    es: Mente firme en Ti
    uk: Розум, укріплений у Тобі
  text:
    ru: Отец, укрепи мой разум в Тебе. Я доверяю Твоей любви и верю, что Ты сохранишь
      меня в совершенном мире посреди любых жизненных бурь.
    en: Father, anchor my mind in You. I trust in Your love and believe that You will
      keep me in perfect peace amidst any storms of life.
    es: Padre, afirma mi mente en Ti. Confío en Tu amor y creo que me mantendrás en
      perfecta paz en medio de cualquier tormenta de la vida.
    uk: Отче, зміцни мій розум у Тобі. Я довіряю Твоїй любові й вірю, що Ти збережеш
      мене в досконалому мирі серед будь-яких життєвих бур.
- id: peace_rest_30
  ref: ps:23:2
  title:
    ru: Мой Добрый Пастырь
    en: My Good Shepherd
    es: Mi Buen Pastor
    uk: Мій Добрий Пастир
  text:
    ru: Мой Добрый Пастырь, поведи меня к тихим водам и уложи на зеленых пажитях.
      Обнови мои силы и наполни мою душу Своим тихим присутствием.
    en: My Good Shepherd, lead me beside still waters and make me lie down in green
      pastures. Restore my strength and fill my soul with Your quiet presence.
    es: Mi Buen Pastor, llévame a aguas de reposo y hazme descansar en verdes pastos.
      Restaura mis fuerzas y llena mi alma con Tu dulce presencia.
    uk: Мій Добрий Пастирю, веди мене до тихих вод і поклади на зелених пасовищах.
      Віднови мої сили та наповни мою душу Своєю тихою присутністю.
- id: hope_confidence_01
  ref: jr:29:11
  title:
    ru: Источник будущего
    en: Source of the Future
    es: Futuro y esperanza
    uk: Джерело майбутнього
  text:
    ru: Господи, верю, что Твои намерения обо мне — во благо и для мира. Дай мне доверяться
      Твоим планам даже в неизвестности.
    en: Lord, I believe Your plans for me are for good and peace. Help me trust Your
      path even in times of uncertainty.
    es: Señor, creo que Tus planes para mí son de bien y paz. Ayúdame a confiar en
      Tu camino incluso en la incertidumbre.
    uk: Господи, вірю, що Твої плани щодо мене — на благо і для миру. Дай мені довірятися
      Тобі навіть у невідомості.
- id: hope_confidence_02
  ref: rm:15:13
  title:
    ru: Радость упования
    en: Joy in Hope
    es: Gozo en la esperanza
    uk: Радість надії
  text:
    ru: Боже надежды, наполни меня радостью и миром в вере. Пусть Твой Дух умножает
      во мне уверенность в Твоей благости каждый день.
    en: God of hope, fill me with joy and peace in believing. May Your Spirit multiply
      my confidence in Your goodness every day.
    es: Dios de esperanza, lléname de gozo y paz en la fe. Que Tu Espíritu multiplique
      mi confianza en Tu bondad cada día.
    uk: Боже надії, наповни мене радістю та миром у вірі. Нехай Твій Дух примножує
      в мені впевненість у Твоїй благості щодня.
- id: hope_confidence_03
  ref: hb:11:1
  title:
    ru: Уверенность в невидимом
    en: Confidence in the Unseen
    es: Certeza de lo invisible
    uk: Певність невидимого
  text:
    ru: Отец, укрепи мою веру, чтобы я ясно видел Твои невидимые обещания и твердо
      стоял на них, ожидая Твоего благословения.
    en: Father, strengthen my faith so that I can clearly see Your unseen promises
      and stand firm, waiting for Your blessing.
    es: Padre, fortalece mi fe para que pueda ver claramente Tus promesas invisibles
      y mantenerme firme en Tu bendición.
    uk: Отче, зміцни мою віру, щоб я ясно бачив Твої невидимі обітниці та твердо стояв
      на них, чекаючи на Твоє благословення.
- id: hope_confidence_04
  ref: ps:39:7
  title:
    ru: Мое упование
    en: My Hope
    es: Mi esperanza
    uk: Моє уповання
  text:
    ru: Господи, на кого мне еще надеяться в этом мире? Вся моя надежда — только в
      Тебе, Твоей верности и бесконечной любви.
    en: Lord, whom else can I hope for in this world? My entire hope is only in You,
      Your faithfulness, and Your endless love.
    es: Señor, ¿en quién más puedo esperar en este mundo? Toda mi esperanza está en
      Ti, en Tu fidelidad y Tu infinito amor.
    uk: Господи, на кого мені ще сподіватися в цьому світі? Вся моя надія — лише на
      Тебе, Твою вірність та безмежну любов.
- id: hope_confidence_05
  ref: rm:5:5
  title:
    ru: Чистая надежда
    en: Unshakable Hope
    es: Esperanza firme
    uk: Чиста надія
  text:
    ru: Боже, Твоя надежда никогда не постыжает. Излей Свою любовь в мое сердце Духом
      Святым и утешь меня в трудные минуты.
    en: God, Your hope never disappoints. Pour Your love into my heart through the
      Holy Spirit and comfort me in difficult times.
    es: Dios, Tu esperanza nunca avergüenza. Derrama Tu amor en mi corazón por el
      Espíritu Santo y consuélame en momentos difíciles.
    uk: Боже, Твоя надія ніколи не засоромить. Вилий Свою любов у моє серце Духом
      Святим і втіш мене у важкі хвилини.
- id: hope_confidence_06
  ref: ps:62:5
  title:
    ru: Покой души
    en: Silence and Hope
    es: Reposo del alma
    uk: Спокій душі
  text:
    ru: Душа моя, уповай только на Бога, ведь от Него приходит спасение и надежда.
      Господи, даруй мне Твой глубокий покой.
    en: My soul, wait silently for God alone, for my expectation is from Him. Lord,
      grant me Your deep and calming peace.
    es: Alma mía, en Dios solamente reposa, porque de Él viene mi esperanza. Señor,
      concédeme Tu paz profunda y reconfortante.
    uk: Душе моя, уповай тільки на Бога, бо від Нього спасіння моє. Господи, даруй
      мені Твій глибокий і заспокійливий спокій.
- id: hope_confidence_07
  ref: is:26:3
  title:
    ru: Мысли, устремлённые к Тебе
    en: Thoughts Fixed on You
    es: Pensamientos en Ti
    uk: Думки, спрямовані до Тебе
  text:
    ru: Господи, сохрани мое сердце в совершенном мире, когда я направляю свои мысли
      к Тебе и полностью доверяю Твоей воле.
    en: Lord, keep my heart in perfect peace as I direct my thoughts to You and trust
      completely in Your sovereign will.
    es: Señor, guarda mi corazón en perfecta paz mientras dirijo mis pensamientos
      a Ti y confío plenamente en Tu voluntad.
    uk: Господи, збережи моє серце в досконалому мирі, коли я спрямовую свої думки
      до Тебе і повністю довіряю Твоїй волі.
- id: hope_confidence_08
  ref: ph:1:6
  title:
    ru: Верность Бога
    en: God's Faithfulness
    es: Fiel Creador
    uk: Вірність Бога
  text:
    ru: Господи, верю, что начатое Тобой доброе дело во мне Ты доведешь до конца.
      Уповаю на Твою благодать и преображающую силу.
    en: Lord, I believe that the good work You started in me will be completed. I
      trust in Your grace and transforming power.
    es: Señor, creo que la buena obra que comenzaste en mí será completada. Confío
      en Tu gracia y en Tu poder transformador.
    uk: Господи, вірю, що розпочату Тобою добру справу в мені Ти доведеш до кінця.
      Уповаю на Твою благодать і силу.
- id: hope_confidence_09
  ref: hb:10:23
  title:
    ru: Стойкость веры
    en: Hold Fast
    es: Mantenerse firme
    uk: Стійкість віри
  text:
    ru: Боже, помоги мне непоколебимо держаться исповедания надежды, ведь Ты верен
      Своим обещаниям и никогда не оставишь меня.
    en: God, help me hold fast the confession of my hope without wavering, for You
      are faithful to Your promises and will never leave me.
    es: Dios, ayúdame a mantener firme la confesión de mi esperanza, porque Tú eres
      fiel a Tus promesas y nunca me dejarás.
    uk: Боже, допоможи мені непохитно триматися визнання надії, адже Ти вірний Своїм
      обітницям і ніколи не залишиш мене.
- id: hope_confidence_10
  ref: 1pe:1:3
  title:
    ru: Живая надежда
    en: Living Hope
    es: Esperanza viva
    uk: Жива надія
  text:
    ru: Отец, спасибо за Твою великую милость и живую надежду, которую Ты даровал
      мне через воскресение Иисуса Христа из мертвых.
    en: Father, thank You for Your great mercy and the living hope You have given
      me through the resurrection of Jesus Christ.
    es: Padre, gracias por Tu gran misericordia y la esperanza viva que me has dado
      mediante la resurrección de Jesucristo.
    uk: Отче, дякую за Твою велику милість і живу надію, яку Ти дарував мені через
      воскресіння Ісуса Христа з мертвих.
- id: hope_confidence_11
  ref: ps:71:5
  title:
    ru: Моя опора
    en: My Trust
    es: Mi refugio
    uk: Моя опора
  text:
    ru: Господи, Ты — надежда моя от самой юности. Помоги мне всегда опираться на
      Тебя во всех жизненных трудностях и испытаниях.
    en: Lord, You are my hope from my youth. Help me always rely on You in all of
      life's difficulties and trials.
    es: Señor, Tú eres mi esperanza desde mi juventud. Ayúdame a apoyarme siempre
      en Ti en todas las dificultades y pruebas.
    uk: Господи, Ти — надія моя від самої юності. Допоможи мені завжди спиратися на
      Тебе в усіх життєвих труднощах і випробуваннях.
- id: hope_confidence_12
  ref: prv:3:5
  title:
    ru: Доверяю всем сердцем
    en: Trusting with All My Heart
    es: Confío de todo corazón
    uk: Довіряю всім серцем
  text:
    ru: Боже, научи меня доверять Тебе всем сердцем и не полагаться на свой разум.
      Веди меня Своим путем истины и блага.
    en: God, teach me to trust You with all my heart and not lean on my own understanding.
      Guide me in Your path of truth and good.
    es: Dios, enséñame a confiar en Ti con todo mi corazón y no apoyarme en mi prudencia.
      Guíame por Tu camino de verdad y bien.
    uk: Боже, навчи мене довіряти Тобі всім серцем і не покладатися на власний розум.
      Веди мене Твоїм шляхом істини та добра.
- id: hope_confidence_13
  ref: lm:3:25
  title:
    ru: Ожидание Господа
    en: Waiting in Hope
    es: Espera en el Señor
    uk: Очікування Господа
  text:
    ru: Господи, душа моя ждет Тебя и уповает на Твое слово. Наполни меня терпением
      и тихой уверенностью в Твоем скором ответе.
    en: Lord, my soul waits for You, and in Your word I hope. Fill me with patience
      and quiet confidence in Your timely answer.
    es: Señor, mi alma espera en Ti, y en Tu palabra pongo mi esperanza. Lléname de
      paciencia y confianza en Tu pronta respuesta.
    uk: Господи, душа моя чекає на Тебе, і на Твоє слово я уповаю. Наповни мене терпінням
      і тихою впевненістю у Твоїй відповіді.
- id: hope_confidence_14
  ref: lm:3:24
  title:
    ru: Моя часть
    en: My Portion
    es: Mi porción
    uk: Моя частка
  text:
    ru: Господь — часть моя, поэтому я буду уповать на Него. Отец, Ты — все, что мне
      нужно для счастья и полноты жизни.
    en: The Lord is my portion, therefore I will hope in Him. Father, You are everything
      I need for happiness and fullness of life.
    es: El Señor es mi porción, por tanto en Él esperaré. Padre, Tú eres todo lo que
      necesito para la felicidad y plenitud de vida.
    uk: Господь — частка моя, тому я буду уповати на Нього. Отче, Ти — все, що мені
      потрібно для щастя та повноти життя.
- id: hope_confidence_15
  ref: rm:12:12
  title:
    ru: Радость и терпение
    en: Rejoice in Hope
    es: Gozosos en esperanza
    uk: Радість і терпіння
  text:
    ru: Господи, научи меня радоваться надеждой, быть терпеливым в скорби и постоянным
      в молитве. Дай сил проходить любые сезоны.
    en: Lord, teach me to rejoice in hope, be patient in tribulation, and constant
      in prayer. Give me strength for every season.
    es: Señor, enséñame a gozarme en la esperanza, ser paciente en la tribulación
      y constante en la oración. Dame fuerzas siempre.
    uk: Господи, навчи мене радіти надією, бути терплячим у скорботі та постійним
      у молитві. Дай сил проходити будь-які часи.
- id: hope_confidence_16
  ref: prv:30:5
  title:
    ru: Под крылом Твоим
    en: Under Your Wing
    es: Bajo tus alas
    uk: Під крилом Твоїм
  text:
    ru: Ты — мой покров и щит, Господи; на слово Твое я уповаю. Укрой меня от жизненных
      бурь под крылом Твоей любви.
    en: You are my hiding place and my shield, Lord; I hope in Your word. Shelter
      me from life's storms under Your wing of love.
    es: Mi refugio y mi escudo eres Tú, Señor; en Tu palabra espero. Protégeme de
      las tormentas bajo el ala de Tu gran amor.
    uk: Ти — моє сховище і мій щит, Господи; на слово Твоє я уповаю. Сховай мене від
      життєвих бур під крилом Твоєї любові.
- id: hope_confidence_17
  ref: mi:7:7
  title:
    ru: Взгляд веры
    en: Looking to God
    es: Mirar al Señor
    uk: Погляд віри
  text:
    ru: Господи, я буду взирать на Тебя и уповать на Бога спасения моего. Верю, что
      Ты слышишь каждый мой тихий вздох.
    en: Lord, I will look to You and wait for the God of my salvation. I believe that
      You hear my every quiet sigh and prayer.
    es: Señor, miraré hacia Ti y esperaré al Dios de mi salvación. Creo que escuchas
      cada uno de mis suspiros y oraciones.
    uk: Господи, я буду дивитися на Тебе і уповати на Бога спасіння мого. Вірю, що
      Твоє вухо нахилене до кожного мого зітхання.
- id: hope_confidence_18
  ref: cl:1:27
  title:
    ru: Надежда славы
    en: Hope of Glory
    es: Esperanza de gloria
    uk: Надія слави
  text:
    ru: Иисус, Ты во мне — упование славы. Твое присутствие наполняет мою жизнь глубоким
      смыслом и уверенностью в будущем.
    en: Jesus, You in me are the hope of glory. Your presence fills my life with deep
      meaning and confidence in the future.
    es: Jesús, Tú en mí eres la esperanza de gloria. Tu presencia llena mi vida de
      un profundo significado y confianza en el mañana.
    uk: Ісусе, Твоя присутність у мені — це надія слави. Вона наповнює моє життя глибоким
      змістом і впевненістю у майбутньому.
- id: hope_confidence_19
  ref: 1jo:3:3
  title:
    ru: Чистота надежды
    en: Purifying Hope
    es: Esperanza purificadora
    uk: Чистота надії
  text:
    ru: Господи, пусть надежда на встречу с Тобой очищает мое сердце и вдохновляет
      меня жить праведно, подражая Твоей святости.
    en: Lord, let the hope of meeting You purify my heart and inspire me to live righteously,
      reflecting Your holiness.
    es: Señor, que la esperanza de verte purifique mi corazón y me inspire a vivir
      rectamente, reflejando Tu gran santidad.
    uk: Господи, нехай надія на зустріч із Тобою очищує моє серце та надихає мене
      жити праведно, наслідуючи Твою святість.
- id: hope_confidence_20
  ref: ps:33:22
  title:
    ru: Твоя милость
    en: Your Mercy
    es: Tu misericordia
    uk: Твоя милість
  text:
    ru: Да будет милость Твоя, Господи, над нами, как мы уповаем на Тебя. Укрепи нашу
      веру и благослови Своим присутствием.
    en: Let Your mercy, Lord, be upon us, just as we hope in You. Strengthen our faith
      and bless us with Your divine presence.
    es: Sea Tu misericordia, Señor, sobre nosotros, según esperamos en Ti. Fortalece
      nuestra fe y bendícenos con Tu presencia.
    uk: Нехай милість Твоя, Господи, буде над нами, бо ми уповаємо на Тебе. Зміцни
      нашу віру та благослови Своєю присутністю.
- id: hope_confidence_21
  ref: rm:15:13
  title:
    ru: Источник надежды
    en: Source of Hope
    es: Fuente de Esperanza
    uk: Джерело надії
  text:
    ru: Господи, наполни моё сердце радостью и миром в вере, чтобы сила Твоего Святого
      Духа изливала во мне изобилие живой надежды каждый день.
    en: Lord, fill my heart with joy and peace in believing, so that the power of
      Your Holy Spirit may overflow in me with living hope every day.
    es: Señor, llena mi corazón de gozo y paz al creer, para que el poder de Tu Santo
      Espíritu desborde en mí una viva esperanza cada día.
    uk: Господи, наповни моє серце радістю та миром у вірі, щоб сила Твого Святого
      Духа виливала в мені достаток живої надії щодня.
- id: hope_confidence_22
  ref: hb:11:1
  title:
    ru: Живая уверенность
    en: Living Assurance
    es: Certeza Viva
    uk: Жива впевненість
  text:
    ru: Отец, даруй мне твердую веру, которая видит невидимое и дает уверенность в
      Твоих обещаниях, даже когда обстоятельства кажутся сложными.
    en: Father, grant me a firm faith that sees the unseen and gives assurance of
      Your promises, even when circumstances seem difficult.
    es: Padre, concédeme una fe firme que vea lo invisible y me dé la seguridad de
      Tus promesas, aun cuando las circunstancias parezcan difíciles.
    uk: Отче, даруй мені тверду віру, яка бачить невидиме та дає впевненість у Твоїх
      обітницях, навіть коли обставини здаються складними.
- id: hope_confidence_23
  ref: jr:29:11
  title:
    ru: Твои намерения
    en: Your Plans
    es: Tus Planes
    uk: Твої наміри
  text:
    ru: Боже, я доверяю Твоим планам обо мне. Верю, что Твои мысли — во благо, а не
      во зло, и Ты даруешь мне прекрасное будущее и надежду.
    en: God, I trust Your plans for me. I believe Your thoughts are for peace and
      not for evil, to give me a future and a bright hope.
    es: Dios, confío en Tus planes para mí. Creo que Tus pensamientos son de paz y
      no de mal, para darme un futuro y una hermosa esperanza.
    uk: Боже, я довіряю Твоїм планам щодо мене. Вірю, що Твої думки — на добро, а
      не на зло, і Ти даруєш мені прекрасне майбутнє та надію.
- id: hope_confidence_24
  ref: ps:39:7
  title:
    ru: Упование на Тебя
    en: Hope in You
    es: Esperanza en Ti
    uk: Надія на Тебе
  text:
    ru: Господи, на что еще мне надеяться в этом изменчивом мире? Моё сердце и вся
      моя жизнь уповают только на Тебя, Твою любовь и верность.
    en: Lord, what else can I hope for in this changing world? My heart and my entire
      life rely only on You, Your love, and Your faithfulness.
    es: Señor, ¿qué más puedo esperar en este mundo cambiante? Mi corazón y toda mi
      vida confían solo en Ti, en Tu amor y Tu fidelidad.
    uk: Господи, на що ще мені сподіватися в цьому мінливому світі? Моє серце і все
      моє життя уповають лише на Тебе, Твою любов та вірність.
- id: hope_confidence_25
  ref: rm:8:24
  title:
    ru: Спасенные в надежде
    en: Saved in Hope
    es: Salvos en Esperanza
    uk: Спасенні в надії
  text:
    ru: Отец, помоги мне терпеливо ожидать исполнения Твоих обещаний. Твоя надежда
      спасает меня от уныния и направляет мой взор к вечности.
    en: Father, help me to wait patiently for the fulfillment of Your promises. Your
      hope saves me from despair and points my gaze toward eternity.
    es: Padre, ayúdame a esperar con paciencia el cumplimiento de Tus promesas. Tu
      esperanza me salva del desánimo y dirige mi mirada hacia la eternidad.
    uk: Отче, допоможи мені терпляче чекати на виконання Твоїх обітниць. Твоя надія
      рятує мене від зневіри та спрямовує мій погляд до вічності.
- id: hope_confidence_26
  ref: lm:3:24
  title:
    ru: Моё наследие
    en: My Inheritance
    es: Mi herencia
    uk: Моя спадщина
  text:
    ru: Господи, Ты — моя доля и наследие. Моя душа твердо знает это, поэтому я буду
      уповать на Тебя во всех жизненных трудностях и испытаниях.
    en: Lord, You are my portion and inheritance. My soul knows this well, so I will
      hope in You through all of life's trials and difficulties.
    es: Señor, Tú eres mi porción y mi herencia. Mi alma lo sabe muy bien, por eso
      esperaré en Ti en medio de todas las pruebas y dificultades.
    uk: Господи, Ти — моя частка і спадщина. Моя душа твердо знає це, тому я буду
      уповати на Тебе в усіх життєвих труднощах та випробуваннях.
- id: hope_confidence_27
  ref: ps:62:5
  title:
    ru: Только в Тебе покой
    en: In You Alone
    es: Solo en Ti
    uk: Тільки в Тобі спокій
  text:
    ru: Боже, даруй моей душе покой только в Тебе. Избавь меня от тревоги, ведь от
      Тебя исходит моя надежда, спасение и крепкое основание.
    en: God, grant my soul rest in You alone. Deliver me from anxiety, for from You
      comes my hope, my salvation, and my strong foundation.
    es: Dios, concede a mi alma descanso solo en Ti. Líbrame de la ansiedad, porque
      de Ti proviene mi esperanza, mi salvación y mi firme fundamento.
    uk: Боже, даруй моїй душі спокій тільки в Тобі. Визволи мене від тривоги, адже
      від Тебе походить моя надія, спасіння та міцна основа.
- id: hope_confidence_28
  ref: hb:10:23
  title:
    ru: Непоколебимая вера
    en: Unwavering Faith
    es: Fe Inquebrantable
    uk: Непохитна віра
  text:
    ru: Отец, укрепи меня твердо держаться исповедания надежды, не колеблясь, ведь
      Ты обещал быть со мной, а Твое слово абсолютно верно.
    en: Father, strengthen me to hold fast the confession of my hope without wavering,
      for You who promised are completely faithful.
    es: Padre, fortaléceme para mantener firme la confesión de mi esperanza sin dudar,
      porque Tú, que lo prometiste, eres completamente fiel.
    uk: Отче, зміцни мене твердо триматися визнання надії без вагань, адже Ти обіцяв
      бути зі мною, а Твоє слово абсолютно вірне.
- id: hope_confidence_29
  ref: 1pe:1:3
  title:
    ru: Надежда воскресения
    en: Hope of the Resurrection
    es: Esperanza de la resurrección
    uk: Надія воскресіння
  text:
    ru: Слава Тебе, Боже, за Твою великую милость! Через воскресение Иисуса Христа
      Ты возродил меня к живой надежде, которая побеждает смерть.
    en: Glory to You, God, for Your great mercy! Through the resurrection of Jesus
      Christ, You have reborn me into a living hope that overcomes death.
    es: ¡Gloria a Ti, Dios, por Tu gran misericordia! Por la resurrección de Jesucristo,
      me has hecho renacer para una esperanza viva que vence a la muerte.
    uk: Слава Тобі, Боже, за Твою велику милість! Через воскресіння Ісуса Христа Ти
      відродив мене до живої надії, яка перемагає смерть.
- id: hope_confidence_30
  ref: ps:71:5
  title:
    ru: Надежда от юности
    en: My Hope Since Youth
    es: Mi esperanza desde la juventud
    uk: Надія від юності
  text:
    ru: Господи, Ты — моя надежда от самой юности. Твоя любовь хранит меня на протяжении
      всей жизни, и я полностью доверяю Твоему руководству.
    en: Lord, You have been my hope since my youth. Your love preserves me throughout
      my entire life, and I completely trust in Your guidance.
    es: Señor, Tú has sido mi esperanza desde mi juventud. Tu amor me guarda a lo
      largo de toda mi vida, y confío plenamente en Tu guía.
    uk: Господи, Ти — моя надія від самої юності. Твоя любов береже мене протягом
      усього життя, і я повністю довіряю Твоєму керівництву.
- id: love_mercy_01
  ref: 1jo:4:19
  title:
    ru: Источник любви
    en: Source of Love
    es: Fuente de amor
    uk: Джерело любові
  text:
    ru: Господи, спасибо за Твою безусловную любовь, которая коснулась меня первым.
      Научи меня любить других так же бескорыстно, как Ты полюбил меня.
    en: Lord, thank You for Your unconditional love that reached me first. Teach me
      to love others as selflessly as You have loved me.
    es: Señor, gracias por Tu amor incondicional que me alcanzó primero. Enséñame
      a amar a los demás con el mismo desinterés con que Tú me has amado.
    uk: Господи, дякую за Твою безумовну любов, яка торкнулася мене першою. Навчи
      мене любити інших так само безкорисливо, як Ти полюбив мене.
- id: love_mercy_02
  ref: 1co:13:4
  title:
    ru: Терпеливая любовь
    en: Patient Love
    es: Amor paciente
    uk: Терпелива любов
  text:
    ru: Отец, наполни моё сердце долготерпением и добротой. Помоги мне не завидовать,
      не гордиться и всегда проявлять Твою мягкость к окружающим.
    en: Father, fill my heart with patience and kindness. Help me not to envy or boast,
      but to always show Your gentleness to those around me.
    es: Padre, llena mi corazón de paciencia y bondad. Ayúdame a no tener envidia
      ni orgullo, sino a mostrar siempre Tu dulzura a los demás.
    uk: Отче, наповни моє серце довготерпінням і добротою. Допоможи мне не заздрити,
      не пишатися і завжди виявляти Твою лагідність до ближніх.
- id: love_mercy_03
  ref: ps:136:1
  title:
    ru: Вечная милость
    en: Eternal Mercy
    es: Misericordia eterna
    uk: Вічна милість
  text:
    ru: Господи, славлю Тебя за Твою благость. Твоё милосердие ко мне длится вечно,
      оно обновляется каждое утро и хранит меня на всех путях моих.
    en: Lord, I praise You for Your goodness. Your mercy toward me endures forever,
      renewing every morning and keeping me safe on all my paths.
    es: Señor, te alabo por Tu bondad. Tu misericordia para conmigo dura para siempre,
      se renueva cada mañana y me guarda en todos mis caminos.
    uk: Господи, славлю Тебе за Твою добрість. Твоє милосердя до мене триває вічно,
      воно оновлюється щоранку і береже мене на всіх моїх дорогах.
- id: love_mercy_04
  ref: is:54:10
  title:
    ru: Непоколебимый союз
    en: Unshakable Covenant
    es: Pacto inquebrantable
    uk: Непохитний завіт
  text:
    ru: Боже, даже если горы сдвинутся, Твоя милость не отступит от меня. Спасибо
      за Твой вечный мир и любовь, которые дают мне твёрдую опору.
    en: God, even if the mountains depart, Your mercy will not leave me. Thank You
      for Your eternal peace and love, which give me a firm foundation.
    es: Dios, aunque las montañas se muevan, Tu misericordia no se apartará de mí.
      Gracias por Tu paz y amor eternos, que me dan un firme apoyo.
    uk: Боже, навіть якщо гори зрушаться, Твоя милість не відступить від мене. Дякую
      за Твій вічний мир і любов, які дають мені тверду опору.
- id: love_mercy_05
  ref: lm:3:22
  title:
    ru: Новое утро
    en: New Every Morning
    es: Nueva mañana
    uk: Новий ранок
  text:
    ru: Господи, Твоё милосердие не истощилось, и Твоя любовь не угасла. Спасибо,
      что Твоя верность велика и Твоя милость обновляется для меня сегодня.
    en: Lord, Your mercy has not ceased, and Your love has not faded. Thank You that
      Your faithfulness is great and Your mercy is renewed for me today.
    es: Señor, Tu misericordia no se ha agotado y Tu amor no se ha apagado. Gracias
      porque Tu fidelidad es grande y Tu gracia se renueva hoy para mí.
    uk: Господи, Твоє милосердя не вичерпалося, і Твоя любов не згасла. Дякую, що
      Твоя вірність велика і Твоя милість оновлюється для мене сьогодні.
- id: love_mercy_06
  ref: mi:7:18
  title:
    ru: Прощающий Бог
    en: Forgiving God
    es: Dios perdonador
    uk: Бог, що прощає
  text:
    ru: Отец, Ты не вечно гневаешься, потому что любишь миловать. Омой моё сердце,
      прости мои грехи и даруй мне радость Твоего прощения.
    en: Father, You do not stay angry forever because You delight in mercy. Wash my
      heart, forgive my sins, and grant me the joy of Your forgiveness.
    es: Padre, no guardas el enojo para siempre porque te deleitas en la misericordia.
      Lava mi corazón, perdona mis pecados y dame el gozo de Tu perdón.
    uk: Отче, Ти не гніваєшся вічно, бо любиш милувати. Омий моє серце, прости мої
      гріхи й даруй мені радість Твого прощення.
- id: love_mercy_07
  ref: jo:3:16
  title:
    ru: Дар спасения
    en: Gift of Salvation
    es: Regalo de salvación
    uk: Дар спасіння
  text:
    ru: Иисус, спасибо за Твою великую жертву любви на кресте. Верю Тебе и принимаю
      Твой дар вечной жизни, наполненный Твоей благодатью.
    en: Jesus, thank You for Your great sacrifice of love on the cross. I believe
      in You and accept Your gift of eternal life, filled with Your grace.
    es: Jesús, gracias por Tu gran sacrificio de amor en la cruz. Creo en Ti y acepto
      Tu regalo de vida eterna, lleno de Tu maravillosa gracia.
    uk: Ісусе, дякую за Твою велику жертву любові на хресті. Вірю Тобі й приймаю Твій
      дар вічного життя, наповнений Твоєю благодаттю.
- id: love_mercy_08
  ref: eph:2:4
  title:
    ru: Богатство милости
    en: Rich in Mercy
    es: Rico en misericordia
    uk: Багатство милості
  text:
    ru: Господи, Ты богат милостью и возлюбил меня великой любовью, когда я был ещё
      слаб. Благодарю за Твою спасительную благодать, оживившую меня.
    en: Lord, You are rich in mercy and loved me with a great love even when I was
      weak. Thank You for Your saving grace that brought me to life.
    es: Señor, eres rico en misericordia y me amaste con gran amor cuando aún era
      débil. Gracias por Tu gracia salvadora que me ha dado vida.
    uk: Господи, Ти багатий на милість і полюбив мене великою любов'ю, коли я був
      ще слабким. Дякую за Твою спасительну благодать, що оживила мене.
- id: love_mercy_09
  ref: 1pe:4:8
  title:
    ru: Покрывающая любовь
    en: Love Covers All
    es: El amor cubre todo
    uk: Любов, що покриває
  text:
    ru: Отец, помоги мне иметь усердную любовь к ближним. Пусть Твоё прощение течёт
      через меня, чтобы я мог покрывать ошибки других любовью.
    en: Father, help me to have earnest love for others. Let Your forgiveness flow
      through me, so that I may cover the mistakes of others with love.
    es: Padre, ayúdame a tener un amor ferviente hacia los demás. Que Tu perdón fluya
      a través de mí, para que pueda cubrir las faltas ajenas con amor.
    uk: Отче, допоможи мені мати ревну любов до ближніх. Нехай Твоє прощення тече
      через мене, щоб я міг покривати помилки інших любов'ю.
- id: love_mercy_10
  ref: ps:103:8
  title:
    ru: Щедрый на милость
    en: Abounding in Love
    es: Abundante en gracia
    uk: Щедрий на милість
  text:
    ru: Господи, Ты щедр, милостив и долготерпелив. Спасибо, что не судишь меня строго,
      но окружаешь Своей нежной любовью и прощаешь мои слабости.
    en: Lord, You are gracious, merciful, and slow to anger. Thank You for not judging
      me harshly, but surrounding me with Your tender love and forgiveness.
    es: Señor, eres clemente, misericordioso y lento para la ira. Gracias por no juzgarme
      con dureza, sino rodearme con Tu tierno amor y perdón.
    uk: Господи, Ти щедрий, милостивий і довготерпеливий. Дякую, що не судиш мене
      суворо, але оточуєш Своєю ніжною любов'ю та прощаєш мої слабкості.
- id: love_mercy_11
  ref: rm:5:8
  title:
    ru: Доказательство любви
    en: Proof of Love
    es: Prueba de amor
    uk: Доказ любові
  text:
    ru: 'Боже, Твоя любовь доказана делом: Христос умер за меня, когда я был грешником.
      Благодарю за это великое примирение и Твою вечную доброту.'
    en: 'God, Your love is proven by action: Christ died for me while I was still
      a sinner. Thank You for this great reconciliation and Your eternal kindness.'
    es: 'Dios, Tu amor se demuestra con hechos: Cristo murió por mí siendo aún pecador.
      Gracias por esta gran reconciliación y Tu eterna bondad.'
    uk: 'Боже, Твоя любов доведена ділом: Христос помер за мене, коли я був грішником.
      Дякую за це велике примирення та Твою вічну доброту.'
- id: love_mercy_12
  ref: 1jo:4:8
  title:
    ru: Бог есть любовь
    en: God is Love
    es: Dios es amor
    uk: Бог є любов
  text:
    ru: Господи, Ты Сам есть любовь. Помоги мне познавать Тебя глубже каждый день,
      чтобы моя жизнь была наполнена Твоим присутствием и Твоим сердцем.
    en: Lord, You Yourself are love. Help me to know You deeper every day, so that
      my life may be filled with Your presence and Your loving heart.
    es: Señor, Tú mismo eres amor. Ayúdame a conocerte más profundamente cada día,
      para que mi vida esté llena de Tu presencia y de Tu tierno corazón.
    uk: Господи, Ти Сам є любов. Допоможи мені пізнавати Тебе глибше щодня, щоб моє
      життя було наповнене Твоїм єством і Твоїм люблячим серцем.
- id: love_mercy_13
  ref: cl:3:14
  title:
    ru: Одежда любви
    en: Clothed in Love
    es: Vestidos de amor
    uk: Одяг любові
  text:
    ru: Иисус, помоги мне облечься в любовь, которая объединяет всё в совершенной
      гармонии. Пусть она руководит моими словами, мыслями и делами.
    en: Jesus, help me to clothe myself in love, which binds everything in perfect
      harmony. Let it guide my words, my thoughts, and my actions today.
    es: Jesús, ayúdame a vestirme de amor, que une todo en perfecta armonía. Que este
      amor guíe mis palabras, mis pensamientos y mis acciones hoy.
    uk: Ісусе, допоможи мені одягнутися в любов, яка об'єднує все в досконалій гармонії.
      Нехай вона керує моїми словами, думками та вчинками сьогодні.
- id: love_mercy_14
  ref: dt:7:9
  title:
    ru: Верный завет
    en: Faithful Covenant
    es: Pacto de fidelidad
    uk: Вірний завіт
  text:
    ru: Боже верный, Ты хранишь Свой завет любви до тысячи родов. Я полагаюсь на Твою
      верность и знаю, что Твоя милость никогда не оставит меня.
    en: Faithful God, You keep Your covenant of love to a thousand generations. I
      rely on Your faithfulness, knowing Your mercy will never leave me.
    es: Dios fiel, Tú guardas Tu pacto de amor por mil generaciones. Confío en Tu
      fidelidad, sabiendo que Tu misericordia nunca me abandonará.
    uk: Боже вірний, Ти бережеш Свій завіт любові до тисячі родів. Я покладаюся на
      Твою вірність і знаю, що Твоя милість ніколи не залишить мене.
- id: love_mercy_15
  ref: ex:34:6
  title:
    ru: Милосердный Господь
    en: Merciful Lord
    es: Señor clemente
    uk: Милосердний Господь
  text:
    ru: Господи, Ты преисполнен сострадания и истины. Утешь меня Своей великой милостью
      и даруй мне силы делиться Твоим теплом с этим миром.
    en: Lord, You are full of compassion and truth. Comfort me with Your great mercy
      and give me the strength to share Your warmth with this world.
    es: Señor, estás lleno de compasión y verdad. Consuélame con Tu gran misericordia
      y dame fuerzas para compartir Tu calidez con este mundo.
    uk: Господи, Ти сповнений співчуття та істини. Втіш мене Своєю великою милістю
      і даруй мені сили ділитися Твоїм теплом із цим світом.
- id: love_mercy_16
  ref: jo:15:13
  title:
    ru: Высшая любовь
    en: Greatest Love
    es: Amor supremo
    uk: Найвища любов
  text:
    ru: Господи Иисус, Ты отдал Свою жизнь за меня, назвав меня Своим другом. Научи
      меня ценить эту жертву и любить других жертвенно и искренне.
    en: Lord Jesus, You laid down Your life for me, calling me Your friend. Teach
      me to value this sacrifice and to love others sacrificially and sincerely.
    es: Señor Jesús, diste Tu vida por mí, llamándome Tu amigo. Enséñame a valorar
      este sacrificio y a amar a los demás de manera sacrificada y sincera.
    uk: Господи Ісусе, Ти віддав Своє життя за мене, назвавши мене Своїм другом. Навчи
      мене цінувати цю жертву і любити інших жертовно та щиро.
- id: love_mercy_17
  ref: lk:6:36
  title:
    ru: Отражение милости
    en: Reflection of Mercy
    es: Reflejo de gracia
    uk: Відображення милості
  text:
    ru: Отец Небесный, сделай меня милосердным, как милосерден Ты. Помоги мне прощать
      обиды, не судить строго и дарить Твою любовь тем, кто споткнулся.
    en: Heavenly Father, make me merciful, just as You are merciful. Help me forgive
      offenses, not judge harshly, and extend Your love to those who fall.
    es: Padre Celestial, hazme misericordioso, como Tú lo eres. Ayúdame a perdonar
      ofensas, no juzgar con dureza y dar Tu amor a los que tropiezan.
    uk: Отче Небесний, зроби мене милосердним, як милосердний Ти. Допоможи мені прощати
      образи, не судити суворо й дарувати Твою любов тим, хто впав.
- id: love_mercy_18
  ref: 1jo:3:18
  title:
    ru: Любовь в действии
    en: Love in Action
    es: Amor en acción
    uk: Любов у дії
  text:
    ru: Господи, пусть моя любовь не будет лишь на словах, но проявляется в реальных
      делах и истине. Помоги мне замечать нужды людей вокруг меня.
    en: Lord, let my love not be only in words, but show itself in real deeds and
      truth. Help me to notice the needs of the people around me.
    es: Señor, que mi amor no sea solo de palabra, sino que se muestre en hechos reales
      y en verdad. Ayúdame a notar las necesidades de quienes me rodean.
    uk: Господи, нехай моя любов буде не лише на словах, але виявляється в реальних
      справах та істині. Допоможи мені помічати потреби людей навколо.
- id: love_mercy_19
  ref: ps:23:6
  title:
    ru: Благость и милость
    en: Goodness and Mercy
    es: Bien y misericordia
    uk: Благость і милість
  text:
    ru: Господи, я верю, что Твоя благость и милость будут сопровождать меня во все
      дни моей жизни, и я пребуду в Твоем доме навеки. Аминь.
    en: Lord, I believe that Your goodness and mercy will follow me all the days of
      my life, and I will dwell in Your house forever. Amen.
    es: Señor, creo que Tu bondad y misericordia me seguirán todos los días de mi
      vida, y habitaré en Tu casa para siempre. Amén.
    uk: Господи, я вірю, що Твоя милість та благодатність супроводжуватимуть мене
      в усі дні мого життя, і я перебуватиму в Твоїм домі повік. Амінь.
- id: love_mercy_20
  ref: ps:51:1
  title:
    ru: Крик о милости
    en: Cry for Mercy
    es: Clamor por gracia
    uk: Крик про милість
  text:
    ru: Помилуй меня, Боже, по великой милости Твоей. Очисти моё сердце от всякого
      греха и наполни его Своей неиссякаемой любовью.
    en: Have mercy on me, O God, according to Your steadfast love. Cleanse my heart
      from all sin and fill it with Your inexhaustible love.
    es: Ten piedad de mí, oh Dios, conforme a Tu gran misericordia. Limpia mi corazón
      de todo pecado y llénalo de Tu inagotable amor.
    uk: Помилуй мене, Боже, з великої милості Твоєї. Очисти моє серце від усякого
      гріха і наповни його Своєю невичерпною любов'ю.
- id: love_mercy_21
  ref: lm:3:22
  title:
    ru: Новая милость
    en: New Mercy
    es: Nueva misericordia
    uk: Нова милість
  text:
    ru: Господи, Твое милосердие обновляется каждое утро. Благодарю Тебя за Твою верность,
      которая хранит мою жизнь от гибели и дарит надежду.
    en: Lord, Your mercies are new every morning. Thank You for Your faithfulness,
      which keeps my life from destruction and gives me bright hope.
    es: Señor, tu misericordia se renueva cada mañana. Gracias por tu fidelidad, que
      libra mi vida de la destrucción y me llena de esperanza.
    uk: Господи, Твоє милосердя оновлюється щоранку. Дякую Тобі за Твою вірність,
      яка береже моє життя від загибелі та дарує надію.
- id: love_mercy_22
  ref: 1jo:4:19
  title:
    ru: Любим, потому что Он возлюбил
    en: We Love Because He First Loved
    es: Amamos porque Él nos amó
    uk: Любимо, бо Він полюбив
  text:
    ru: Отец, я люблю Тебя, потому что Ты первым возлюбил меня. Пусть Твоя безусловная
      любовь наполняет мое сердце и изливается на всех вокруг.
    en: Father, I love You because You first loved me. May Your unconditional love
      fill my heart and overflow to everyone around me today.
    es: Padre, te amo porque Tú me amaste primero. Que tu amor incondicional llene
      mi corazón y se desborde hacia todos los que me rodean hoy.
    uk: Отче, я люблю Тебе, бо Ти перший полюбив мене. Нехай Твоя безумовна любов
      наповнює моє серце та виливається на всіх навколо.
- id: love_mercy_23
  ref: ps:103:8
  title:
    ru: Щедрый Бог
    en: Gracious God
    es: Dios compasivo
    uk: Щедрий Бог
  text:
    ru: Господи, Ты щедр и милостив, долготерпелив и богат любовью. Помоги мне ценить
      Твою благодать и проявлять терпение к слабостям других.
    en: Lord, You are compassionate and gracious, slow to anger and abounding in love.
      Help me value Your grace and show patience to others.
    es: Señor, Tú eres compasivo y clemente, lento para la ira y grande en amor. Ayúdame
      a valorar tu gracia y a tener paciencia con los demás.
    uk: Господи, Ти щедрий і милостивий, довготерпеливий і багатий на любов. Допоможи
      мені цінувати Твою благодать і бути терплячим до інших.
- id: love_mercy_24
  ref: eph:2:4
  title:
    ru: Оживлённый благодатью
    en: Made Alive by Grace
    es: Vivificados por gracia
    uk: Оживлений благодаттю
  text:
    ru: Боже, Твое милосердие безгранично, а Твоя любовь велика. Спасибо, что Ты оживил
      мою душу и поднял меня из пепла Своей благодатью.
    en: God, Your mercy is boundless and Your love is great. Thank You for bringing
      my soul to life and raising me up by Your amazing grace.
    es: Dios, tu misericordia es infinita y tu amor es grande. Gracias por dar vida
      a mi alma y levantarme de las cenizas por tu gracia.
    uk: Боже, Твоє милосердя безмежне, а Твоя любов велика. Дякую, що Ти оживив мою
      душу і підняв мене з руїн Своєю благодаттю.
- id: love_mercy_25
  ref: mi:7:18
  title:
    ru: Радость прощения
    en: Joy of Forgiveness
    es: Gozo del perdón
    uk: Радість прощення
  text:
    ru: Господи, нет Бога, подобного Тебе, прощающего грехи и любящего миловать. Растопи
      мое сердце Своей нежностью и научи меня прощать.
    en: Lord, there is no God like You, who pardons sin and delights in mercy. Melt
      my heart with Your tenderness and teach me to forgive.
    es: Señor, no hay Dios como Tú, que perdona el pecado y se deleita en la misericordia.
      Ablanda mi corazón y enséñame a perdonar.
    uk: Господи, немає Бога, схожого на Тебе, який прощає гріхи та любить милувати.
      Розтопи моє серце Своєю ніжністю і навчи мене прощати.
- id: love_mercy_26
  ref: rm:5:8
  title:
    ru: Доказанная любовь
    en: Proven Love
    es: Amor demostrado
    uk: Доведена любов
  text:
    ru: Отец, Ты доказал Свою любовь ко мне, когда Христос умер за меня, грешника.
      Помоги мне жить с глубоким осознанием этой великой жертвы.
    en: Father, You proved Your love for me when Christ died for me while I was still
      a sinner. Help me live in deep awareness of this sacrifice.
    es: Padre, demostraste tu amor por mí cuando Cristo murió por mí siendo aún pecador.
      Ayúdame a vivir consciente de este gran sacrificio.
    uk: Отче, Ти довів Свою любов до мене, коли Христос помер за мене, грішника. Допоможи
      мені жити з глибоким усвідомленням цієї жертви.
- id: love_mercy_27
  ref: 1co:13:4
  title:
    ru: Любовь без зависти
    en: Love Without Envy
    es: Amor sin envidia
    uk: Любов без заздрості
  text:
    ru: Господи, Твоя любовь долготерпит и милосердствует. Преобрази мой характер,
      чтобы я мог любить людей искренне, без зависти и гордости.
    en: Lord, Your love is patient and kind. Transform my character so that I may
      love others sincerely, without envy, pride, or selfishness.
    es: Señor, tu amor es paciente y bondadoso. Transforma mi carácter para que pueda
      amar a otros sinceramente, sin envidia ni orgullo.
    uk: Господи, Твоя любов довготерпить і милосердствує. Переобрази мій характер,
      щоб я міг любити людей щиро, без заздрості та гордості.
- id: love_mercy_28
  ref: ex:34:6
  title:
    ru: Истинная милость
    en: True Mercy
    es: Misericordia verdadera
    uk: Істинна милість
  text:
    ru: Боже, Ты милосердный, долготерпеливый и многомилостивый. Наполни мой день
      Своим присутствием и дай мне силы ходить в Твоей истине.
    en: God, You are merciful, slow to anger, and abounding in love and faithfulness.
      Fill my day with Your presence and guide me in Your truth.
    es: Dios, Tú eres misericordioso, lento para la ira y abundante en amor y fidelidad.
      Llena mi día con tu presencia y guíame en tu verdad.
    uk: Боже, Ти милосердний, довготерпеливий і багатомилостивий. Наповни мій день
      Своєю присутністю та дай сили ходити в Твоїй істині.
- id: love_mercy_29
  ref: 1jo:3:1
  title:
    ru: Дети Божьи
    en: Children of God
    es: Hijos de Dios
    uk: Діти Божі
  text:
    ru: Отец, какую великую любовь Ты дал нам, чтобы мы назывались Твоими детьми!
      Помоги мне сегодня жить достойно этого святого звания.
    en: Father, what great love You have lavished on us, that we should be called
      Your children! Help me live today worthy of this holy calling.
    es: Padre, ¡qué gran amor nos has dado para que seamos llamados hijos tuyos! Ayúdame
      a vivir hoy de una manera digna de este santo llamado.
    uk: Отче, яку велику любов Ти дав нам, щоб ми звалися Твоїми дітьми! Допоможи
      мені сьогодні жити гідно цього святого покликання.
- id: love_mercy_30
  ref: lk:6:36
  title:
    ru: Будьте милосердны
    en: Be Merciful
    es: Sean misericordiosos
    uk: Будьте милосердні
  text:
    ru: Господи, Ты призываешь меня быть милосердным, как милосерден Ты. Дай мне чуткое
      сердце, готовое прощать, помогать и утешать.
    en: Lord, You call me to be merciful, just as You are merciful. Give me a sensitive
      heart, ready to forgive, help, and comfort others.
    es: Señor, me llamas a ser misericordioso, como Tú eres misericordioso. Dame un
      corazón sensible, listo para perdonar, ayudar y consolar.
    uk: Господи, Ти закликаєш мене бути милосердним, як і Ти милосердний. Дай мені
      чуйне серце, готове прощати, допомагати та втішати.
- id: strength_trials_01
  ref: jm:1:2
  title:
    ru: Радость в испытаниях
    en: Joy in Trials
    es: Gozo en las pruebas
    uk: Радість у випробуваннях
  text:
    ru: Господи, даруй мне мудрость принимать испытания с радостью, зная, что они
      укрепляют мою веру и делают меня сильнее.
    en: Lord, grant me the wisdom to welcome trials with joy, knowing they strengthen
      my faith and make me stronger.
    es: Señor, dame sabiduría para recibir las pruebas con gozo, sabiendo que fortalecen
      mi fe y me hacen más fuerte.
    uk: Господи, даруй мені мудрість приймати випробування з радістю, знаючи, що вони
      зміцнюють мою віру і роблять сильнішим.
- id: strength_trials_02
  ref: rm:5:3
  title:
    ru: Терпение и характер
    en: Patience and Character
    es: Paciencia y carácter
    uk: Терпіння та характер
  text:
    ru: Отец, помоги мне хвалиться скорбями, ведь они рождают во мне стойкость, характер
      и непоколебимую надежду на Тебя.
    en: Father, help me rejoice in sufferings, knowing they produce in me endurance,
      character, and unwavering hope in You.
    es: Padre, ayúdame a gloriarme en los sufrimientos, sabiendo que producen en mí
      paciencia, carácter y una firme esperanza en Ti.
    uk: Отче, допоможи мені хвалитися скорботами, адже вони народжують у мені стійкість,
      характер і непохитну надію на Тебе.
- id: strength_trials_03
  ref: 2co:12:9
  title:
    ru: Сила в слабости
    en: Strength in Weakness
    es: Fuerza en la debilidad
    uk: Сила в слабкості
  text:
    ru: Иисус, Твоей благодати довольно для меня. Пусть Твоя совершенная сила проявляется
      во мне в моменты моей величайшей слабости.
    en: Jesus, Your grace is sufficient for me. Let Your perfect power be made manifest
      in me in moments of my greatest weakness.
    es: Jesús, Tu gracia es suficiente para mí. Que Tu poder perfecto se manifieste
      en mí en los momentos de mi mayor debilidad.
    uk: Ісусе, Твоєї благодаті достатньо для мене. Нехай Твоя досконала сила виявляється
      в мені в хвилини моєї найбільшої слабкості.
- id: strength_trials_04
  ref: is:41:10
  title:
    ru: Божье присутствие
    en: God's Presence
    es: Presencia de Dios
    uk: Божа присутність
  text:
    ru: Господь, Ты обещал быть со мной. Прогони мой страх и укрепи меня Своей праведной
      десницей в этот трудный час.
    en: Lord, You promised to be with me. Cast out my fear and strengthen me with
      Your righteous right hand in this difficult hour.
    es: Señor, prometiste estar conmigo. Echa fuera mi temor y fortaléceme con Tu
      diestra de justicia en esta hora difícil.
    uk: Господи, Ти обіцяв бути зі мною. Прожени мій страх і зміцни мене Своєю праведною
      правицею в цю важку годину.
- id: strength_trials_05
  ref: ph:4:13
  title:
    ru: Всемогущий Спаситель
    en: Almighty Savior
    es: Salvador todopoderoso
    uk: Всемогутній Спаситель
  text:
    ru: Господи, я верю, что всё могу преодолеть через Тебя, дарующего мне силы. Наполни
      моё сердце Твоей победоносной энергией.
    en: Lord, I believe I can do all things through You who give me strength. Fill
      my heart with Your victorious energy.
    es: Señor, creo que todo lo puedo superar en Ti, que me fortaleces. Llena mi corazón
      con Tu energía victoriosa.
    uk: Господи, я вірю, що все можу подолати через Тебе, Хто дає мені сили. Наповни
      моє серце Твоєю переможною енергією.
- id: strength_trials_06
  ref: 1pe:5:10
  title:
    ru: Восстановление духа
    en: Restoration of Spirit
    es: Restauración del espíritu
    uk: Відновлення духу
  text:
    ru: Боже всей благодати, после недолгих страданий восстанови меня, укрепи, сделай
      непоколебимым и утверди моё основание.
    en: God of all grace, after I have suffered a little while, restore me, make me
      strong, firm, and steadfast on Your foundation.
    es: Dios de toda gracia, después de que sufra un poco, restáurame, fortaléceme,
      hazme firme y asiéntame sobre Tu fundamento.
    uk: Боже всієї благодаті, після коротких страждань віднови мене, зміцни, зроби
      непохитним і утверди мою основу.
- id: strength_trials_07
  ref: ps:46:1
  title:
    ru: Скорый помощник
    en: A Present Help
    es: Pronto auxilio
    uk: Скорий помічник
  text:
    ru: Боже, Ты — моё прибежище и сила, скорый помощник в бедах. Помоги мне доверять
      Тебе, когда вокруг рушится мир.
    en: God, You are my refuge and strength, a very present help in trouble. Help
      me trust You when the world around me shakes.
    es: Dios, Tú eres mi refugio y fortaleza, mi pronto auxilio en las tribulaciones.
      Ayúdame a confiar en Ti cuando todo tiemble.
    uk: Боже, Ти — моє притулок і сила, швидка допомога в бідах. Допомоги мені довіряти
      Тобі, коли навколо рушиться світ.
- id: strength_trials_08
  ref: ps:23:4
  title:
    ru: Путь сквозь тьму
    en: Path Through Darkness
    es: Camino en la oscuridad
    uk: Шлях крізь темряву
  text:
    ru: Добрый Пастырь, даже в самой темной долине я не убоюсь зла, ведь Ты рядом.
      Твой жезл и Твой посох утешают меня.
    en: Good Shepherd, even in the darkest valley I will fear no evil, for You are
      with me. Your rod and staff comfort me.
    es: Buen Pastor, aunque ande en el valle más oscuro no temeré mal alguno, porque
      Tú estás conmigo. Tu vara y Tu cayado me consuelan.
    uk: Добрий Пастирю, навіть у найтемнішій долині я не злякаюся зла, бо Ти поруч.
      Твоє жезл і Твій посох утішають мене.
- id: strength_trials_09
  ref: na:1:7
  title:
    ru: Твердыня в день скорби
    en: Stronghold in Trouble
    es: Fortaleza en la angustia
    uk: Твердиня в день скорботи
  text:
    ru: Господь, Ты благ и являешься надежной крепостью в день скорби. Спасибо, что
      Ты знаешь и бережешь надеющихся на Тебя.
    en: Lord, You are good, a stronghold in the day of trouble. Thank You for knowing
      and protecting those who trust in You.
    es: Señor, Tú eres bueno, una fortaleza en el día de la angustia. Gracias porque
      conoces y proteges a los que confían en Ti.
    uk: Господи, Ти добрий і є надійною фортецею в день скорботи. Дякую, що Ти знаєш
      і оберігаєш тих, хто сподівається на Тебе.
- id: strength_trials_10
  ref: dt:31:6
  title:
    ru: Мужество веры
    en: Courage of Faith
    es: Coraje de fe
    uk: Мужність віри
  text:
    ru: Господи, наполни меня мужеством и силой. Помоги не бояться трудностей, ведь
      Ты идешь передо мной и никогда не оставишь меня.
    en: Lord, fill me with courage and strength. Help me not to fear difficulties,
      for You go before me and will never leave me.
    es: Señor, lléname de valor y fuerza. Ayúdame a no temer las dificultades, porque
      Tú vas delante de mí y nunca me dejarás.
    uk: Господи, наповни мене мужністю та силою. Допоможи не боятися труднощів, адже
      Ти йдеш попереду мене і ніколи не залишиш мене.
- id: strength_trials_11
  ref: 1co:10:13
  title:
    ru: Выход из искушения
    en: Way of Escape
    es: Salida de la tentación
    uk: Вихід із спокуси
  text:
    ru: Верный Отец, спасибо, что не даешь мне испытаний сверх сил и всегда указываешь
      путь к победе и облегчению.
    en: Faithful Father, thank You for not testing me beyond my strength and for always
      providing a way of escape and relief.
    es: Padre fiel, gracias por no probarme más allá de mis fuerzas y por proveer
      siempre una salida para poder resistir.
    uk: Вірний Отче, дякую, що не даєш мені випробувань понад міру і завжди вказуєш
      шлях до перемоги та полегшення.
- id: strength_trials_12
  ref: rm:8:28
  title:
    ru: Благо во всём
    en: Good in All Things
    es: Bien en todo
    uk: Благо у всьому
  text:
    ru: Господи, даже когда мне больно, я верю, что Ты обращаешь все обстоятельства
      к моему благу, ведь я люблю Тебя.
    en: Lord, even when it hurts, I believe that You work all circumstances together
      for my good, because I love You.
    es: Señor, incluso cuando me duele, creo que dispones todas las cosas para mi
      bien, porque te amo de todo corazón.
    uk: Господи, навіть коли мені боляче, я вірю, що Ти обертаєш усі обставини на
      моє благо, адже я люблю Тебе.
- id: strength_trials_13
  ref: hk:3:19
  title:
    ru: Высоты веры
    en: Heights of Faith
    es: Alturas de la fe
    uk: Висоти віри
  text:
    ru: Господь Бог — моя сила! Он сделает мои ноги быстрыми, как у оленя, и возведет
      меня на мои духовные высоты над проблемами.
    en: The Lord God is my strength! He will make my feet like the feet of a deer
      and make me walk on my high places above troubles.
    es: ¡El Señor Dios es mi fortaleza! Él hará mis pies como de ciervas y me hará
      caminar sobre mis alturas, por encima de los problemas.
    uk: Господь Бог — моя сила! Він зробить мої ноги швидкими, як у оленя, і зведе
      мене на мої духовні висоти над проблемами.
- id: strength_trials_14
  ref: is:40:29
  title:
    ru: Сила утомленному
    en: Power to the Faint
    es: Fuerza al cansado
    uk: Сила втомленому
  text:
    ru: Отец, я чувствую усталость, но Ты даешь силу утомленному и даруешь крепость
      бессильному. Обнови мои душевные и физические силы.
    en: Father, I feel weary, but You give power to the faint and increase strength
      to the weak. Renew my spiritual and physical energy.
    es: Padre, me siento cansado, pero Tú das fuerza al cansado y multiplicas las
      fuerzas al débil. Renueva mis energías físicas y espirituales.
    uk: Отче, я відчуваю втому, але Ти даєш силу втомленому і даруєш міць безсилому.
      Віднови мої душевні та фізичні сили.
- id: strength_trials_15
  ref: rm:15:4
  title:
    ru: Утешение в слове
    en: Comfort in the Word
    es: Consuelo en la palabra
    uk: Утішення в слові
  text:
    ru: Иисус, Твое слово — моё утешение в бедствии моем, ибо оно оживляет меня и
      возвращает надежду в самые мрачные дни.
    en: Jesus, Your word is my comfort in my affliction, for it gives me life and
      restores hope in the darkest of days.
    es: Jesús, Tu palabra es mi consuelo en mi aflicción, porque ella me da vida y
      me devuelve la esperanza en los días más oscuros.
    uk: Ісусе, Твоє слово — моє утішення в моєму лиху, бо воно оживляє мене і повертає
      надію в найпохмуріші дні.
- id: strength_trials_16
  ref: 2ts:3:3
  title:
    ru: Утверди в истине
    en: Established in Truth
    es: Firmes en la verdad
    uk: Утверди в істині
  text:
    ru: Господь, Ты верен Своим обещаниям. Утверди меня в истине и защити от всякого
      зла, которое пытается сокрушить мою душу.
    en: Lord, You are faithful to Your promises. Establish me in the truth and protect
      me from every evil that tries to crush my soul.
    es: Señor, Tú eres fiel a Tus promesas. Afírmame en la verdad y protégeme de todo
      mal que intente quebrantar mi alma.
    uk: Господи, Ти вірний Своїм обіцянкам. Утверди мене в істині та захисти від усякого
      зла, що намагається сокрушити мою душу.
- id: strength_trials_17
  ref: ps:27:1
  title:
    ru: Свет и спасение
    en: Light and Salvation
    es: Luz y salvación
    uk: Світло і спасіння
  text:
    ru: Господь — мой свет и спасение, кого мне бояться? Ты — крепость жизни моей,
      перед кем мне трепетать в часы испытаний?
    en: The Lord is my light and my salvation, whom shall I fear? You are the stronghold
      of my life, of whom shall I be afraid?
    es: El Señor es mi luz y mi salvación, ¿de quién temeré? Tú eres la fortaleza
      de mi vida, ¿de quién he de atemorizarme?
    uk: Господь — моє світло і спасіння, кого мені боятися? Ти — фортеця мого життя,
      перед ким мені тремтіти в часи випробувань?
- id: strength_trials_18
  ref: js:1:9
  title:
    ru: Будь твёрд и мужествен
    en: Strong and Courageous
    es: Esfuérzate y sé valiente
    uk: Будь сильний і мужній
  text:
    ru: Боже, Твое повеление — быть твердым и мужественным. Помоги мне не унывать,
      ведь Ты пребываешь со мной везде, куда бы я ни пошел.
    en: God, Your command is to be strong and courageous. Help me not to be discouraged,
      for You are with me wherever I go.
    es: Dios, Tu mandato es que sea fuerte y valiente. Ayúdame a no desanimarme, porque
      Tú estás conmigo dondequiera que yo vaya.
    uk: Боже, Твій наказ — бути твердим і мужнім. Допоможи мне не сумувати, адже Ти
      перебуваєш зі мною скрізь, куди б я не пішов.
- id: strength_trials_19
  ref: 1pe:1:6
  title:
    ru: Вечная радость
    en: Eternal Joy
    es: Gozo eterno
    uk: Вічна радість
  text:
    ru: Господи, помоги мне радоваться вечной надежде, даже если сейчас приходится
      немного поскорбеть от различных искушений.
    en: Lord, help me rejoice in eternal hope, even if now for a little while I have
      to suffer various trials.
    es: Señor, ayúdame a regocijarme en la esperanza eterna, aunque ahora por un poco
      de tiempo tenga que afligirme con diversas pruebas.
    uk: Господи, допоможи мені радіти вічній надії, навіть якщо зараз доводиться трохи
      сумувати від різноманітних випробувань.
- id: strength_trials_20
  ref: rm:8:37
  title:
    ru: Больше чем победители
    en: More Than Conquerors
    es: Más que vencedores
    uk: Більше ніж переможці
  text:
    ru: Великий Бог, через Твою безграничную любовь я преодолеваю все беды. Верю,
      что с Тобой я больше, чем просто победитель.
    en: Great God, through Your boundless love I overcome all troubles. I believe
      that with You I am more than a conqueror.
    es: Gran Dios, por Tu amor infinito supero todas las tribulaciones. Creo que contigo
      soy más que vencedor en todo momento.
    uk: Великий Боже, через Твою безмежну любов я долаю всі біди. Вірю, що з Тобою
      я більше, ніж просто переможець.
- id: strength_trials_21
  ref: jm:1:12
  title:
    ru: Венец жизни
    en: Crown of Life
    es: Corona de vida
    uk: Вінець життя
  text:
    ru: Господи, дай мне сил устоять под тяжестью испытаний. Верю, что пройдя сквозь
      огонь, я получу обещанный Тобой венец жизни.
    en: Lord, give me strength to endure under the weight of trials. I believe that
      after passing through fire, I will receive the promised crown of life.
    es: Señor, dame fuerzas para resistir bajo el peso de las pruebas. Creo que al
      pasar por el fuego recibiré la corona de vida prometida.
    uk: Господи, дай мені сил вистояти під тягарем випробувань. Вірю, що пройшовши
      крізь вогонь, я отримаю обіцяний Тобою вінець життя.
- id: strength_trials_22
  ref: is:41:10
  title:
    ru: Твоя поддержка
    en: Your Support
    es: Tu apoyo
    uk: Твоя підтримка
  text:
    ru: Отец, когда мне страшно, напомни, что Ты рядом. Укрепи меня Своей праведной
      десницей и наполни моё сердце Твоим глубоким миром.
    en: Father, when I am afraid, remind me that You are near. Strengthen me with
      Your righteous hand and fill my heart with Your deep peace.
    es: Padre, cuando tenga miedo, recuérdame que estás cerca. Fortaléceme con tu
      diestra justa y llena mi corazón con tu profunda paz.
    uk: Отче, коли мені страшно, нагадай, що Ти поруч. Зміцни мене Своєю праведною
      правицею та наповни моє серце Твоїм глибоким миром.
- id: strength_trials_23
  ref: rm:5:3
  title:
    ru: Плод терпения
    en: Fruit of Patience
    es: Fruto de paciencia
    uk: Плід терпіння
  text:
    ru: Господи, помоги мне видеть смысл в моих трудностях. Пусть эти испытания выработают
      во мне стойкость, терпение и непоколебимый характер.
    en: Lord, help me see the purpose in my difficulties. May these trials produce
      in me endurance, patience, and unwavering character.
    es: Señor, ayúdame a ver el propósito de mis dificultades. Que estas pruebas produzcan
      en mí perseverancia, paciencia y un carácter firme.
    uk: Господи, допоможи мені бачити сенс у моїх труднощах. Нехай ці випробування
      вироблять у мені стійкість, терпіння та непохитний характер.
- id: strength_trials_24
  ref: 2co:12:9
  title:
    ru: Благодати довольно
    en: My Grace Is Sufficient
    es: Mi gracia te basta
    uk: Досить тобі благодаті
  text:
    ru: Боже, когда я слаб, Твоя благодать становится моей опорой. Пусть Твоя совершенная
      сила проявится через мою немощь в этот трудный день.
    en: God, when I am weak, Your grace becomes my support. May Your perfect strength
      be manifested through my weakness on this difficult day.
    es: Dios, cuando soy débil, tu gracia se convierte en mi apoyo. Que tu fuerza
      perfecta se manifieste a través de mi debilidad en este día difícil.
    uk: Боже, коли я слабкий, Твоя благодать стає моєю опорою. Нехай Твоя досконала
      сила проявиться через мою немоч у цей важкий день.
- id: strength_trials_25
  ref: 1pe:1:7
  title:
    ru: Очищение веры
    en: Refining of Faith
    es: Purificación de la fe
    uk: Очищення віри
  text:
    ru: Господи, пусть испытания очистят мою веру, сделав её драгоценнее чистого золота.
      Помоги мне сохранить верность Тебе во всех обстоятельствах.
    en: Lord, let trials refine my faith, making it more precious than pure gold.
      Help me remain faithful to You in all circumstances.
    es: Señor, que las pruebas purifiquen mi fe, haciéndola más preciosa que el oro
      puro. Ayúdame a permanecer fiel a ti en toda circunstancia.
    uk: Господи, нехай випробування очистять мою віру, зробивши її дорожчою за чисте
      золото. Допоможи мені зберегти вірність Тобі у всіх обставинах.
- id: strength_trials_26
  ref: ps:46:1
  title:
    ru: Бегу к Тебе
    en: I Run to You
    es: Corro a Ti
    uk: Біжу до Тебе
  text:
    ru: Боже, Ты — моё убежище и сила в минуты тревоги. Бегу к Тебе за защитой и верю,
      что Ты всегда рядом, чтобы помочь и утешить меня.
    en: God, You are my refuge and strength in moments of anxiety. I run to You for
      protection, trusting that You are always near to help and comfort me.
    es: Dios, tú eres mi refugio y fortaleza en momentos de ansiedad. Corro a ti en
      busca de protección, confiando en que siempre estás cerca para ayudarme.
    uk: Боже, Ти — мій притулок і сила в хвилини тривоги. Біжу до Тебе за захистом
      і вірю, що Ти завжди поруч, щоб допомогти та втішити мене.
- id: strength_trials_27
  ref: dt:31:6
  title:
    ru: Шаг мужества
    en: Step of Courage
    es: Paso de valor
    uk: Крок мужності
  text:
    ru: Отец, наполни меня мужеством перед лицом трудностей. Знаю, что Ты идешь впереди
      меня, не оставишь и не покинешь на этом пути.
    en: Father, fill me with courage in the face of difficulties. I know that You
      go before me, and You will never leave or forsake me on this path.
    es: Padre, lléname de valor ante las dificultades. Sé que vas delante de mí, y
      nunca me dejarás ni me desampararás en este camino.
    uk: Отче, наповни мене мужністю перед обличчям труднощів. Знаю, що Ти йдеш попереду
      мене, не залишиш і не покинеш на цьому шляху.
- id: strength_trials_28
  ref: 1co:10:13
  title:
    ru: Выход из испытания
    en: A Way Out
    es: La salida
    uk: Вихід з випробування
  text:
    ru: Господи, спасибо за Твою верность. Ты не допустишь испытаний сверх моих сил
      и всегда укажешь выход, чтобы я мог всё перенести.
    en: Lord, thank You for Your faithfulness. You will not allow me to be tested
      beyond my strength and will always provide a way out so I can endure.
    es: Señor, gracias por tu fidelidad. No permitirás que sea probado más allá de
      mis fuerzas y siempre proveerás una salida para que pueda resistir.
    uk: Господи, дякую за Твою вірність. Ти не допустиш випробувань понад мої сили
      і завжди вкажеш вихід, щоб я міг усе перенести.
- id: strength_trials_29
  ref: ph:4:13
  title:
    ru: Всё преодолею
    en: Overcoming All
    es: Todo lo puedo
    uk: Все подолаю
  text:
    ru: Иисус, с Твоей силой я могу преодолеть любые преграды. Наполни меня Своим
      Духом, чтобы я с честью прошёл сегодняшние испытания.
    en: Jesus, with Your strength I can overcome any obstacles. Fill me with Your
      Spirit so that I may face today's trials with grace and honor.
    es: Jesús, con tu fuerza puedo superar cualquier obstáculo. Lléname de tu Espíritu
      para que pueda enfrentar las pruebas de hoy con gracia y honor.
    uk: Ісусе, з Твоєю силою я можу подолати будь-які перешкоди. Наповни мене Своїм
      Духом, щоб я з честю пройшов сьогоднішні випробування.
- id: strength_trials_30
  ref: hb:12:2
  title:
    ru: Взгляд на Христа
    en: Looking to Jesus
    es: Mirando a Jesús
    uk: Погляд на Христа
  text:
    ru: Господи, помоги мне отвести взгляд от бури и направить его на Тебя. Ты — автор
      моей веры, и в Тебе я нахожу силы идти до конца.
    en: Lord, help me take my eyes off the storm and fix them on You. You are the
      author of my faith, and in You I find the strength to endure.
    es: Señor, ayúdame a apartar la mirada de la tormenta y fijarla en ti. Tú eres
      el autor de mi fe, y en ti encuentro la fuerza para perseverar.
    uk: Господи, допоможи мені відвести погляд від бурі та спрямувати його на Тебе.
      Ти — автор моєї віри, і в Тобі я знаходжу сили йти до кінця.
- id: guidance_wisdom_01
  ref: jm:1:5
  title:
    ru: Мудрость свыше
    en: Wisdom from Above
    es: Sabiduría de lo alto
    uk: Мудрість згори
  text:
    ru: Господи, мне так нужна Твоя мудрость сегодня. Даруй мне ясность мыслей для
      принятия верных решений и направь мое сердце к истине.
    en: Lord, I need Your wisdom so much today. Grant me clarity of mind to make the
      right decisions and guide my heart toward Your truth.
    es: Señor, necesito tanto Tu sabiduría hoy. Concédeme claridad mental para tomar
      las decisiones correctas y guía mi corazón hacia Tu verdad.
    uk: Господи, мені так потрібна Твоя мудрість сьогодні. Даруй мені ясність думок
      для прийняття правильних рішень і спрямуй моє серце до істини.
- id: guidance_wisdom_02
  ref: prv:3:5
  title:
    ru: Доверие Богу
    en: Trust in God
    es: Confianza en Dios
    uk: Довіра Богу
  text:
    ru: Отец, помоги мне доверять Тебе всем сердцем. Избавь меня от привычки полагаться
      только на свой ограниченный разум в трудные минуты.
    en: Father, help me trust You with all my heart. Deliver me from relying only
      on my own limited understanding in times of difficulty.
    es: Padre, ayúdame a confiar en Ti con todo mi corazón. Líbrame de apoyarme solo
      en mi propio entendimiento limitado en momentos difíciles.
    uk: Отче, допоможи мені довіряти Тобі всім серцем. Визволи мене від звички покладатися
      лише на свій обмежений розум у важкі хвилини.
- id: guidance_wisdom_03
  ref: prv:3:6
  title:
    ru: Прямые пути
    en: Straight Paths
    es: Sendas rectas
    uk: Прямі шляхи
  text:
    ru: Господи, во всех делах моих я признаю Твою власть. Направь мои стопы и сделай
      ровными дороги, по которым я сегодня пойду.
    en: Lord, in all my ways I acknowledge Your authority. Direct my steps today and
      make the paths I walk straight and smooth.
    es: Señor, en todos mis caminos reconozco Tu autoridad. Dirige mis pasos hoy y
      haz que las sendas por las que camine sean rectas.
    uk: Господи, у всіх справах моїх я визнаю Твою владу. Направ мої кроки сьогодні
      і зроби рівними дороги, якими я піду.
- id: guidance_wisdom_04
  ref: prv:6:23
  title:
    ru: Светильник ноге
    en: Lamp to My Feet
    es: Lámpara a mis pies
    uk: Світильник нозі
  text:
    ru: Твое Слово — светильник для ног моих, Господь. Освети мой путь сегодня, чтобы
      я не споткнулся в темноте сомнений и искушений.
    en: Your Word is a lamp to my feet, Lord. Light up my path today so that I do
      not stumble in the darkness of doubt and temptation.
    es: Tu Palabra es una lámpara para mis pies, Señor. Ilumina mi camino hoy para
      que no tropiece en la oscuridad de la duda y la tentación.
    uk: Твоє Слово — світильник для ніг моїх, Господи. Освіти мій шлях сьогодні, щоб
      я не спіткнувся в темряві сумнівів та спокус.
- id: guidance_wisdom_05
  ref: ps:32:8
  title:
    ru: Божье наставление
    en: Divine Guidance
    es: Guía divina
    uk: Боже напучування
  text:
    ru: Отец, Ты обещал наставить меня на верный путь. Руководи мной, держи Свой любящий
      взор на мне и помогай принимать мудрые решения.
    en: Father, You promised to instruct me in the way I should go. Guide me, keep
      Your loving eye on me, and help me make wise choices.
    es: Padre, prometiste instruirme en el camino que debo seguir. Guíame, mantén
      Tu ojo amoroso sobre mí y ayúdame a tomar decisiones sabias.
    uk: Отче, Ти обіцяв наставити мене на правильну дорогу. Керуй мною, тримай Свій
      люблячий погляд на мені й допомагай приймати мудрі рішення.
- id: guidance_wisdom_06
  ref: is:30:21
  title:
    ru: Твой тихий голос
    en: Your Quiet Voice
    es: Tu voz apacible
    uk: Твій тихий голос
  text:
    ru: 'Господи, дай мне услышать Твой тихий голос позади, когда я сомневаюсь. Подскажи
      мне верное направление: идти ли направо или налево.'
    en: Lord, let me hear Your quiet voice behind me when I doubt. Show me the right
      direction, whether to turn to the right or to the left.
    es: Señor, déjame oír Tu voz apacible detrás de mí cuando dude. Muéstrame la dirección
      correcta, ya sea a la derecha o a la izquierda.
    uk: 'Господи, дай мені почути Твій тихий голос позаду, коли я сумніваюся. Підкажи
      мені правильний напрямок: чи йти праворуч, чи ліворуч.'
- id: guidance_wisdom_07
  ref: ps:25:4
  title:
    ru: Покажи мне пути
    en: Show Me Your Ways
    es: Muéstrame tus caminos
    uk: Покажи мені шляхи
  text:
    ru: Укажи мне, Господи, пути Твои и научи меня Твоим тропам. Я хочу ходить в Твоей
      истине и постоянно учиться у Тебя святости.
    en: Show me Your ways, Lord, and teach me Your paths. I want to walk in Your truth
      and constantly learn holiness from You.
    es: Muéstrame Tus caminos, Señor, y enséñame Tus sendas. Quiero caminar en Tu
      verdad y aprender constantemente de Ti la santidad.
    uk: Покажи мені, Господи, шляхи Твої та навчи мене Твоїх стежок. Я хочу ходити
      в Твоїй істині та постійно вчитися у Тебе святості.
- id: guidance_wisdom_08
  ref: ps:143:10
  title:
    ru: Твоя воля
    en: Your Will
    es: Tu voluntad
    uk: Твоя воля
  text:
    ru: Научи меня исполнять волю Твою, ведь Ты — мой Бог. Пусть Твой Благий Дух ведет
      меня по ровной и безопасной жизненной дороге.
    en: Teach me to do Your will, for You are my God. May Your good Spirit lead me
      on a level and safe path through life today.
    es: Enséñame a hacer Tu voluntad, porque Tú eres mi Dios. Que Tu buen Espíritu
      me guíe por un camino llano y seguro en la vida hoy.
    uk: Навчи мене виконувати волю Твою, бо Ти — мій Бог. Нехай Твій Благий Дух веде
      мене рівною та безпечною життєвою дорогою.
- id: guidance_wisdom_09
  ref: jm:3:17
  title:
    ru: Чистая мудрость
    en: Pure Wisdom
    es: Sabiduría pura
    uk: Чиста мудрість
  text:
    ru: Боже, наполни меня мудростью, сходящей свыше. Пусть она сделает меня мирным,
      скромным, послушным и полным добрых плодов.
    en: God, fill me with the wisdom that comes from above. May it make me peaceful,
      gentle, willing to yield, and full of good fruits.
    es: Dios, lléname de la sabiduría que viene de lo alto. Que me haga pacífico,
      amable, condescendiente y lleno de buenos frutos hoy.
    uk: Боже, наповни мене мудрістю, що сходить згори. Нехай вона зробить мене мирним,
      лагідним, слухняним та повним добрих плодів.
- id: guidance_wisdom_10
  ref: jo:16:13
  title:
    ru: Дух Истины
    en: Spirit of Truth
    es: Espíritu de verdad
    uk: Дух Істини
  text:
    ru: Святой Дух, веди меня сегодня во всякую истину. Открой мои глаза на Божье
      Слово и помоги мне распознавать ложь этого мира.
    en: Holy Spirit, guide me into all truth today. Open my eyes to God's Word and
      help me discern the falsehoods of this world.
    es: Espíritu Santo, guíame hoy a toda la verdad. Abre mis ojos a la Palabra de
      Dios y ayúdame a discernir las mentiras de este mundo.
    uk: Святий Духу, веди мене сьогодні у всяку істину. Відкрий мої очі на Боже Слово
      і допоможи мені розпізнавати неправду цього світу.
- id: guidance_wisdom_11
  ref: is:58:11
  title:
    ru: Верный Путеводитель
    en: Faithful Guide
    es: Guía fiel
    uk: Вірний Провідник
  text:
    ru: Господи, будь моим постоянным водителем. Насыщай мою душу в засушливые времена
      и сделай мою жизнь цветущим садом для Твоей славы.
    en: Lord, be my constant guide. Satisfy my soul in dry places and make my life
      like a well-watered garden for Your glory.
    es: Señor, sé mi guía constante. Satisface mi alma en lugares secos y haz que
      mi vida sea como un huerto de riego para Tu gloria.
    uk: Господи, будь моїм постійним провідником. Насичуй мою душу в посушливі часи
      і зроби моє життя квітучим садом для Твоєї слави.
- id: guidance_wisdom_12
  ref: prv:16:9
  title:
    ru: Мои шаги
    en: My Steps
    es: Mis pasos
    uk: Мої кроки
  text:
    ru: 'Господи, сердце мое строит планы на этот день, но я прошу Тебя: направляй
      каждый мой шаг и согласуй мои желания с Твоей волей.'
    en: Lord, my heart makes plans for this day, but I ask You to direct every step
      I take and align my desires with Your perfect will.
    es: Señor, mi corazón hace planes para este día, pero te pido que dirijas cada
      uno de mis pasos y alinees mis deseos con Tu voluntad.
    uk: 'Господи, серце моє будує плани на цей день, але я прошу Тебе: направляй кожен
      мій крок і узгоджуй мої бажання з Твоєю волею.'
- id: guidance_wisdom_13
  ref: cl:1:9
  title:
    ru: Познание воли
    en: Knowing His Will
    es: Conocer su voluntad
    uk: Пізнання волі
  text:
    ru: Отец, исполни меня познанием Твоей воли во всякой духовной премудрости, чтобы
      я ясно видел Твой замысел для моей жизни сегодня.
    en: Father, fill me with the knowledge of Your will in all spiritual wisdom, so
      that I may clearly see Your purpose for my life today.
    es: Padre, lléname del conocimiento de Tu voluntad en toda sabiduría espiritual,
      para que pueda ver claramente Tu propósito para mí hoy.
    uk: Отче, наповни мене пізнанням Твоєї волі у всій духовній мудрості, щоб я ясно
      бачив Твій задум для мого життя сьогодні.
- id: guidance_wisdom_14
  ref: ps:43:3
  title:
    ru: Свет и истина
    en: Light and Truth
    es: Luz y verdad
    uk: Світло та істина
  text:
    ru: Пошли, Господи, Твой свет и Твою истину; пусть они ведут меня и приведут к
      Твоему святому присутствию в каждый миг этого дня.
    en: Send out Your light and Your truth, Lord; let them lead me and bring me to
      Your holy presence in every moment of this day.
    es: Envía Tu luz y Tu verdad, Señor; que ellas me guíen y me lleven a Tu santa
      presencia en cada momento de este día.
    uk: Пошли, Господи, Твоє світло та Твою істину; нехай вони ведуть мене і приведуть
      до Твоєї святої присутності в кожну мить цього дня.
- id: guidance_wisdom_15
  ref: eph:1:17
  title:
    ru: Дух премудрости
    en: Spirit of Wisdom
    es: Espíritu de sabiduría
    uk: Дух премудрості
  text:
    ru: Бог славы, даруй мне сегодня Духа премудрости и откровения к познанию Тебя.
      Пусть мое сердце глубже постигает Твою вечную любовь.
    en: God of glory, grant me today the Spirit of wisdom and revelation in the knowledge
      of You. May my heart understand Your love deeper.
    es: Dios de gloria, concédeme hoy el Espíritu de sabiduría y de revelación en
      el conocimiento de Ti. Que mi corazón comprenda Tu amor.
    uk: Богові слави, даруй мені сьогодні Духа премудрості та об'явлення для пізнання
      Тебе. Нехай моє серце глибше осягає Твою вічну любов.
- id: guidance_wisdom_16
  ref: is:48:17
  title:
    ru: Божье обучение
    en: God's Teaching
    es: Enseñanza de Dios
    uk: Боже навчання
  text:
    ru: Господи, Ты — мой Спаситель, научающий меня полезному. Веди меня по тому пути,
      по которому мне должно идти во благо моей души.
    en: Lord, You are my Savior, who teaches me what is best. Lead me along the path
      I should travel today for the benefit of my soul.
    es: Señor, Tú eres mi Salvador, que me enseña lo que es mejor. Guíame por el camino
      que debo seguir hoy para el beneficio de mi alma.
    uk: Господи, Ти — мій Спаситель, Який навчає мене корисному. Веди мене тим шляхом,
      яким я маю йти на благо моєї душі.
- id: guidance_wisdom_17
  ref: ps:23:3
  title:
    ru: Стези правды
    en: Paths of Righteousness
    es: Sendas de justicia
    uk: Стежки праведності
  text:
    ru: Пастырь мой, подкрепи мою душу и направь меня на стези правды ради имени Твоего.
      Помоги мне оставаться верным Твоим заповедям.
    en: My Shepherd, restore my soul and lead me in the paths of righteousness for
      Your name's sake. Help me remain faithful to You.
    es: Mi Pastor, restaura mi alma y guíame por sendas de justicia por amor de Tu
      nombre. Ayúdame a permanecer fiel a Tus mandamientos.
    uk: Пастирю мій, підкріпи мою душу і направ мене на стежки праведності заради
      імені Твого. Допоможи мені залишатися вірним Тобі.
- id: guidance_wisdom_18
  ref: prv:4:18
  title:
    ru: Светлый путь
    en: Bright Path
    es: Camino luminoso
    uk: Світла дорога
  text:
    ru: Господи, пусть мой путь будет подобен лучу рассвета, который разгорается все
      ярче и ярче. Наполняй мою жизнь Твоим дивным светом.
    en: Lord, let my path be like the light of dawn, shining brighter and brighter.
      Fill my life with Your wonderful, guiding light today.
    es: Señor, que mi camino sea como la luz de la aurora, que brilla más y más. Llena
      mi vida hoy con Tu maravillosa luz guía.
    uk: Господи, нехай мій шлях буде подібний до променя світанку, який розгорається
      все яскравіше. Наповнюй моє життя Твоїм дивним світлом.
- id: guidance_wisdom_19
  ref: ph:1:9
  title:
    ru: Рассудительность
    en: Discernment
    es: Discernimiento
    uk: Розсудливість
  text:
    ru: Боже, молю Тебя, чтобы моя любовь возрастала в познании и всяком чувстве,
      помогая мне безошибочно выбирать самое лучшее и чистое.
    en: God, I pray that my love may overflow more and more in knowledge and depth
      of insight, helping me to choose what is best and pure.
    es: Dios, oro para que mi amor abunde más y más en conocimiento y en todo discernimiento,
      ayudándome a elegir lo que es mejor y puro.
    uk: Боже, молю Тебе, щоб моя любовь зростала у пізнанні та всілякому відчутті,
      допомагаючи мені безпомилково обирати найкраще та чисте.
- id: guidance_wisdom_20
  ref: prv:3:6
  title:
    ru: Твой совет
    en: Your Counsel
    es: Tu consejo
    uk: Твоя порада
  text:
    ru: Отец, руководи мной Своим мудрым советом в течение всей моей земной жизни,
      а после прими меня в Твою вечную небесную славу.
    en: Father, guide me with Your wise counsel throughout my earthly life, and afterward
      receive me into Your eternal heavenly glory.
    es: Padre, guíame con Tu sabio consejo a lo largo de mi vida terrenal, y después
      recíbeme en Tu eterna gloria celestial.
    uk: Отче, кероваpй мною Своєю мудрою порадою протягом усього мого земного життя,
      а потім прийми мене у Твою вічну небесну славу.
- id: guidance_wisdom_21
  ref: jm:1:5
  title:
    ru: Просить о мудрости
    en: Asking for Wisdom
    es: Pedir sabiduría
    uk: Просити про мудрість
  text:
    ru: Господи, даруй мне Твою мудрость для каждого решения сегодня. Верю, что Ты
      щедро даешь просящим и направляешь меня.
    en: Lord, grant me Your wisdom for every decision today. I trust that You give
      generously to all who ask and guide my steps.
    es: Señor, concédeme Tu sabiduría para cada decisión de hoy. Confío en que das
      generosamente a quienes te lo piden y me guías.
    uk: Господи, даруй мені Твою мудрість для кожного рішення сьогодні. Вірю, що Ти
      щедро даєш усім, хто просить, і ведеш мене.
- id: guidance_wisdom_22
  ref: prv:3:5
  title:
    ru: Доверие всем сердцем
    en: Trust with All Your Heart
    es: Confiar de corazón
    uk: Довіра всім серцем
  text:
    ru: Отец, я доверяю Тебе всем сердцем и отказываюсь полагаться на свой разум.
      Веди меня Своим путем истины и благодати.
    en: Father, I trust You with all my heart and lean not on my own understanding.
      Lead me in Your path of truth and grace.
    es: Padre, confío en Ti con todo mi corazón y no me apoyo en mi propia prudencia.
      Guíame por Tu camino de verdad y gracia.
    uk: Отче, я довіряю Тобі всім серцем і не покладаюся на власний розум. Веди мене
      Своїм шляхом істини та благодаті.
- id: guidance_wisdom_23
  ref: ps:32:8
  title:
    ru: Око Твоё ведёт
    en: Your Watchful Eye
    es: Tu ojo me guía
    uk: Твоє око веде
  text:
    ru: Господь, научи меня пути, по которому мне идти. Пусть Твое любящее око всегда
      направляет меня и хранит от ошибок.
    en: Lord, teach me the way I should go. May Your loving eye always guide me and
      keep me from making mistakes today.
    es: Señor, enséñame el camino por el que debo andar. Que Tu ojo amoroso me guíe
      siempre y me guarde de cometer errores hoy.
    uk: Господи, навчи мене дороги, якою маю йти. Нехай Твоє любляче око завжди скеровує
      мене та береже від помилок.
- id: guidance_wisdom_24
  ref: prv:3:6
  title:
    ru: Познание Его путей
    en: Acknowledging His Ways
    es: Reconocer sus caminos
    uk: Пізнання Його шляхів
  text:
    ru: Во всех путях моих я познаю Тебя, Господи. Верю, что Ты направишь мои шаги
      и сделаешь мои жизненные тропы прямыми.
    en: In all my ways I acknowledge You, Lord. I trust that You will direct my steps
      and make my paths straight today.
    es: En todos mis caminos te reconozco, Señor. Confío en que Tú dirigirás mis pasos
      y harás rectos mis senderos hoy.
    uk: У всіх дорогах моїх пізнаю Тебе, Господи. Вірю, що Ти направиш мої кроки та
      зробиш мої життєві стежки прямими.
- id: guidance_wisdom_25
  ref: prv:6:23
  title:
    ru: Свет на тропе
    en: Light on My Path
    es: Luz en mi senda
    uk: Світло на стежці
  text:
    ru: Твое Слово, Господи, — светильник для ног моих и свет для моей тропы. Помоги
      мне идти при Твоем божественном сиянии.
    en: Your Word, Lord, is a lamp to my feet and a light to my path. Help me to walk
      daily in Your divine illumination.
    es: Tu Palabra, Señor, es lámpara a mis pies y lumbrera a mi camino. Ayúdame a
      caminar hoy bajo Tu luz divina.
    uk: Твоє Слово, Господи, — світильник для ніг моїх і світло для моєї стежки. Допоможи
      мне йти сьогодні при Твоєму світлі.
- id: guidance_wisdom_26
  ref: is:30:21
  title:
    ru: Голос водительства
    en: Voice of Guidance
    es: Voz de guía
    uk: Голос провідництва
  text:
    ru: Боже, пусть мое сердце слышит Твой тихий голос, указывающий верный путь. Помоги
      мне не уклоняться ни направо, ни налево.
    en: God, let my heart hear Your quiet voice pointing out the right way. Help me
      not to turn to the right or to the left.
    es: Dios, permite que mi corazón escuche Tu voz apacible señalando el camino.
      Ayúdame a no desviarme ni a derecha ni a izquierda.
    uk: Боже, нехай моє серце чує Твій тихий голос, що вказує правильний шлях. Допоможи
      мені не відхилятися ні праворуч, ні ліворуч.
- id: guidance_wisdom_27
  ref: jm:3:17
  title:
    ru: Мудрость чистая и мирная
    en: Pure and Peaceable
    es: Pura y pacífica
    uk: Чиста й мирна мудрість
  text:
    ru: Господь, наполни меня мудростью свыше — чистой, мирной, послушной и полной
      милосердия. Пусть она направляет мои дела.
    en: Lord, fill me with wisdom from above—pure, peaceable, gentle, and full of
      mercy. May it guide my daily actions.
    es: 'Señor, lléname de sabiduría de lo alto: pura, pacífica, amable y llena de
      misericordia. Que guíe mis acciones de hoy.'
    uk: Господи, наповни мене мудрістю згори — чистою, мирною, слухняною та повною
      милосердя. Нехай вона керує моїми діями.
- id: guidance_wisdom_28
  ref: ps:25:4
  title:
    ru: Научи стезям Твоим
    en: Teach Me Your Paths
    es: Enséñame tus sendas
    uk: Навчи стежок Твоїх
  text:
    ru: Укажи мне, Господи, пути Твои и научи меня Твоим стезям. Позволь мне ходить
      в Твоей истине каждый день моей жизни.
    en: Show me Your ways, O Lord, and teach me Your paths. Enable me to walk in Your
      truth and learn from You every day.
    es: Muéstrame, Señor, Tus caminos y enséñame Tus sendas. Permíteme caminar en
      Tu verdad y aprender de Ti cada día.
    uk: Покажи мені, Господи, дороги Твої та навчи мене стежок Твоїх. Дозволь мені
      ходити в Твоїй істині кожного дня мого життя.
- id: guidance_wisdom_29
  ref: prv:16:9
  title:
    ru: Направление шагов
    en: Directing the Steps
    es: Dirigir los pasos
    uk: Скерування кроків
  text:
    ru: Отец, я могу строить планы в своем сердце, но верю, что именно Ты направляешь
      мои шаги к лучшему будущему. Веди меня.
    en: Father, I may make plans in my heart, but I trust that You are the one who
      directs my steps to a better future. Lead me.
    es: Padre, puedo hacer planes en mi corazón, pero confío en que Tú eres quien
      dirige mis pasos hacia un futuro mejor. Guíame.
    uk: Отче, я можу будувати плани у своєму серці, але вірю, що саме Ти направляєш
      мої кроки до кращого майбутнього. Веди мене.
- id: guidance_wisdom_30
  ref: cl:1:9
  title:
    ru: Угождать Тебе во всём
    en: Pleasing You in All
    es: Agradarte en todo
    uk: Догоджати Тобі в усьому
  text:
    ru: Господи, исполни меня познанием Твоей воли во всякой премудрости и разумении
      духовном, чтобы мне угождать Тебе во всем.
    en: Lord, fill me with the knowledge of Your will in all spiritual wisdom and
      understanding, so that I may please You in everything.
    es: Señor, lléname del conocimiento de Tu voluntad con toda sabiduría y entendimiento
      espiritual, para agradarte en todo.
    uk: Господи, наповни мене пізнанням Твоєї волі в усякій премудрості та духовному
      розумінні, щоб мені догоджати Тобі в усьому.
- id: family_relationships_01
  ref: cl:3:13
  title:
    ru: Прощение в семье
    en: Forgiveness in Family
    es: Perdón en familia
    uk: Прощення в сім'ї
  text:
    ru: Господь, научи меня прощать моих близких так же великодушно, как Ты простил
      меня. Пусть в нашем доме царит мир.
    en: Lord, teach me to forgive my family members as generously as You forgave me.
      May peace reign in our home.
    es: Señor, enséñame a perdonar a mis seres queridos con la misma generosidad que
      Tú me perdonaste. Que la paz reine en nuestro hogar.
    uk: Господи, навчи мене прощати моїх близьких так само великодушно, як Ти простив
      мене. Нехай у нашому домі панує мир.
- id: family_relationships_02
  ref: cl:3:14
  title:
    ru: Союз любви
    en: Bond of Love
    es: Vínculo de amor
    uk: Союз любові
  text:
    ru: Боже, облеки нашу семью в Твою совершенную любовь, которая связывает нас крепкими
      узами согласия и понимания.
    en: God, clothe our family in Your perfect love, which binds us together in strong
      bonds of harmony and understanding.
    es: Dios, viste a nuestra familia con Tu amor perfecto, que nos une en fuertes
      lazos de armonía y entendimiento.
    uk: Боже, зодягни нашу родину у Твою досконалу любов, яка зв'язує нас міцними
      узами злагоди та розуміння.
- id: family_relationships_03
  ref: eph:5:21
  title:
    ru: Взаимное уважение
    en: Mutual Respect
    es: Respeto mutuo
    uk: Взаємна повага
  text:
    ru: Отец, научи нас уважать и ценить друг друга в семье, уступая с любовью и кротостью
      ради Твоей славы.
    en: Father, teach us to respect and value each other in our family, yielding in
      love and gentleness for Your glory.
    es: Padre, enséñanos a respetarnos y valorarnos en familia, cediendo con amor
      y mansedumbre para Tu gloria.
    uk: Отче, навчи нас поважати та цінувати один одного в сім'ї, поступаючись із
      любов'ю та лагідністю заради Твоєї слави.
- id: family_relationships_04
  ref: eph:6:1
  title:
    ru: Послушание и мир
    en: Obedience and Peace
    es: Obediencia y paz
    uk: Послух і мир
  text:
    ru: Господь, благослови наших детей послушанием и почтением к родителям. Наполни
      наш дом Твоим божественным порядком.
    en: Lord, bless our children with obedience and respect for their parents. Fill
      our home with Your divine order.
    es: Señor, bendice a nuestros hijos con obediencia y respeto hacia sus padres.
      Llena nuestro hogar con Tu orden divino.
    uk: Господи, благослови наших дітей послухом і повагою до батьків. Наповни наш
      дім Твоїм божественним порядком.
- id: family_relationships_05
  ref: eph:6:4
  title:
    ru: Мудрость родителей
    en: Parental Wisdom
    es: Sabiduría de padres
    uk: Мудрість батьків
  text:
    ru: Боже, дай мне мудрости воспитывать детей без раздражения, направляя их к Тебе
      с любовью, терпением и нежностью.
    en: God, give me wisdom to raise my children without anger, guiding them to You
      with love, patience, and tenderness.
    es: Dios, dame sabiduría para criar a mis hijos sin ira, guiándolos hacia Ti con
      amor, paciencia y ternura.
    uk: Боже, дай мені мудрості виховувати дітей без роздратування, направляючи їх
      до Тебе з любов'ю, терпінням і ніжністю.
- id: family_relationships_06
  ref: prv:17:17
  title:
    ru: Верная дружба
    en: Faithful Friendship
    es: Amistad fiel
    uk: Вірна дружба
  text:
    ru: Отец, спасибо за верных друзей и близких. Помоги мне быть для них надежной
      опорой в любые времена.
    en: Father, thank You for faithful friends and loved ones. Help me to be a reliable
      support for them at all times.
    es: Padre, gracias por los amigos fieles y seres queridos. Ayúdame a ser un apoyo
      confiable para ellos en todo momento.
    uk: Отче, дякую за вірних друзів та близьких. Допоможи мені бути для них надійною
      опорою в будь-які часи.
- id: family_relationships_07
  ref: prv:22:6
  title:
    ru: Путь веры
    en: Path of Faith
    es: Camino de fe
    uk: Шлях віри
  text:
    ru: Господь, помоги мне направить моих детей на Твой истинный путь, чтобы они
      сохранили веру на всю жизнь.
    en: Lord, help me to direct my children on Your true path, so that they may keep
      their faith throughout their lives.
    es: Señor, ayúdame a dirigir a mis hijos por Tu camino verdadero, para que mantengan
      la fe durante toda su vida.
    uk: Господи, допоможи мені спрямувати моїх дітей на Твій істинний шлях, щоб вони
      зберегли віру на все життя.
- id: family_relationships_08
  ref: ps:127:3
  title:
    ru: Дар детей
    en: Gift of Children
    es: Don de los hijos
    uk: Дар дітей
  text:
    ru: Боже, спасибо за детей - Твой драгоценный дар. Помоги мне беречь их души и
      растить их для Твоего царства.
    en: God, thank You for children - Your precious gift. Help me to guard their souls
      and raise them for Your kingdom.
    es: Dios, gracias por los hijos, Tu precioso regalo. Ayúdame a cuidar sus almas
      y criarlos para Tu reino.
    uk: Боже, дякую за дітей - Твій дорогоцінний дар. Допоможи мені берегти їхні душі
      та ростити їх для Твого царства.
- id: family_relationships_09
  ref: 1pe:4:8
  title:
    ru: Любовь, что исцеляет
    en: Love That Heals
    es: Amor que sana
    uk: Любов, що зціляє
  text:
    ru: Отец, наполни наши сердца глубокой любовью, способной покрывать ошибки и залечивать
      раны в отношениях.
    en: Father, fill our hearts with deep love that is able to cover mistakes and
      heal wounds in our relationships.
    es: Padre, llena nuestros corazones de un amor profundo, capaz de cubrir errores
      y sanar heridas en las relaciones.
    uk: Отче, наповни наші серця глибокою любов'ю, яка здатна покривати помилки та
      гоїти рани у стосунках.
- id: family_relationships_10
  ref: 1jo:4:19
  title:
    ru: Делиться любовью
    en: Sharing His Love
    es: Compartir su amor
    uk: Ділитися любов'ю
  text:
    ru: Господь, Твоя любовь первой коснулась нас. Помоги нам щедро делиться этой
      безусловной любовью с нашими близкими.
    en: Lord, Your love touched us first. Help us to share this unconditional love
      generously with our close ones.
    es: Señor, Tu amor nos tocó primero. Ayúdanos a compartir este amor incondicional
      generosamente con nuestros seres queridos.
    uk: Господи, Твоя любов першою торкнулася нас. Допоможи нам щедро ділитися цією
      безумовною любов'ю з нашими близькими.
- id: family_relationships_11
  ref: 1co:13:4
  title:
    ru: Терпение любви
    en: Patience of Love
    es: Paciencia del amor
    uk: Терпіння любові
  text:
    ru: Боже, даруй мне долготерпение и доброту в общении с родными. Пусть из моего
      сердца уйдут раздражение и гордость.
    en: God, grant me patience and kindness when communicating with my family. May
      anger and pride leave my heart.
    es: Dios, concédeme paciencia y bondad al comunicarme con mi familia. Que el enojo
      y el orgullo se vayan de mi corazón.
    uk: Боже, даруй мені довготерпіння та доброту в спілкуванні з рідними. Нехай з
      мого серця підуть роздратування та гордість.
- id: family_relationships_12
  ref: 1co:13:7
  title:
    ru: Сила любви
    en: Power of Love
    es: Fuerza del amor
    uk: Сила любові
  text:
    ru: Отец, укрепи нашу семью, чтобы мы могли все покрывать, всему верить, на все
      надеяться и все переносить вместе.
    en: Father, strengthen our family so that we can bear all things, believe all
      things, hope all things, and endure all.
    es: Padre, fortalece a nuestra familia para que podamos soportar todo, creer todo,
      esperar todo y sobrellevar todo juntos.
    uk: Отче, зміцни нашу родину, щоб ми могли все зносити, в усе вірити, на все сподіватися
      і все терпіти разом.
- id: family_relationships_13
  ref: js:24:15
  title:
    ru: Служение Богу
    en: Serving God
    es: Servir a Dios
    uk: Служіння Богові
  text:
    ru: Господь, я посвящаю свой дом Тебе. Пусть вся моя семья преданно и радостно
      служит только Тебе во все дни.
    en: Lord, I dedicate my home to You. May my entire family faithfully and joyfully
      serve only You all our days.
    es: Señor, dedico mi hogar a Ti. Que toda mi familia te sirva con fidelidad y
      alegría solo a Ti todos nuestros días.
    uk: Господи, я присвячую свій дім Тобі. Нехай уся моя родина віддано і радісно
      служить тільки Тобі в усі дні.
- id: family_relationships_14
  ref: rt:1:16
  title:
    ru: Верность близким
    en: Loyalty to Family
    es: Lealtad familiar
    uk: Вірність близьким
  text:
    ru: Боже, дай мне сердце, преданное моей семье. Помоги разделять с ними и радости,
      и трудности пути.
    en: God, give me a heart devoted to my family. Help me to share both their joys
      and the difficulties of the journey.
    es: Dios, dame un corazón devoto a mi familia. Ayúdame a compartir tanto sus alegrías
      como las dificultades del camino.
    uk: Боже, дай мені серце, віддане моїй родині. Допоможи розділяти з ними і радощі,
      і труднощі життєвого шляху.
- id: family_relationships_15
  ref: prv:15:1
  title:
    ru: Кроткий ответ
    en: Gentle Answer
    es: Respuesta blanda
    uk: Лагідна відповідь
  text:
    ru: Отец, храни мои уста от резких слов. Научи меня отвечать кротко, чтобы гасить
      конфликты и созидать мир.
    en: Father, guard my lips from harsh words. Teach me to answer gently to defuse
      conflicts and build peace.
    es: Padre, guarda mis labios de palabras duras. Enséñame a responder con blandura
      para calmar conflictos y traer paz.
    uk: Отче, бережи мої вуста від різких слів. Навчи мене відповідати лагідно, щоб
      гасити конфлікти та будувати мир.
- id: family_relationships_16
  ref: 1ts:5:11
  title:
    ru: Поддержка
    en: Encouragement
    es: Mutuo apoyo
    uk: Підтримка
  text:
    ru: Господь, помоги нам утешать и созидать друг друга в семье, вдохновляя добрыми
      словами каждый день.
    en: Lord, help us to comfort and build up one another in our family, inspiring
      each other with kind words daily.
    es: Señor, ayúdanos a consolarnos y edificarnos unos a otros en familia, inspirándonos
      con buenas palabras a diario.
    uk: Господи, допоможи нам утішати та будувати один одного в сім'ї, надихаючи добрими
      словами щодня.
- id: family_relationships_17
  ref: gl:6:2
  title:
    ru: Бремя заботы
    en: Bearing Burdens
    es: Llevar las cargas
    uk: Турбота про інших
  text:
    ru: Боже, научи меня носить бремена моих близких, проявляя Твою любовь и заботу
      в их трудные минуты.
    en: God, teach me to bear the burdens of my loved ones, showing Your love and
      care in their difficult moments.
    es: Dios, enséñame a llevar las cargas de mis seres queridos, mostrando Tu amor
      y cuidado en sus momentos difíciles.
    uk: Боже, навчи мене носити тягарі моїх близьких, виявляючи Твою любов і турботу
      в їхні важкі хвилини.
- id: family_relationships_18
  ref: hb:13:1
  title:
    ru: Братская любовь
    en: Brotherly Love
    es: Amor fraternal
    uk: Братня любов
  text:
    ru: Отец, пусть Твоя искренняя братская любовь всегда пребывает между нами, укрепляя
      родственные связи.
    en: Father, may Your sincere brotherly love always abide among us, strengthening
      our family bonds.
    es: Padre, que Tu sincero amor fraternal permanezca siempre entre nosotros, fortaleciendo
      nuestros lazos familiares.
    uk: Отче, нехай Твоя щира братня любов завжди перебуває між нами, зміцнюючи родинні
      зв'язки.
- id: family_relationships_19
  ref: ps:133:1
  title:
    ru: Единство братьев
    en: Unity of Brethren
    es: Unidad de hermanos
    uk: Єдність братів
  text:
    ru: Господь, как прекрасно жить в согласии! Излей Свое благословение единства
      на нашу семью и всех родных.
    en: Lord, how wonderful it is to live in harmony! Pour out Your blessing of unity
      upon our family and relatives.
    es: Señor, ¡qué hermoso es vivir en armonía! Derrama Tu bendición de unidad sobre
      nuestra familia y parientes.
    uk: Господи, як чудово жити в злагоді! Вилий Своє благословення єдності на нашу
      родину та всіх рідних.
- id: family_relationships_20
  ref: prv:31:26
  title:
    ru: Мудрые слова
    en: Wise Words
    es: Palabras sabias
    uk: Мудрі слова
  text:
    ru: Боже, наполни уста моих близких мудростью, а их сердца - законом доброты,
      чтобы наш дом был полон тепла.
    en: God, fill the mouths of my family with wisdom, and their hearts with the law
      of kindness, to keep our home warm.
    es: Dios, llena la boca de mi familia con sabiduría, y sus corazones con la ley
      de la bondad, para mantener cálido nuestro hogar.
    uk: Боже, наповни вуста моїх близьких мудрістю, а їхні серця - законом доброти,
      щоб наш дім був сповнений тепла.
- id: family_relationships_21
  ref: prv:17:17
  title:
    ru: Надёжный друг
    en: A Reliable Friend
    es: Un amigo fiel
    uk: Надійний друг
  text:
    ru: Господи, научи меня быть верным другом и надежной опорой для моих близких
      в любые времена. Пусть моя любовь к ним будет крепкой и искренней в дни испытаний.
    en: Lord, teach me to be a faithful friend and a reliable support for my loved
      ones at all times. May my love for them remain strong and sincere in days of
      trial.
    es: Señor, enséñame a ser un amigo fiel y un apoyo constante para mis seres queridos
      en todo momento. Que mi amor por ellos sea fuerte y sincero en las pruebas.
    uk: Господи, навчи мене бути вірним другим і надійною опорою для моїх близьких
      у будь-які часи. Нехай моя любов до них буде міцною та щирою в дні випробувань.
- id: family_relationships_22
  ref: cl:3:13
  title:
    ru: Сила прощения
    en: Power of Forgiveness
    es: El Poder del Perdón
    uk: Сила прощення
  text:
    ru: Отец, даруй мне терпение принимать слабости родных и прощать их от всего сердца,
      как и Ты простил меня. Наполни наш дом Твоим миром и пониманием.
    en: Father, grant me patience to bear with my family's weaknesses and forgive
      them from the heart, just as You forgave me. Fill our home with Your peace.
    es: Padre, dame paciencia para soportar las debilidades de mi familia y perdonar
      de corazón, como Tú me perdonaste. Llena nuestro hogar con Tu paz.
    uk: Отче, даруй мені терпіння приймати слабкості рідних і прощати їх від усього
      серця, як і Ти простив мене. Наповни наш дім Твоїм миром і розумінням.
- id: family_relationships_23
  ref: cl:3:14
  title:
    ru: Совершенная любовь связует
    en: Perfect Love Binds Us
    es: El amor que une
    uk: Досконала любов єднає
  text:
    ru: Господи, облеки нашу семью в совершенную любовь, которая связывает нас воедино.
      Пусть Твоя забота будет главным основанием наших отношений каждый день.
    en: Lord, clothe our family in perfect love, which binds us together. May Your
      care be the main foundation of our relationships every single day.
    es: Señor, viste a nuestra familia con el amor perfecto que nos une. Que Tu cuidado
      sea el fundamento principal de nuestras relaciones cada día.
    uk: Господи, зодягни нашу родину в досконалу любов, що зв'язує нас воєдино. Нехай
      Твоя турбота буде головною основою наших стосунків щодня.
- id: family_relationships_24
  ref: 1co:13:4
  title:
    ru: Нежность в трудный час
    en: Tenderness in Hard Moments
    es: Ternura en momentos difíciles
    uk: Ніжність у важку хвилину
  text:
    ru: Боже, научи меня любить моих близких долготерпеливо и милосердно. Удали из
      моего сердца раздражение и помоги проявлять нежность даже в трудные минуты.
    en: God, teach me to love my family with patience and kindness. Remove irritation
      from my heart and help me show tenderness even in difficult moments.
    es: Dios, enséñame a amar a mi familia con paciencia y bondad. Quita la irritación
      de mi corazón y ayúdame a mostrar ternura incluso en momentos difíciles.
    uk: Боже, навчи мене любити моїх близьких довготерпеливо та милосердно. Забери
      з мого серця роздратування й допоможи виявляти ніжність навіть у важкі миті.
- id: family_relationships_25
  ref: 1pe:4:8
  title:
    ru: Единство в доме
    en: Unity at Home
    es: Unidad en el hogar
    uk: Єдність у домі
  text:
    ru: Отец, помоги мне любить родных глубоко и искренне. Пусть Твоя любовь во мне
      покрывает любые промахи и помогает нам сохранять единство и мир в семье.
    en: Father, help me love my family deeply and sincerely. May Your love in me cover
      all offenses and help us maintain unity and peace in our home.
    es: Padre, ayúdame a amar a mi familia profunda y sinceramente. Que Tu amor en
      mí cubra todas las faltas y nos ayude a mantener la unidad y la paz en casa.
    uk: Отче, допоможи мені любити рідних глибоко й щиро. Нехай Твоя любов у мені
      покриває будь-які помилки й допомагає нам зберігати єдність і мир у родині.
- id: family_relationships_26
  ref: ps:127:3
  title:
    ru: Наследие от Господа
    en: A Heritage from the Lord
    es: Herencia del Señor
    uk: Спадщина від Господа
  text:
    ru: Господи, благодарю Тебя за детей, которых Ты доверил нам. Помоги мне ценить
      это наследие, воспитывать их в Твоей истине и быть для них добрым примером.
    en: Lord, thank You for the children You have entrusted to us. Help me treasure
      this heritage, raise them in Your truth, and be a good example for them.
    es: Señor, gracias por los hijos que nos has confiado. Ayúdame a valorar esta
      herencia, a guiarlos en Tu verdad y a ser un buen ejemplo para ellos.
    uk: Господи, дякую Тобі за дітей, яких Ти довірив нам. Допоможи мені цінувати
      цей спадок, виховувати їх у Твоїй істині та бути для них добрим прикладом.
- id: family_relationships_27
  ref: prv:22:6
  title:
    ru: Мудрое воспитание
    en: Wise Upbringing
    es: Crianza Sabia
    uk: Мудре виховання
  text:
    ru: Боже, даруй мне мудрость направлять моих детей на правильный жизненный путь.
      Пусть Твое слово укоренится в их сердцах и оберегает их на протяжении всей жизни.
    en: God, grant me wisdom to guide my children on the right path of life. May Your
      word take root in their hearts and protect them throughout their lives.
    es: Dios, dame sabiduría para guiar a mis hijos por el camino recto de la vida.
      Que Tu palabra eche raíces en sus corazones y los proteja siempre.
    uk: Боже, даруй мені мудрість спрямовувати моїх дітей на правильну життєву дорогу.
      Нехай Твоє слово вкоріниться в їхніх серцях і оберігає їх протягом усього життя.
- id: family_relationships_28
  ref: eph:6:2
  title:
    ru: Почитание родителей
    en: Honoring Parents
    es: Honrar a los Padres
    uk: Шанування батьків
  text:
    ru: Господи, научи меня искренне почитать моих родителей, проявлять к ним заботу,
      уважение и благодарность за их любовь и труд. Благослови их долголетием.
    en: Lord, teach me to sincerely honor my parents, showing them care, respect,
      and gratitude for their love and labor. Bless them with long life and peace.
    es: Señor, enséñame a honrar sinceramente a mis padres, mostrándoles cuidado,
      respeto y gratitud por su amor y trabajo. Bendícelos con larga vida.
    uk: Господи, навчи мене щиро шанувати моїх батьків, виявляти до них турботу, повагу
      та вдячність за їхню любов і працю. Благослови їх довголіттям.
- id: family_relationships_29
  ref: js:24:15
  title:
    ru: Служение Богу семьей
    en: Serving God Together
    es: Sirviendo a Dios Juntos
    uk: Служіння Богу сім'єю
  text:
    ru: Отец, я посвящаю свой дом и свою семью Тебе. Помоги нам служить Тебе в единодушии,
      хранить Твои заповеди и прославлять Твое имя нашей совместной жизнью.
    en: Father, I dedicate my home and family to You. Help us serve You in unity of
      heart, keep Your commandments, and glorify Your name through our life together.
    es: Padre, dedico mi hogar y mi familia a Ti. Ayúdanos a servirte en unidad, a
      guardar Tus mandamientos y a glorificar Tu nombre con nuestra vida juntos.
    uk: Отче, я присвячую свій дім і свою родину Тобі. Допоможи нам служити Тобі в
      однодушності, берегти Твої заповіді та прославляти Твоє ім'я спільним життям.
- id: family_relationships_30
  ref: 1jo:4:19
  title:
    ru: Источник нашей любви
    en: Source of Our Love
    es: Fuente de Nuestro Amor
    uk: Джерело нашої любові
  text:
    ru: Господи, мы любим друг друга, потому что Ты первый возлюбил нас. Пусть Твоя
      безусловная любовь течет через нас, согревая и исцеляя наши семейные узы.
    en: Lord, we love because You first loved us. Let Your unconditional love flow
      through us, warming and healing our family bonds every day.
    es: Señor, amamos porque Tú nos amaste primero. Deja que Tu amor incondicional
      fluya a través de nosotros, sanando y fortaleciendo nuestros lazos familiares.
    uk: Господи, ми любимо один одного, бо Ти першим полюбив нас. Нехай Твоя безумовна
      любов тече через нас, зігріваючи та зцілюючи наші сімейні зв'язки.
- id: humility_repentance_01
  ref: lk:18:13
  title:
    ru: Сокрушенное сердце
    en: A broken heart
    es: Un corazón quebrantado
    uk: Сокрушене серце
  text:
    ru: Господи, прими мое сокрушенное сердце. Я смиряюсь пред Тобой, признавая свои
      ошибки. Очисти меня и наполни Своим миром, чтобы я мог следовать за Тобой с
      чистотой души.
    en: Lord, receive my broken heart. I humble myself before You, acknowledging my
      faults. Cleanse me and fill me with Your peace, so I may follow You with a pure
      soul.
    es: Señor, recibe mi corazón quebrantado. Me humillo ante Ti reconociendo mis
      errores. Límpiame y lléname de Tu paz para seguirte con un alma pura.
    uk: Господи, прийми моє сокрушене серце. Я смиряюся перед Тобою, визнаючи свої
      помилки. Очисти мене і наповни Своїм миром, щоб я міг іти за Тобою з чистою
      душею.
- id: humility_repentance_02
  ref: jm:4:10
  title:
    ru: Смирение пред Господом
    en: Humility before God
    es: Humildad ante Dios
    uk: Смирення перед Господом
  text:
    ru: Боже, я склоняюсь пред Твоим величием. Помоги мне отбросить гордость и довериться
      Твоей воле. Возвысь меня в Своей любви, когда я выбираю путь кротости и послушания.
    en: God, I bow before Your greatness. Help me cast aside pride and trust in Your
      will. Lift me up in Your love as I choose the path of meekness and obedience.
    es: Dios, me inclino ante Tu grandeza. Ayúdame a dejar el orgullo y confiar en
      Tu voluntad. Levántame en Tu amor al elegir el camino de la mansedumbre.
    uk: Боже, я схиляюся перед Твоєю величчю. Допоможи мені відкинути гордість і довіритися
      Твоїй волі. Піднеси мене в Своїй любові, коли я обираю шлях лагідності.
- id: humility_repentance_03
  ref: prv:11:2
  title:
    ru: Мудрость смиренных
    en: Wisdom of the humble
    es: Sabiduría de los humildes
    uk: Мудрість смиренних
  text:
    ru: Господь, даруй мне мудрость быть смиренным. Я не хочу полагаться на свой разум,
      но ищу Твоего водительства. Пусть мой дух будет готов учиться и меняться ради
      Тебя.
    en: Lord, grant me the wisdom to be humble. I do not want to rely on my own mind,
      but seek Your guidance. May my spirit be ready to learn and change for You.
    es: Señor, dame la sabiduría para ser humilde. No quiero confiar en mi propia
      mente, sino buscar Tu guía. Que mi espíritu esté dispuesto a aprender y cambiar.
    uk: Господи, даруй мені мудрість бути смиренним. Я не хочу покладатися на свій
      розум, а шукаю Твого проводу. Нехай мій дух буде готовий вчитися і змінюватися
      для Тебе.
- id: humility_repentance_04
  ref: mt:11:29
  title:
    ru: Уроки кротости
    en: Lessons of meekness
    es: Lecciones de mansedumbre
    uk: Уроки лагідності
  text:
    ru: Иисус, научи меня Твоей кротости. Мое сердце часто беспокойно, но в Тебе я
      нахожу покой. Сделай меня чутким к Твоему голосу и смиренным в моих отношениях
      с людьми.
    en: Jesus, teach me Your meekness. My heart is often restless, but in You I find
      rest. Make me sensitive to Your voice and humble in my relationships with others.
    es: Jesús, enséñame Tu mansedumbre. Mi corazón suele estar inquieto, pero en Ti
      hallo descanso. Hazme sensible a Tu voz y humilde en mis relaciones con otros.
    uk: Ісусе, навчи мене Твоєї лагідності. Моє серце часто неспокійне, але в Тобі
      я знаходжу спокій. Зроби мене чутливим до Твого голосу і смиренним у стосунках
      із людьми.
- id: humility_repentance_05
  ref: 2ch:7:14
  title:
    ru: Покаяние и исцеление
    en: Repentance and healing
    es: Arrepentimiento y sanidad
    uk: Покаяння і зцілення
  text:
    ru: Отец, я смиряюсь и молюсь. Прости мои грехи и исцели мою жизнь. Я ищу лица
      Твоего с надеждой, веря, что Ты восстановишь то, что было разрушено, по Твоей
      великой милости.
    en: Father, I humble myself and pray. Forgive my sins and heal my life. I seek
      Your face with hope, trusting that You will restore what was broken by Your
      mercy.
    es: Padre, me humillo y oro. Perdona mis pecados y sana mi vida. Busco Tu rostro
      con esperanza, confiando en que restaurarás lo roto por Tu gran misericordia.
    uk: Отче, я смиряюся і молюся. Прости мої гріхи і зціли моє життя. Я шукаю Твого
      лиця з надією, вірячи, що Ти відновиш те, що було зруйноване, за Твоєю милістю.
- id: humility_repentance_06
  ref: is:57:15
  title:
    ru: Обитель Всевышнего
    en: Dwelling of the Most High
    es: Morada del Altísimo
    uk: Оселя Всевишнього
  text:
    ru: Господи, Ты живешь в вечности, но пребываешь с сокрушенным духом. Оживи мое
      сердце и дай мне радость смирения, чтобы я мог отражать Твой свет в этом мире
      каждый день.
    en: Lord, You live in eternity but dwell with the contrite spirit. Revive my heart
      and give me the joy of humility, so I can reflect Your light in this world daily.
    es: Señor, habitas en la eternidad pero moras con el espíritu contrito. Aviva
      mi corazón y dame el gozo de la humildad, para reflejar Tu luz en este mundo
      a diario.
    uk: Господи, Ти живеш у вічності, але перебуваєш із сокрушеним духом. Оживи моє
      серце і дай мені радість смирення, щоб я міг віддзеркалювати Твоє світло у світі
      щодня.
- id: humility_repentance_07
  ref: ph:2:3
  title:
    ru: Почтение к другим
    en: Respect for others
    es: Respeto a los demás
    uk: Пошана до інших
  text:
    ru: Боже, помоги мне считать других выше себя. Избавь меня от эгоизма и дай сердце,
      полное любви и внимания к нуждам ближних. Пусть Твое смирение станет моим образом
      жизни.
    en: God, help me to consider others better than myself. Deliver me from selfishness
      and give me a heart full of love and attention to the needs of neighbors.
    es: Dios, ayúdame a considerar a los demás superiores a mí mismo. Líbrame del
      egoísmo y dame un corazón lleno de amor y atención a las necesidades del prójimo.
    uk: Боже, допоможи мені вважати інших вищими за себе. Позбав мене егоїзму і дай
      серце, повне любові та уваги до потреб ближніх. Нехай Твоє смирення стане моїм
      життям.
- id: humility_repentance_08
  ref: 1pe:5:5
  title:
    ru: Благодать смиренным
    en: Grace to the humble
    es: Gracia a los humildes
    uk: Благодать смиренним
  text:
    ru: Господь, я облекаюсь в смиренномудрие пред Тобой. Противостань моей гордости
      и наполни меня Своей благодатью. Я хочу доверять Тебе во всем, что происходит
      в моей жизни.
    en: Lord, I clothe myself in humility before You. Oppose my pride and fill me
      with Your grace. I want to trust You in everything that happens in my life.
    es: Señor, me visto de humildad ante Ti. Resiste a mi orgullo y lléname de Tu
      gracia. Quiero confiar en Ti en todo lo que sucede en mi vida.
    uk: Господи, я зодягаюся в смиренномудрість перед Тобою. Протистань моїй гордості
      і наповни мене Своєю благодаттю. Я хочу довіряти Тобі в усьому, що стається
      в житті.
- id: humility_repentance_09
  ref: ps:25:9
  title:
    ru: Наставление кротких
    en: Guiding the meek
    es: Guiando a los mansos
    uk: Наставлення лагідних
  text:
    ru: Господи, направь меня на Свой путь. Я хочу быть кротким, чтобы Ты мог учить
      меня Своей воле. Веди меня Своей истиной и помоги мне следовать за Тобой с открытым
      сердцем.
    en: Lord, direct me in Your way. I want to be meek so You can teach me Your will.
      Lead me in Your truth and help me follow You with an open heart.
    es: Señor, guíame en Tu camino. Quiero ser manso para que me enseñes Tu voluntad.
      Guíame en Tu verdad y ayúdame a seguirte con un corazón abierto.
    uk: Господи, спрямуй мене на Свій шлях. Я хочу бути лагідним, щоб Ти міг навчати
      мене Своєї волі. Веди мене Своєю істиною і допоможи йти за Тобою з відкритим
      серцем.
- id: humility_repentance_10
  ref: lm:3:40
  title:
    ru: Исследование путей
    en: Examining our ways
    es: Examinando nuestros caminos
    uk: Дослідження шляхів
  text:
    ru: Отец, я исследую свои пути сегодня. Помоги мне увидеть свои ошибки и искренне
      вернуться к Тебе. Пусть мое покаяние будет глубоким, а любовь к Тебе — искренней
      и чистой.
    en: Father, I examine my ways today. Help me see my faults and sincerely return
      to You. May my repentance be deep and my love for You sincere and pure.
    es: Padre, examino mis caminos hoy. Ayúdame a ver mis faltas y volver sinceramente
      a Ti. Que mi arrepentimiento sea profundo y mi amor por Ti sea puro.
    uk: Отче, я досліджую свої шляхи сьогодні. Допоможи мені побачити свої помилки
      і щиро повернутися до Тебе. Нехай моє покаяння буде глибоким, а любов до Тебе
      — щирою.
- id: humility_repentance_11
  ref: cl:3:12
  title:
    ru: Облечение в милосердие
    en: Clothed in compassion
    es: Vestidos de compasión
    uk: Зодягнення в милосердя
  text:
    ru: Господи, помоги мне облечься в смиренномудрие и кротость. Пусть Твое милосердие
      течет через меня к другим людям. Очисти мое сердце от всякой злобы и наполни
      его добротой.
    en: Lord, help me to clothe myself in humility and meekness. Let Your compassion
      flow through me to others. Cleanse my heart from all malice and fill it with
      kindness.
    es: Señor, ayúdame a vestirme de humildad y mansedumbre. Deja que Tu compasión
      fluya a través de mí hacia otros. Limpia mi corazón de toda malicia y llénalo
      de bondad.
    uk: Господи, допоможи мені зодягнутися в смиренномудрість і лагідність. Нехай
      Твоє милосердя тече через мене до інших людей. Очисти моє серце від злоби і
      наповни добротою.
- id: humility_repentance_12
  ref: ps:138:6
  title:
    ru: Взгляд на смиренных
    en: Looking at the humble
    es: Mirada a los humildes
    uk: Погляд на смиренних
  text:
    ru: Господь, Ты возвышен, но видишь смиренных. Помоги мне никогда не превозноситься.
      Пусть Твой взгляд на меня всегда находит сердце, готовое служить и покаяться
      в неправоте.
    en: Lord, You are exalted, yet You see the humble. Help me never to be haughty.
      May Your gaze always find in me a heart ready to serve and repent of wrong.
    es: Señor, eres exaltado, pero miras a los humildes. Ayúdame a no ser altivo.
      Que Tu mirada halle siempre un corazón dispuesto a servir y arrepentirse de
      lo malo.
    uk: Господи, Ти піднесений, але бачиш смиренних. Допоможи мені ніколи не величатися.
      Нехай Твій погляд завжди знаходить у мені серце, готове служити і каятися у
      помилках.
- id: humility_repentance_13
  ref: 1jo:1:9
  title:
    ru: Обещание прощения
    en: Promise of forgiveness
    es: Promesa de perdón
    uk: Обіцянка прощення
  text:
    ru: Боже, я исповедую свои грехи пред Тобой. Благодарю, что Ты верен и прощаешь
      меня. Очисти мою совесть и помоги мне ходить в свете Твоей истины, смиренно
      принимая благодать.
    en: God, I confess my sins before You. Thank You for being faithful and forgiving
      me. Cleanse my conscience and help me walk in the light of Your truth, humbly
      accepting grace.
    es: Dios, confieso mis pecados ante Ti. Gracias por ser fiel y perdonarme. Limpia
      mi conciencia y ayúdame a caminar en la luz de Tu verdad, aceptando humildemente
      la gracia.
    uk: Боже, я сповідаю свої гріхи перед Тобою. Дякую, що Ти вірний і прощаєш мене.
      Очисти мою совість і допоможи ходити у світлі Твоєї істини, смиренно приймаючи
      благодать.
- id: humility_repentance_14
  ref: mt:5:3
  title:
    ru: Нищие духом
    en: Poor in spirit
    es: Pobres en espíritu
    uk: Убогі духом
  text:
    ru: Господь, я признаю, что нуждаюсь в Тебе. Сделай меня нищим духом, чтобы я
      мог принять Твое Царство. Помоги мне отпустить все земное, что мешает моему
      смирению пред Тобой.
    en: Lord, I acknowledge my need for You. Make me poor in spirit so I may inherit
      Your Kingdom. Help me release everything earthly that hinders my humility before
      You.
    es: Señor, reconozco mi necesidad de Ti. Hazme pobre en espíritu para heredar
      Tu Reino. Ayúdame a soltar todo lo terrenal que impide mi humildad ante Ti.
    uk: Господи, я визнаю, що потребую Тебе. Зроби мене убогим духом, щоб я міг прийняти
      Твоє Царство. Допоможи мені відпустити все земне, що заважає моєму смиренню.
- id: humility_repentance_15
  ref: rm:12:3
  title:
    ru: Трезвая оценка
    en: Sober judgment
    es: Juicio sobrio
    uk: Твереза оцінка
  text:
    ru: Отец, научи меня здраво оценивать себя. Помоги мне не думать о себе более,
      чем должно, но иметь сердце, полное веры и смирения. Пусть мои мысли будут угодны
      Тебе всегда.
    en: Father, teach me to judge myself soberly. Help me not to think of myself more
      highly than I should, but have a heart full of faith and humility. May my thoughts
      please You.
    es: Padre, enséñame a juzgarme con sobriedad. Ayúdame a no pensar de mí más alto
      de lo debido, sino tener un corazón lleno de fe y humildad. Que mis pensamientos
      Te agraden.
    uk: Отче, навчи мене тверезо оцінювати себе. Допоможи мені не думати про себе
      більше, ніж належить, а мати серце, повне віри і смирення. Нехай мої думки будуть
      до вподоби Тобі.
- id: humility_repentance_16
  ref: ec:5:1
  title:
    ru: Благоговение пред Богом
    en: Awe before God
    es: Reverencia ante Dios
    uk: Благоговіння перед Богом
  text:
    ru: Господь, помоги мне быть осторожным в словах пред Тобой. Мое сердце жаждет
      Твоего присутствия. Прими мое покаяние и научи меня ходить перед Тобой в глубоком
      смирении.
    en: Lord, help me to be careful with my words before You. My heart longs for Your
      presence. Accept my repentance and teach me to walk before You in deep humility.
    es: Señor, ayúdame a ser cuidadoso con mis palabras ante Ti. Mi corazón anhela
      Tu presencia. Acepta mi arrepentimiento y enséñame a caminar ante Ti con profunda
      humildad.
    uk: Господи, допоможи мені бути обережним у словах перед Тобою. Моє серце прагне
      Твоєї присутності. Прийми моє покаяння і навчи мене ходити перед Тобою у глибокому
      смиренні.
- id: humility_repentance_17
  ref: ps:34:18
  title:
    ru: Близость к сокрушенным
    en: Near to the broken
    es: Cercano a los quebrantados
    uk: Близькість до сокрушених
  text:
    ru: Боже, благодарю, что Ты близок к сокрушенным сердцем. Когда я прихожу к Тебе
      в покаянии, я чувствую Твою любовь. Укрепи меня и помоги мне жить в смирении
      каждый день.
    en: God, thank You for being near to the brokenhearted. When I come to You in
      repentance, I feel Your love. Strengthen me and help me live in humility every
      day.
    es: Dios, gracias por estar cerca de los quebrantados de corazón. Cuando vengo
      a Ti en arrepentimiento, siento Tu amor. Fortaléceme y ayúdame a vivir en humildad
      cada día.
    uk: Боже, дякую, що Ти близький до сокрушених серцем. Коли я приходжу до Тебе
      в покаянні, я відчуваю Твою любов. Зміцни мене і допоможи жити в смиренні щодня.
- id: humility_repentance_18
  ref: 1pe:5:6
  title:
    ru: Смирение под рукой
    en: Humbling under the hand
    es: Humillación bajo la mano
    uk: Смирення під рукою
  text:
    ru: Господи, я смиряюсь под Твою крепкую руку. Ты знаешь время для всего. Помоги
      мне доверять Твоему плану и ждать Твоего возвышения в любви и терпении, не теряя
      веры.
    en: Lord, I humble myself under Your mighty hand. You know the time for everything.
      Help me trust Your plan and wait for Your exaltation in love and patience, not
      losing faith.
    es: Señor, me humillo bajo Tu mano poderosa. Conoces el tiempo para todo. Ayúdame
      a confiar en Tu plan y esperar Tu exaltación en amor y paciencia, sin perder
      la fe.
    uk: Господи, я смиряюся під Твою міцну руку. Ти знаєш час для всього. Допоможи
      мені довіряти Твоєму плану і чекати Твого піднесення в любові й терпінні, не
      втрачаючи віри.
- id: humility_repentance_19
  ref: ps:143:10
  title:
    ru: Исполнение воли
    en: Doing the will
    es: Haciendo la voluntad
    uk: Виконання волі
  text:
    ru: Боже, Ты — мой Бог. Научи меня исполнять Твою волю, ибо Ты — мой наставник.
      Пусть Твой добрый Дух ведет меня по ровной земле смирения и праведности. Прости
      меня, Господь.
    en: God, You are my God. Teach me to do Your will, for You are my instructor.
      May Your good Spirit lead me on level ground of humility and righteousness.
      Forgive me, Lord.
    es: Dios, eres mi Dios. Enséñame a hacer Tu voluntad, pues eres mi instructor.
      Que Tu buen Espíritu me guíe por tierra de humildad y justicia. Perdóname, Señor.
    uk: Боже, Ти — мій Бог. Навчи мене виконувати Твою волю, бо Ти — мій наставник.
      Нехай Твій добрий Дух веде мене рівним шляхом смирення і праведності. Прости
      мене, Господи.
- id: humility_repentance_20
  ref: is:66:2
  title:
    ru: Трепет пред словом
    en: Trembling at the word
    es: Temblor ante la palabra
    uk: Трепет перед словом
  text:
    ru: Господи, я смиряюсь и трепещу пред Твоим словом. Спасибо, что Ты обращаешь
      взор на таких, как я. Помоги мне всегда сохранять сердце, готовое слышать Тебя
      и меняться.
    en: Lord, I humble myself and tremble at Your word. Thank You for looking upon
      those like me. Help me always keep a heart ready to hear You and change.
    es: Señor, me humillo y tiemblo ante Tu palabra. Gracias por mirar a los como
      yo. Ayúdame a mantener siempre un corazón dispuesto a oírte y cambiar.
    uk: Господи, я смиряюся і трепещу перед Твоїм словом. Дякую, що Ти звертаєш погляд
      на таких, як я. Допоможи мені завжди зберігати серце, готове чути Тебе і змінюватися.
- id: humility_repentance_21
  ref: jm:4:6
  title:
    ru: Бог дает благодать
    en: God gives grace
    es: Dios da gracia
    uk: Бог дає благодать
  text:
    ru: Господь, смиряю свое сердце перед Тобой. Прошу, даруй мне Твою благодать,
      чтобы я мог видеть мир Твоими глазами и следовать за Тобой в кротости и истинной
      любви.
    en: Lord, I humble my heart before You. Please grant me Your grace, so that I
      may see the world through Your eyes and follow You in meekness and true love.
    es: Señor, humillo mi corazón ante ti. Por favor, concédeme tu gracia para ver
      el mundo con tus ojos y seguirte con mansedumbre y amor verdadero.
    uk: Господи, впокорюю своє серце перед Тобою. Прошу, даруй мені Твою благодать,
      щоб я міг бачити світ Твоїми очима і слідувати за Тобою в лагідності й любові.
- id: humility_repentance_22
  ref: lk:18:13
  title:
    ru: Чистое сердце
    en: A pure heart
    es: Un corazón puro
    uk: Чисте серце
  text:
    ru: Боже, сокрушенное сердце — это дар для Тебя. Прости мои ошибки, очисти меня
      от гордости и наполни мою душу искренним желанием жить по Твоим святым заповедям.
    en: God, a broken heart is a gift to You. Forgive my mistakes, cleanse me from
      pride, and fill my soul with a sincere desire to live by Your holy commandments.
    es: Dios, un corazón contrito es un regalo para ti. Perdona mis errores, límpame
      del orgullo y llena mi alma con el deseo sincero de vivir tus mandamientos.
    uk: Боже, сокрушене серце — це дар для Тебе. Прости мої помилки, очисти мене від
      гордині і наповни мою душу щирим бажанням жити за Твоїми святими заповідями.
- id: humility_repentance_23
  ref: mt:11:29
  title:
    ru: Кроткий Учитель
    en: Meek Teacher
    es: Maestro manso
    uk: Лагідний Учитель
  text:
    ru: Господь, научи меня быть кротким и смиренным, как Ты. Помоги мне отпустить
      свою гордыню и найти настоящий покой для своей души в Твоем присутствии каждый
      день.
    en: Lord, teach me to be meek and humble like You. Help me let go of my pride
      and find true rest for my soul in Your presence every single day.
    es: Señor, enséñame a ser manso y humilde como tú. Ayúdame a soltar mi orgullo
      y encontrar un verdadero descanso para mi alma en tu presencia cada día.
    uk: Господи, навчи мене бути лагідним і смиренним, як Ти. Допоможи мені відпустити
      свою гординю і знайти справжній спокій для своєї душі у Твоїй присутності.
- id: humility_repentance_24
  ref: is:66:2
  title:
    ru: Взгляд Господа
    en: The Lord's gaze
    es: La mirada del Señor
    uk: Погляд Господа
  text:
    ru: Отец, я трепещу пред Твоим словом. Помоги мне всегда сохранять смиренный дух,
      чтобы Ты мог смотреть на меня с любовью и направлять мой путь к Своему свету.
    en: Father, I tremble before Your word. Help me always keep a humble spirit so
      that You may look upon me with love and guide my path toward Your light.
    es: Padre, tiemblo ante tu palabra. Ayúdame a mantener siempre un espíritu humilde
      para que me mires con amor y guíes mi camino hacia tu luz.
    uk: Отче, я тремчу перед Твоїм словом. Допоможи мені завжди зберігати смиренний
      дух, щоб Ти міг дивитися на мене з любов’ю і спрямовувати мій шлях до Свого
      світла.
- id: humility_repentance_25
  ref: prv:22:4
  title:
    ru: Смирение и награда
    en: Humility and reward
    es: Humildad y recompensa
    uk: Смирення і нагорода
  text:
    ru: Господь, пусть смирение станет моим спутником. Научи меня ценить страх Божий
      выше почестей этого мира, чтобы в моем сердце всегда пребывала Твоя радость
      и мудрость.
    en: Lord, let humility be my companion. Teach me to value the fear of God above
      worldly honors, so that Your joy and wisdom may always dwell in my heart.
    es: Señor, que la humildad sea mi compañera. Enséñame a valorar el temor de Dios
      sobre los honores del mundo, para que tu gozo y sabiduría habiten en mi corazón.
    uk: Господи, нехай смирення стане моїм супутником. Навчи мене цінувати страх Божий
      вище почестей цього світу, щоб у моєму серці завжди перебувала Твоя радість.
- id: humility_repentance_26
  ref: 1pe:5:5
  title:
    ru: Облекись в смирение
    en: Clothe in humility
    es: Vestirse de humildad
    uk: Зодягнись у смирення
  text:
    ru: Боже, помоги мне облечься в смиренномудрие. Пусть я буду относиться к другим
      с добротой, помня, что Ты противишься гордым, но даешь благодать смиренным сердцем.
    en: God, help me to clothe myself in humility. May I treat others with kindness,
      remembering that You oppose the proud but give grace to the humble-hearted.
    es: Dios, ayúdame a vestirme de humildad. Que trate a los demás con bondad, recordando
      que te opones a los soberbios pero das gracia a los humildes.
    uk: Боже, допоможи мені зодягнутися у смиренномудрість. Нехай я буду ставитися
      до інших з добротою, пам’ятаючи, що Ти противишся гордим, але даєш благодать
      смиренним.
- id: humility_repentance_27
  ref: ph:2:3
  title:
    ru: Выше себя
    en: Better than oneself
    es: Mejor que uno mismo
    uk: Вище за себе
  text:
    ru: Господь, избавь меня от эгоизма. Помоги мне по смирению почитать других выше
      себя, видя в каждом человеке образ Твой и служа Тебе с открытым и чистым сердцем.
    en: Lord, deliver me from selfishness. Help me in humility to value others above
      myself, seeing Your image in everyone and serving You with an open heart.
    es: Señor, líbrame del egoísmo. Ayúdame a estimar a los demás como superiores
      a mí mismo, viendo tu imagen en cada persona y sirviéndote con un corazón abierto.
    uk: Господи, визволи мене від егоїзму. Допоможи мені зі смиренням шанувати інших
      вище за себе, бачачи в кожній людині образ Твій і служачи Тобі з чистим серцем.
- id: humility_repentance_28
  ref: cl:3:12
  title:
    ru: Сердце милосердия
    en: Heart of mercy
    es: Corazón de misericordia
    uk: Серце милосердя
  text:
    ru: Отец, облеки меня в милосердие и кротость. Пусть мое сердце будет смиренным,
      чтобы я мог прощать других так же, как Ты простил меня Своей великой любовью.
    en: Father, clothe me in mercy and meekness. Let my heart be humble, so that I
      may forgive others just as You have forgiven me with Your great love.
    es: Padre, revísteme de misericordia y mansedumbre. Que mi corazón sea humilde
      para perdonar a los demás así como tú me has perdonado con tu gran amor.
    uk: Отче, зодягни мене в милосердя і лагідність. Нехай моє серце буде смиренним,
      щоб я міг прощати інших так, як Ти простив мене Своєю великою любов’ю.
- id: humility_repentance_29
  ref: 2ch:7:14
  title:
    ru: Смирение и исцеление
    en: Humility and healing
    es: Humildad y sanidad
    uk: Смирення і зцілення
  text:
    ru: Господь, я смиряюсь пред Тобой и молюсь. Прости мой народ и мою землю, исцели
      наши сердца, чтобы мы могли вернуться к Тебе и ходить путями Твоей святой правды.
    en: Lord, I humble myself before You and pray. Forgive my people and my land,
      heal our hearts, so we may return to You and walk in Your holy truth.
    es: Señor, me humillo ante ti y oro. Perdona a mi pueblo y a mi tierra, sana nuestros
      corazones para que volvamos a ti y caminemos en tu santa verdad.
    uk: Господи, я смиряюся перед Тобою і молюся. Прости мій народ і мою землю, зціли
      наші серця, щоб ми могли повернутися до Тебе і ходити шляхами Твоєї правди.
- id: humility_repentance_30
  ref: ps:25:9
  title:
    ru: Наставление смиренным
    en: Guidance for the humble
    es: Guía para los humildes
    uk: Наставлення смиренним
  text:
    ru: Боже, веди меня по Твоим путям. Я хочу быть среди тех, кого Ты направляешь
      в суде и учишь Своим путям через смирение и искреннее покаяние пред Тобой, мой
      Царь.
    en: God, lead me in Your ways. I want to be among those whom You guide in justice
      and teach Your paths through humility and sincere repentance before You.
    es: Dios, guíame en tus caminos. Quiero estar entre aquellos a quienes diriges
      en el juicio y enseñas tus sendas mediante la humildad y el arrepentimiento
      sincero.
    uk: Боже, веди мене Своїми шляхами. Я хочу бути серед тих, кого Ти навчаєш Своїм
      шляхам через смирення і щире покаяння перед Тобою, мій Царю.
- id: joy_comfort_01
  ref: ps:16:11
  title:
    ru: Полнота радости
    en: Fullness of Joy
    es: Plenitud de gozo
    uk: Повнота радості
  text:
    ru: Господь, благодарю Тебя за то, что Ты открываешь мне путь жизни. В Твоем присутствии
      я нахожу истинную радость и вечное утешение, которые наполняют мое сердце.
    en: Lord, thank You for showing me the path of life. In Your presence, I find
      true joy and eternal comfort that fill my heart completely. I rest in Your love.
    es: Señor, gracias por mostrarme el camino de la vida. En Tu presencia encuentro
      el gozo verdadero y el consuelo eterno que llenan mi corazón por completo.
    uk: Господи, дякую Тобі за те, що Ти відкриваєш мені шлях життя. У Твоїй присутності
      я знаходжу справжню радість та вічну розраду, що наповнюють моє серце.
- id: joy_comfort_02
  ref: ne:8:10
  title:
    ru: Сила в радости
    en: Strength in Joy
    es: Fuerza en el gozo
    uk: Сила в радості
  text:
    ru: Отец, пусть радость о Тебе станет моей силой сегодня. Когда я слаб, напомни
      мне, что Твоя поддержка — это мое утешение и моя неисчерпаемая крепость в трудный
      час.
    en: Father, let the joy of You be my strength today. When I am weak, remind me
      that Your support is my comfort and my inexhaustible fortress in every difficult
      hour.
    es: Padre, que el gozo en Ti sea mi fuerza hoy. Cuando me sienta débil, recuérdame
      que Tu apoyo es mi consuelo y mi fortaleza inagotable en las horas difíciles.
    uk: Отче, нехай радість про Тебе стане моєю силою сьогодні. Коли я слабкий, нагадай
      мені, що Твоя підтримка — це моя розрада і моя невичерпна міцність у скрутну
      годину.
- id: joy_comfort_03
  ref: ph:4:4
  title:
    ru: Радость в Господе
    en: Joy in the Lord
    es: Gozo en el Señor
    uk: Радість у Господі
  text:
    ru: Господь, помоги мне всегда радоваться в Тебе, независимо от обстоятельств.
      Пусть Твое присутствие будет моим утешением и светом, который разгоняет любую
      печаль вокруг.
    en: Lord, help me always rejoice in You, regardless of circumstances. May Your
      presence be my comfort and the light that disperses any sorrow that surrounds
      me today.
    es: Señor, ayúdame a regocijarme siempre en Ti, sin importar las circunstancias.
      Que Tu presencia sea mi consuelo y la luz que disipa cualquier tristeza a mi
      alrededor.
    uk: Господи, допоможи мені завжди радіти в Тобі, незалежно від обставин. Нехай
      Твоя присутність буде моєю розрадою і світлом, що розганяє будь-який смуток
      навколо.
- id: joy_comfort_04
  ref: ps:30:6
  title:
    ru: Утро радости
    en: Morning Joy
    es: Gozo de la mañana
    uk: Ранок радості
  text:
    ru: Боже, благодарю за надежду, которую Ты даешь. Даже если ночью приходят слезы,
      я верю, что утром Ты принесешь мне радость и нежное утешение Своей вечной любви.
    en: God, thank You for the hope You provide. Even if tears come at night, I believe
      that in the morning You will bring me joy and the tender comfort of Your love.
    es: Dios, gracias por la esperanza que das. Aunque el llanto dure por la noche,
      confío en que por la mañana traerás gozo y el tierno consuelo de Tu amor eterno.
    uk: Боже, дякую за надію, яку Ти даєш. Навіть якщо вночі приходять сльози, я вірю,
      що вранці Ти принесеш мені радість і ніжну розраду Своєї вічної любові.
- id: joy_comfort_05
  ref: is:61:3
  title:
    ru: Елей радости
    en: Oil of Joy
    es: Aceite de gozo
    uk: Олія радості
  text:
    ru: Отец, исцели мое сердце. Вместо печали дай мне елей радости, а вместо уныния
      — одежду хвалы. Пусть Твое утешение обновит мой дух для жизни с Тобой каждый
      день.
    en: Father, heal my heart. Instead of sorrow, give me the oil of joy, and instead
      of despair, a garment of praise. May Your comfort renew my spirit to live for
      You.
    es: Padre, sana mi corazón. En lugar de luto, dame aceite de gozo, y en lugar
      de desánimo, un manto de alabanza. Que Tu consuelo renueve mi espíritu para
      vivir en Ti.
    uk: Отче, зціли моє серце. Замість смутку дай мені олію радості, а замість зневіри
      — одяг хвали. Нехай Твоя розрада оновить мій дух для життя з Тобою щодня.
- id: joy_comfort_06
  ref: ph:4:7
  title:
    ru: Твои утешения
    en: Your Consolations
    es: Tus consolaciones
    uk: Твої розради
  text:
    ru: Господи, когда тревоги множатся в моем сердце, Твои утешения радуют мою душу.
      Благодарю, что Ты всегда рядом, слышишь меня и даруешь мне глубокий внутренний
      мир.
    en: Lord, when anxieties multiply in my heart, Your consolations delight my soul.
      Thank You for being always near, hearing me, and granting me deep inner peace
      today.
    es: Señor, cuando las preocupaciones se multiplican en mi corazón, Tus consolaciones
      deleitan mi alma. Gracias por estar cerca, escucharme y darme paz interior.
    uk: Господи, коли тривоги множаться в моєму серці, Твої розради радують мою душу.
      Дякую, що Ти завжди поруч, чуєш мене і даруєш мені глибокий внутрішній спокій.
- id: joy_comfort_07
  ref: rm:15:13
  title:
    ru: Изобилую надеждой
    en: Abounding in Hope
    es: Rebosar de esperanza
    uk: Сповнений надії
  text:
    ru: Боже, наполни меня всякой радостью и миром в вере. Пусть силой Духа Святого
      я буду изобиловать надеждой, находя в Тебе утешение для каждого моего дня и
      шага.
    en: God, fill me with all joy and peace in believing. By the power of the Holy
      Spirit, may I abound in hope, finding in You comfort for every day and every
      step.
    es: Dios, lléname de todo gozo y paz en el creer. Por el poder del Espíritu Santo,
      que abunde en esperanza, encontrando en Ti consuelo para cada día y paso.
    uk: Боже, наповни мене всякою радістю і миром у вірі. Нехай силою Духа Святого
      я буду переповнюватися надією, знаходячи в Тобі розраду для кожного мого дня
      і кроку.
- id: joy_comfort_08
  ref: 1pe:1:8
  title:
    ru: Радость неизреченная
    en: Inexpressible Joy
    es: Gozo inefable
    uk: Радість невимовна
  text:
    ru: Господь, хотя я не вижу Тебя глазами, я верю и люблю Тебя. Наполни меня радостью
      неизреченной и славной, которая становится моим главным утешением во всем.
    en: Lord, though I do not see You with my eyes, I believe and love You. Fill me
      with inexpressible and glorious joy, which becomes my greatest comfort in all
      things.
    es: Señor, aunque no te veo con mis ojos, creo y te amo. Lléname de un gozo inefable
      y glorioso, que se convierte en mi mayor consuelo en todas las cosas.
    uk: Господи, хоч я не бачу Тебе очима, я вірю і люблю Тебе. Наповни мене радістю
      невимовною і славною, яка стає моєю головною розрадою в усьому.
- id: joy_comfort_09
  ref: rm:15:4
  title:
    ru: Слово утешения
    en: Word of Comfort
    es: Palabra de consuelo
    uk: Слово розради
  text:
    ru: Отец, Твое обещание — мое утешение в страданиях. Твое Слово оживляет меня,
      возвращает мне радость и напоминает, что Ты никогда не оставляешь тех, кто любит
      Тебя.
    en: Father, Your promise is my comfort in suffering. Your Word gives me life,
      restores my joy, and reminds me that You never forsake those who love You, dear
      Lord.
    es: Padre, Tu promesa es mi consuelo en el sufrimiento. Tu Palabra me da vida,
      restaura mi gozo y me recuerda que nunca abandonas a quienes te aman, mi Señor.
    uk: Отче, Твоя обіцянка — моя розрада в стражданнях. Твоє Слово оживляє мене,
      повертає мені радість і нагадує, що Ти ніколи не залишаєш тих, хто любить Тебе.
- id: joy_comfort_10
  ref: mt:5:4
  title:
    ru: Блаженство утешенных
    en: Blessed are the Comforted
    es: Bienaventurados los que lloran
    uk: Блаженство втішених
  text:
    ru: Господи, я прихожу к Тебе в моменты печали. Спасибо за Твое обещание утешить
      меня. Пусть Твой мир и радость станут моим домом, в котором я обретаю покой
      и силы.
    en: Lord, I come to You in moments of sorrow. Thank You for Your promise to comfort
      me. May Your peace and joy become my home, where I find rest and strength.
    es: Señor, vengo a Ti en mis momentos de tristeza. Gracias por Tu promesa de consolarme.
      Que Tu paz y gozo sean mi hogar, donde encuentro descanso y fuerza.
    uk: Господи, я приходжу до Тебе в моменти смутку. Дякую за Твою обіцянку втішити
      мене. Нехай Твій мир і радість стануть моїм домом, в якому я знаходжу спокій
      і сили.
- id: joy_comfort_11
  ref: ps:23:4
  title:
    ru: Ты со мной
    en: You Are With Me
    es: Tú estás conmigo
    uk: Ти зі мною
  text:
    ru: Боже, даже если я иду долиной тени, я не боюсь, ибо Ты со мной. Твой жезл
      и Твой посох — мое утешение, а Твоя любовь — источник моей постоянной радости.
    en: God, even if I walk through the valley of the shadow, I fear no evil, for
      You are with me. Your rod and staff are my comfort, and Your love is my joy.
    es: Dios, aunque camine por el valle de sombra, no temeré mal alguno porque Tú
      estás conmigo. Tu vara y Tu cayado son mi consuelo, y Tu amor mi gozo.
    uk: Боже, навіть якщо я йду долиною тіні, я не боюся, бо Ти зі мною. Твій жезл
      і Твій посох — моя розрада, а Твоя любов — джерело моєї постійної радості.
- id: joy_comfort_12
  ref: 2co:1:3
  title:
    ru: Отец всякого утешения
    en: Father of Comfort
    es: Padre de toda consolación
    uk: Отець усякої розради
  text:
    ru: Отец милосердия и Бог всякого утешения, благодарю Тебя за поддержку. Утешь
      меня в моих нуждах, чтобы я мог нести Твою радость и свет тем, кто сейчас страдает.
    en: Father of mercies and God of all comfort, thank You for Your support. Comfort
      me in my needs so that I can carry Your joy and light to those who suffer now.
    es: Padre de misericordias y Dios de toda consolación, gracias por Tu apoyo. Consuélame
      en mis necesidades para que pueda llevar Tu gozo a quienes sufren hoy.
    uk: Отче милосердя і Бог усякої розради, дякую Тобі за підтримку. Втіш мене в
      моїх потребах, щоб я міг нести Твою радість і світло тим, хто зараз страждає.
- id: joy_comfort_13
  ref: ps:34:19
  title:
    ru: Близость Господа
    en: Nearness of the Lord
    es: Cercanía del Señor
    uk: Близькість Господа
  text:
    ru: Господи, Ты близок к сокрушенным сердцем. Благодарю, что Ты спасаешь тех,
      чей дух уныл. Твое присутствие — мое самое глубокое утешение и источник чистой
      радости.
    en: Lord, You are near to those with a broken heart. Thank You for saving those
      whose spirit is crushed. Your presence is my deepest comfort and source of joy.
    es: Señor, estás cerca de los quebrantados de corazón. Gracias por salvar a los
      de espíritu abatido. Tu presencia es mi consuelo más profundo y mi fuente de
      gozo.
    uk: Господи, Ти близький до зламаних серцем. Дякую, що Ти рятуєш тих, чий дух
      пригнічений. Твоя присутність — моя найглибша розрада і джерело чистої радості.
- id: joy_comfort_14
  ref: ph:4:7
  title:
    ru: Мир превыше ума
    en: Peace Beyond Understanding
    es: Paz que sobrepasa
    uk: Мир понад розум
  text:
    ru: Боже, пусть Твой мир, превыше всякого ума, соблюдет мое сердце и мысли в Христе
      Иисусе. Это мой покой, мое утешение и основа моей неиссякаемой радости.
    en: God, may Your peace, which surpasses all understanding, guard my heart and
      mind in Christ Jesus. This is my rest, my comfort, and the basis of my endless
      joy.
    es: Dios, que Tu paz, que sobrepasa todo entendimiento, guarde mi corazón y mis
      pensamientos en Cristo. Este es mi descanso, mi consuelo y base de mi gozo.
    uk: Боже, нехай Твій мир, що вищий за всякий розум, береже моє серце і думки в
      Христі Ісусі. Це мій спокій, моя розрада і основа моєї невичерпної радості.
- id: joy_comfort_15
  ref: 2ts:2:16
  title:
    ru: Вечное утешение
    en: Eternal Comfort
    es: Consuelo eterno
    uk: Вічна розрада
  text:
    ru: Господь Иисус, благодарю за Твою любовь и вечное утешение, дарованное по благодати.
      Наполни мою жизнь радостью, чтобы я мог твердо стоять в добре каждый день.
    en: Lord Jesus, thank You for Your love and eternal comfort given by grace. Fill
      my life with joy so that I may stand firm in goodness each and every day.
    es: Señor Jesús, gracias por Tu amor y consuelo eterno dado por gracia. Llena
      mi vida de gozo para que pueda permanecer firme en el bien cada día de mi vida.
    uk: Господи Ісусе, дякую за Твою любов і вічну розраду, даровану по благодаті.
      Наповни моє життя радістю, щоб я міг твердо стояти в добрі кожного дня.
- id: joy_comfort_16
  ref: ps:126:5
  title:
    ru: Радостная жатва
    en: Joyful Harvest
    es: Cosecha alegre
    uk: Радісні жнива
  text:
    ru: Отец, верю, что слезы сменяются радостью. Даже если я сею со слезами, Ты даешь
      мне пожинать с песнью радости. Благодарю Тебя за Твою верность и утешение.
    en: Father, I believe that tears turn into joy. Even if I sow in tears, You allow
      me to reap with songs of joy. Thank You for Your faithfulness and comfort.
    es: Padre, creo que las lágrimas se convierten en gozo. Aunque siembre con lágrimas,
      Tú me permites cosechar con cánticos de alegría. Gracias por Tu fidelidad.
    uk: Отче, вірю, що сльози змінюються радістю. Навіть якщо я сію зі сльозами, Ти
      даєш мені пожинати з піснею радості. Дякую Тобі за Твою вірність і розраду.
- id: joy_comfort_17
  ref: ps:28:7
  title:
    ru: Господь — моя сила
    en: The Lord is My Strength
    es: El Señor es mi fuerza
    uk: Господь — моя сила
  text:
    ru: Господь, Ты — моя крепость и щит. Мое сердце уповает на Тебя, и я получил
      помощь. Мое сердце ликует, и я славлю Тебя радостной песней за Твое утешение.
    en: Lord, You are my strength and shield. My heart trusts in You, and I am helped.
      My heart exults, and I praise You with a joyful song for Your comfort.
    es: Señor, Tú eres mi fortaleza y mi escudo. Mi corazón confía en Ti y he sido
      socorrido. Mi corazón se regocija y te alabo con cántico por Tu consuelo.
    uk: Господи, Ти — моя міцність і щит. Моє серце уповає на Тебе, і я отримав допомогу.
      Моє серце радіє, і я славлю Тебе радісною піснею за Твою розраду.
- id: joy_comfort_18
  ref: ps:32:7
  title:
    ru: Покров радости
    en: Shelter of Joy
    es: Refugio de gozo
    uk: Покров радості
  text:
    ru: Боже, Ты — мое убежище. Ты хранишь меня от скорби и окружаешь меня радостными
      песнями избавления. Благодарю, что Ты всегда даруешь мне Свой мир и покой.
    en: God, You are my refuge. You protect me from distress and surround me with
      joyful songs of deliverance. Thank You for always granting me Your peace and
      rest.
    es: Dios, Tú eres mi refugio. Me proteges de la angustia y me rodeas con cánticos
      de liberación. Gracias por darme siempre Tu paz y Tu descanso, mi Señor.
    uk: Боже, Ти — моє сховище. Ти бережеш мене від скорботи і оточуєш мене радісними
      піснями визволення. Дякую, що Ти завжди даруєш мені Свій мир і спокій.
- id: joy_comfort_19
  ref: ps:5:12
  title:
    ru: Твое благословение
    en: Your Blessing
    es: Tu bendición
    uk: Твоє благословення
  text:
    ru: Господи, все уповающие на Тебя радуются. Ты окружаешь их милостью, как щитом.
      Пусть эта радость и Твое утешение наполняют мою жизнь каждый день моей жизни.
    en: Lord, all who take refuge in You rejoice. You surround them with favor as
      with a shield. May this joy and Your comfort fill my life every single day.
    es: Señor, todos los que en Ti confían se alegran. Tú los rodeas con Tu favor
      como con un escudo. Que este gozo y Tu consuelo llenen mi vida cada día.
    uk: Господи, всі, хто уповає на Тебе, радіють. Ти оточуєш їх милістю, як щитом.
      Нехай ця радість і Твоя розрада наповнюють моє життя кожного дня.
- id: joy_comfort_20
  ref: ps:118:24
  title:
    ru: День радости
    en: Day of Joy
    es: Día de gozo
    uk: День радості
  text:
    ru: Господь, сей день сотворил Ты. Я буду радоваться и веселиться в нем. Благодарю
      за Твое утешение, которое обновляет меня и дает силы идти вперед с Тобой.
    en: Lord, this is the day You have made. I will rejoice and be glad in it. Thank
      You for Your comfort, which renews me and gives me strength to walk with You.
    es: Señor, este es el día que Tú has hecho. Me gozaré y me alegraré en él. Gracias
      por Tu consuelo, que me renueva y me da fuerzas para caminar contigo.
    uk: Господи, цей день створив Ти. Я буду радіти і веселитися в ньому. Дякую за
      Твою розраду, яка обновляє мене і дає сили йти вперед із Тобою.
- id: joy_comfort_21
  ref: ps:16:11
  title:
    ru: Радость в присутствии
    en: Joy in Your Presence
    es: Gozo en tu presencia
    uk: Радість у присутності
  text:
    ru: Господь, благодарю за Твое присутствие. Ты наполняешь меня радостью и вечным
      блаженством. Помоги мне всегда пребывать в Твоем свете и доверять Тебе во всем.
    en: Lord, thank You for Your presence. You fill me with joy and eternal delight.
      Help me to always abide in Your light and trust You in everything I do today.
    es: Señor, gracias por Tu presencia. Me llenas de gozo y deleite eterno. Ayúdame
      a permanecer siempre en Tu luz y a confiar en Ti con todo mi corazón hoy.
    uk: Господи, дякую за Твою присутність. Ти наповнюєш мене радістю та вічним блаженством.
      Допоможи мені завжди перебувати у Твоєму світлі та довіряти Тобі у всьому.
- id: joy_comfort_22
  ref: ne:8:10
  title:
    ru: Радость Господа — сила
    en: The Joy of the Lord
    es: El gozo del Señor
    uk: Радість Господня — сила
  text:
    ru: Отец, когда я слаб, напомни мне, что радость о Тебе — моя сила. Пусть Твой
      мир утешает мое сердце и дает мне мужество идти вперед, несмотря на любые трудности.
    en: Father, when I am weak, remind me that the joy of the Lord is my strength.
      May Your peace comfort my heart and give me courage to move forward despite
      challenges.
    es: Padre, cuando me sienta débil, recuérdame que el gozo del Señor es mi fortaleza.
      Que Tu paz consuele mi corazón y me dé valor para seguir adelante hoy.
    uk: Отче, коли я слабкий, нагадай мені, що радість у Тобі — моя сила. Нехай Твій
      мир втішає моє серце і дає мені мужність іти вперед, попри будь-які труднощі.
- id: joy_comfort_23
  ref: rm:15:13
  title:
    ru: Надежда и мир
    en: Hope and Peace
    es: Esperanza y paz
    uk: Надія та мир
  text:
    ru: Боже надежды, наполни меня всякой радостью и миром в вере. Пусть Твоя сила
      Духа Святого избыточествует во мне, чтобы я мог делиться Твоим утешением с окружающими.
    en: God of hope, fill me with all joy and peace in believing. May the power of
      the Holy Spirit overflow in me, so I can share Your comfort with those around
      me.
    es: Dios de esperanza, lléname de todo gozo y paz al creer. Que el poder del Espíritu
      Santo rebose en mí, para poder compartir Tu consuelo con los demás hoy.
    uk: Боже надії, наповни мене всякою радістю та миром у вірі. Нехай сила Твого
      Духа Святого надмірно перебуває в мені, щоб я міг ділитися Твоїм утішенням з
      іншими.
- id: joy_comfort_24
  ref: ps:30:6
  title:
    ru: Радость приходит утром
    en: Joy Comes in the Morning
    es: El gozo llega de mañana
    uk: Радість приходить уранці
  text:
    ru: Господь, даже если ночью приходят печали, я верю, что утром наступает радость.
      Благодарю за Твою верность, которая обновляется для меня каждый новый день.
    en: Lord, even if sorrow comes at night, I believe that joy comes in the morning.
      Thank You for Your faithfulness, which is renewed for me every single day.
    es: Señor, aunque el llanto pase por la noche, creo que el gozo viene por la mañana.
      Gracias por Tu fidelidad, que se renueva para mí cada nuevo día.
    uk: Господи, навіть якщо вночі приходить смуток, я вірю, що вранці настає радість.
      Дякую за Твою вірність, яка оновлюється для мене кожного нового дня.
- id: joy_comfort_25
  ref: ph:4:4
  title:
    ru: Радуйтесь всегда
    en: Rejoice Always
    es: Alégrense siempre
    uk: Радійте завжди
  text:
    ru: Отец, научи меня радоваться в Тебе при любых обстоятельствах. Пусть моя жизнь
      станет свидетельством Твоего утешения, которое выше всякого человеческого понимания.
    en: Father, teach me to rejoice in You under any circumstances. May my life be
      a testimony of Your comfort, which surpasses all human understanding.
    es: Padre, enséñame a regocijarme en Ti bajo cualquier circunstancia. Que mi vida
      sea un testimonio de Tu consuelo, que sobrepasa todo entendimiento humano.
    uk: Отче, навчи мене радіти в Тобі за будь-яких обставин. Нехай моє життя стане
      свідченням Твого втішення, яке вище за всяке людське розуміння.
- id: joy_comfort_26
  ref: jo:16:22
  title:
    ru: Никто не отнимет
    en: None Can Take
    es: Nadie quitará
    uk: Ніхто не відбере
  text:
    ru: Иисус, спасибо за Твою любовь. Ты обещал радость, которую никто не сможет
      отнять. Укрепи мою веру, чтобы я всегда чувствовал Твое утешение в своем сердце.
    en: Jesus, thank You for Your love. You promised a joy that no one can take away.
      Strengthen my faith, so I can always feel Your comfort in my heart.
    es: Jesús, gracias por Tu amor. Prometiste un gozo que nadie podrá quitarme. Fortalece
      mi fe para que siempre pueda sentir Tu consuelo en mi corazón.
    uk: Ісусе, дякую за Твою любов. Ти обіцяв радість, яку ніхто не зможе відібрати.
      Зміцни мою віру, щоб я завжди відчував Твоє втішення у своєму серці.
- id: joy_comfort_27
  ref: ph:4:7
  title:
    ru: Утешение в тревоге
    en: Comfort in Anxiety
    es: Consuelo en la angustia
    uk: Втішення у тривозі
  text:
    ru: Боже, когда во мне умножаются тревожные мысли, Твои утешения услаждают мою
      душу. Помоги мне слышать Твой тихий голос и обретать покой в Твоих объятиях.
    en: God, when anxious thoughts multiply within me, Your comforts delight my soul.
      Help me to hear Your still voice and find rest in Your loving arms.
    es: Dios, cuando los pensamientos ansiosos se multiplican en mí, Tus consuelos
      deleitan mi alma. Ayúdame a escuchar Tu voz y a hallar descanso en Tus brazos.
    uk: Боже, коли в мені множаться тривожні думки, Твої втішення звеселяють мою душу.
      Допоможи мені чути Твій тихий голос і знаходити спокій у Твоїх обіймах.
- id: joy_comfort_28
  ref: is:61:3
  title:
    ru: Вместо пепла — красота
    en: Beauty for Ashes
    es: Belleza en vez de ceniza
    uk: Окраса замість попелу
  text:
    ru: Господь, исцели мое сердце. Вместо пепла дай мне украшение, вместо плача —
      елей радости. Пусть Твой Дух наполнит меня надеждой на этот день.
    en: Lord, heal my heart. Instead of ashes, give me beauty; instead of mourning,
      the oil of joy. May Your Spirit fill me with hope for this day.
    es: Señor, sana mi corazón. En lugar de cenizas, dame hermosura; en lugar de luto,
      aceite de gozo. Que Tu Espíritu me llene de esperanza hoy.
    uk: Господи, зціли моє серце. Замість попелу дай мені прикрасу, замість плачу
      — олію радості. Нехай Твій Дух наповнить мене надією на цей день.
- id: joy_comfort_29
  ref: 2co:1:3
  title:
    ru: Бог всякого утешения
    en: God of All Comfort
    es: Dios de toda consolación
    uk: Бог усякої потіхи
  text:
    ru: Отец милосердия и Бог всякого утешения, благодарю, что Ты рядом в моих скорбях.
      Помоги мне доверять Тебе и нести Твой свет тем, кто сейчас нуждается в поддержке.
    en: Father of mercies and God of all comfort, thank You for being near in my troubles.
      Help me to trust You and bring Your light to those who need support.
    es: Padre de misericordias y Dios de todo consuelo, gracias por estar cerca en
      mis aflicciones. Ayúdame a confiar en Ti y a llevar Tu luz a quienes necesitan
      apoyo.
    uk: Отче милосердя і Боже всякого втішення, дякую, що Ти поруч у моїх скорботах.
      Допоможи мені довіряти Тобі та нести Твоє світло тим, хто зараз потребує підтримки.
- id: joy_comfort_30
  ref: rm:15:4
  title:
    ru: Свет обещаний
    en: Light of His Promises
    es: Luz de sus promesas
    uk: Світло обітниць
  text:
    ru: Господь, Твое Слово — мое главное утешение в жизни. Оно оживляет меня, когда
      я падаю духом. Пусть Твои обещания всегда будут светом на моем пути.
    en: Lord, Your Word is my greatest comfort in life. It gives me life when I feel
      discouraged. May Your promises always be a light on my path.
    es: Señor, Tu Palabra es mi mayor consuelo en la vida. Me vivifica cuando me siento
      desanimado. Que Tus promesas sean siempre luz en mi camino.
    uk: Господи, Твоє Слово — моє головне втішення в житті. Воно оживляє мене, коли
      я занепадаю духом. Нехай Твої обіцянки завжди будуть світлом на моєму шляху.
- id: service_witness_01
  ref: mt:28:19
  title:
    ru: Идти во все народы
    en: Go to all nations
    es: Id a todas las naciones
    uk: Йти до всіх народів
  text:
    ru: Господь, помоги мне нести Твой свет каждому человеку. Пусть моя жизнь станет
      свидетельством Твоей любви для всех народов. Направляй мои шаги в служении сегодня.
    en: Lord, help me carry Your light to everyone. May my life be a testimony of
      Your love to all nations. Guide my steps in service today.
    es: Señor, ayúdame a llevar Tu luz a todos. Que mi vida sea un testimonio de Tu
      amor a las naciones. Guía mis pasos en el servicio hoy.
    uk: Господи, допоможи мені нести Твоє світло кожній людині. Нехай моє життя стане
      свідченням Твоєї любові для всіх народів. Спрямовуй мої кроки у служінні.
- id: service_witness_02
  ref: act:1:8
  title:
    ru: Сила для свидетельства
    en: Power for witness
    es: Poder para testificar
    uk: Сила для свідчення
  text:
    ru: Боже, дай мне силу Духа Твоего, чтобы смело говорить о Тебе. Пусть мое свидетельство
      будет искренним и вдохновленным Тобой в каждом моем деле и слове.
    en: God, give me the power of Your Spirit to speak boldly about You. May my witness
      be sincere and inspired by You in every deed and word.
    es: Dios, dame el poder de Tu Espíritu para hablar de Ti con valor. Que mi testimonio
      sea sincero e inspirado por Ti en cada acción y palabra.
    uk: Боже, дай мені силу Твого Духа, щоб сміливо говорити про Тебе. Нехай моє свідчення
      буде щирим і натхненним Тобою в кожній моїй справі та слові.
- id: service_witness_03
  ref: mt:5:16
  title:
    ru: Свети миру
    en: Shine for the world
    es: Brilla ante el mundo
    uk: Світи світові
  text:
    ru: Господи, пусть мои добрые дела прославляют Тебя. Помоги мне быть светом в
      этом мире, чтобы люди видели Твою любовь через мою жизнь и приходили к Тебе.
    en: Lord, may my good deeds glorify You. Help me be a light in this world so people
      see Your love through my life and come to You.
    es: Señor, que mis buenas obras Te glorifiquen. Ayúdame a ser luz en este mundo,
      para que otros vean Tu amor a través de mí y se acerquen a Ti.
    uk: Господи, нехай мої добрі справи прославляють Тебе. Допоможи мені бути світлом
      у цьому світі, щоб люди бачили Твою любов через моє життя і приходили до Тебе.
- id: service_witness_04
  ref: 1pe:3:15
  title:
    ru: Готовность отвечать
    en: Ready to answer
    es: Listos para responder
    uk: Готовність відповідати
  text:
    ru: Отец, дай мне мудрости и кротости, когда меня спрашивают о надежде, которая
      во мне. Пусть мой ответ всегда будет наполнен Твоей благодатью и любовью.
    en: Father, give me wisdom and gentleness when asked about the hope within me.
      May my answer always be filled with Your grace and love.
    es: Padre, dame sabiduría y mansedumbre al hablar de la esperanza que hay en mí.
      Que mi respuesta esté siempre llena de Tu gracia y amor.
    uk: Отче, дай мені мудрості та лагідності, коли мене запитують про надію, яка
      в мені. Нехай моя відповідь завжди буде сповнена Твоєї благодаті та любові.
- id: service_witness_05
  ref: cl:3:23
  title:
    ru: Служение от сердца
    en: Service from heart
    es: Servicio de corazón
    uk: Служіння від серця
  text:
    ru: Господь, помоги мне делать любую работу от души, как для Тебя, а не для людей.
      Пусть мое служение будет искренним приношением, радующим Твое сердце.
    en: Lord, help me do every task wholeheartedly as for You, not for men. May my
      service be a sincere offering that pleases Your heart.
    es: Señor, ayúdame a hacer todo de corazón, como para Ti y no para los hombres.
      Que mi servicio sea una ofrenda sincera que alegre Tu corazón.
    uk: Господи, допоможи мені робити будь-яку роботу від душі, як для Тебе, а не
      для людей. Нехай моє служіння буде щирим приношенням, що радує Твоє серце.
- id: service_witness_06
  ref: is:6:8
  title:
    ru: Вот я, пошли
    en: Here I am, send
    es: Heme aquí, envíame
    uk: Ось я, пошли
  text:
    ru: Боже, я слышу Твой призыв. Помоги мне быть готовым идти туда, куда Ты укажешь.
      Пусть мое сердце будет послушным Твоей воле в каждом дне моей жизни.
    en: God, I hear Your call. Help me be ready to go where You lead. May my heart
      be obedient to Your will in every day of my life.
    es: Dios, escucho Tu llamado. Ayúdame a estar listo para ir a donde me guíes.
      Que mi corazón sea obediente a Tu voluntad en cada día de mi vida.
    uk: Боже, я чую Твій заклик. Допоможи мені бути готовим іти туди, куди Ти вкажеш.
      Нехай моє серце буде слухняним Твоїй волі в кожному дні мого життя.
- id: service_witness_07
  ref: ph:2:15
  title:
    ru: Сиять как светило
    en: Shine like stars
    es: Brillar como estrellas
    uk: Сяяти як світила
  text:
    ru: Господи, помоги мне быть безупречным в этом мире. Пусть мое поведение и слова
      сияют, как звезды, указывая окружающим путь к Твоей истине и покою.
    en: Lord, help me be blameless in this world. May my conduct and words shine like
      stars, pointing others to Your truth and peace.
    es: Señor, ayúdame a ser irreprensible. Que mi conducta y palabras brillen como
      estrellas, guiando a otros hacia Tu verdad y paz.
    uk: Господи, допоможи мені бути бездоганним у цьому світі. Нехай моя поведінка
      і слова сяють, як зорі, вказуючи оточуючим шлях до Твоєї істини та спокою.
- id: service_witness_08
  ref: 2co:5:20
  title:
    ru: Послы Христа
    en: Ambassadors of Christ
    es: Embajadores de Cristo
    uk: Посли Христа
  text:
    ru: Отец, благодарю за честь быть Твоим послом. Помоги мне просить людей примириться
      с Тобой через любовь и прощение, которые я получил от Тебя.
    en: Father, thank you for the honor of being Your ambassador. Help me plead with
      others to be reconciled to You through Your love and forgiveness.
    es: Padre, gracias por el honor de ser Tu embajador. Ayúdame a invitar a otros
      a reconciliarse contigo a través de Tu amor y perdón.
    uk: Отче, дякую за честь бути Твоїм послом. Допоможи мені закликати людей примиритися
      з Тобою через любов і прощення, які я отримав від Тебе.
- id: service_witness_09
  ref: mt:9:37
  title:
    ru: Жатвы много
    en: The harvest is plentiful
    es: La mies es mucha
    uk: Жнива великі
  text:
    ru: Господь, я вижу нужду вокруг. Пошли работников на Твою жатву, и пусть я буду
      одним из них, с готовностью делясь Твоей благой вестью с нуждающимися.
    en: Lord, I see the need around me. Send workers into Your harvest, and may I
      be one of them, readily sharing Your good news with the needy.
    es: Señor, veo la necesidad a mi alrededor. Envía obreros a Tu mies, y que yo
      sea uno de ellos, compartiendo Tus buenas nuevas con los necesitados.
    uk: Господи, я бачу потребу навколо. Пошли працівників на Твої жнива, і нехай
      я буду одним із них, з готовністю ділячись Твоєю доброю новиною з тими, хто
      потребує.
- id: service_witness_10
  ref: jm:1:22
  title:
    ru: Исполнители слова
    en: Doers of the word
    es: Hacedores de la palabra
    uk: Виконавці слова
  text:
    ru: Боже, не дай мне лишь слушать Твое Слово, но помоги исполнять его в жизни.
      Пусть мои поступки доказывают мою веру и служат людям каждый день.
    en: God, do not let me just hear Your Word, but help me live it out. May my actions
      prove my faith and serve others every day.
    es: Dios, no permitas que solo escuche Tu Palabra, ayúdame a ponerla en práctica.
      Que mis acciones demuestren mi fe y sirvan a los demás cada día.
    uk: Боже, не дай мені лише слухати Твоє Слово, а допоможи виконувати його в житті.
      Нехай мої вчинки доводять мою віру і служать людям щодня.
- id: service_witness_11
  ref: rm:1:16
  title:
    ru: Не стыжусь Евангелия
    en: Not ashamed of Gospel
    es: No me avergüenzo
    uk: Не соромлюся Євангелія
  text:
    ru: Господь, дай мне смелости всегда открыто говорить о Твоем Евангелии. Это сила
      Твоя ко спасению, и я горжусь тем, что могу делиться ею с миром.
    en: Lord, give me boldness to speak openly about Your Gospel. It is Your power
      for salvation, and I am proud to share it with the world.
    es: Señor, dame valentía para hablar siempre de Tu Evangelio. Es Tu poder para
      salvación, y me honra compartirlo con el mundo.
    uk: Господи, дай мені сміливості завжди відкрито говорити про Твоє Євангеліє.
      Це Твоя сила до спасіння, і я пишаюся тим, що можу ділитися нею зі світом.
- id: service_witness_12
  ref: 1co:9:22
  title:
    ru: Для всех стану всем
    en: Become all things
    es: Hacerme todo a todos
    uk: Для всіх стану всім
  text:
    ru: Отец, научи меня быть чутким к нуждам людей. Помоги мне находить подход к
      каждому, чтобы любой ценой приводить их к Тебе и Твоему спасению.
    en: Father, teach me to be sensitive to people's needs. Help me relate to everyone
      so that, by all means, I may lead them to You and salvation.
    es: Padre, enséñame a ser sensible a las necesidades de los demás. Ayúdame a acercarme
      a todos para, de cualquier modo, llevarlos a Tu salvación.
    uk: Отче, навчи мене бути чуйним до потреб людей. Допоможи мені знаходити підхід
      до кожного, щоб будь-якою ціною приводити їх до Тебе та Твого спасіння.
- id: service_witness_13
  ref: gl:6:9
  title:
    ru: Не унывать в добре
    en: Do not grow weary
    es: No desmayar en el bien
    uk: Не втомлюватися в добрі
  text:
    ru: Боже, когда я устаю, дай мне сил продолжать делать добро. Верю, что в свое
      время я пожну плоды, если не ослабею в служении Тебе и ближним.
    en: God, when I grow weary, give me strength to keep doing good. I trust that
      in due time I will reap a harvest if I do not give up serving You.
    es: Dios, cuando me canse, dame fuerzas para seguir haciendo el bien. Confío en
      que, a su tiempo, cosecharé si no me rindo en servirte.
    uk: Боже, коли я втомлююся, дай мені сил продовжувати робити добро. Вірю, що свого
      часу я пожну плоди, якщо не ослабну в служінні Тобі та ближнім.
- id: service_witness_14
  ref: 1ts:2:4
  title:
    ru: Служить Богу, не людям
    en: Please God, not men
    es: Agradar a Dios
    uk: Служити Богу, не людям
  text:
    ru: Господи, пусть мое единственное желание будет угождать Тебе, а не искать одобрения
      людей. Испытай мое сердце и направь меня в правильном служении.
    en: Lord, let my only desire be to please You, not to seek human approval. Test
      my heart and guide me in the right path of service.
    es: Señor, que mi único deseo sea agradarte a Ti, no buscar la aprobación humana.
      Examina mi corazón y guíame en el servicio correcto.
    uk: Господи, нехай моїм єдиним бажанням буде догоджати Тобі, а не шукати схвалення
      людей. Випробуй моє серце і спрямуй мене у правильному служінні.
- id: service_witness_15
  ref: 2tm:4:5
  title:
    ru: Трезвенность в служении
    en: Be sober in service
    es: Sé sobrio en el servicio
    uk: Тверезість у служінні
  text:
    ru: Отец, помоги мне быть трезвым и стойким во всем. Позволь мне верно исполнять
      свое служение, неся весть о Тебе в любых обстоятельствах жизни.
    en: Father, help me be sober and steadfast in all things. Let me faithfully fulfill
      my ministry, sharing the message of You in all circumstances.
    es: Padre, ayúdame a ser sobrio y constante en todo. Permíteme cumplir fielmente
      mi ministerio, llevando Tu mensaje en toda circunstancia.
    uk: Отче, допоможи мені бути тверезим і стійким у всьому. Дозволь мені вірно виконувати
      своє служіння, несучи звістку про Тебе в будь-яких обставинах життя.
- id: service_witness_16
  ref: mt:20:28
  title:
    ru: Служить, как Христос
    en: Serve like Christ
    es: Servir como Cristo
    uk: Служити, як Христос
  text:
    ru: Господь, Ты пришел не чтобы Тебе служили, а чтобы послужить. Научи меня этой
      жертвенной любви, чтобы я мог отдавать свою жизнь ради других.
    en: Lord, You did not come to be served, but to serve. Teach me this sacrificial
      love, so that I may give my life for the sake of others.
    es: Señor, no viniste para ser servido, sino para servir. Enséñame este amor sacrificial,
      para que pueda entregar mi vida por los demás.
    uk: Господи, Ти прийшов не для того, щоб Тобі служили, а щоб послужити. Навчи
      мене цій жертовній любові, щоб я міг віддавати своє життя заради інших.
- id: service_witness_17
  ref: 1co:15:58
  title:
    ru: Труд не тщетен
    en: Labor is not in vain
    es: El trabajo no es vano
    uk: Праця не марна
  text:
    ru: Боже, благодарю, что мой труд в Тебе никогда не бывает напрасным. Укрепи меня
      быть всегда преуспевающим в деле Твоем, зная, что Ты со мной.
    en: God, thank you that my labor in You is never in vain. Strengthen me to always
      abound in Your work, knowing that You are with me.
    es: Dios, gracias porque mi trabajo en Ti nunca es en vano. Fortaléceme para abundar
      siempre en Tu obra, sabiendo que estás conmigo.
    uk: Боже, дякую, що моя праця в Тобі ніколи не буває марною. Зміцни мене бути
      завжди успішним у Твоїй справі, знаючи, що Ти зі мною.
- id: service_witness_18
  ref: eph:2:10
  title:
    ru: Творение для дел
    en: Created for works
    es: Creados para buenas obras
    uk: Створіння для справ
  text:
    ru: Господь, я — Твое творение, созданное для добрых дел, которые Ты предназначил
      мне. Открой мои глаза, чтобы я видел эти возможности каждый день.
    en: Lord, I am Your creation, made for good works that You prepared for me. Open
      my eyes to see these opportunities every single day.
    es: Señor, soy Tu creación, hecho para las buenas obras que preparaste para mí.
      Abre mis ojos para ver esas oportunidades cada día.
    uk: Господи, я — Твоє створіння, створене для добрих справ, які Ти призначив мені.
      Відкрий мої очі, щоб я бачив ці можливості кожного дня.
- id: service_witness_19
  ref: hb:13:16
  title:
    ru: Благотворение и общение
    en: Do good and share
    es: Hacer el bien y compartir
    uk: Доброчинність і спілкування
  text:
    ru: Отец, помоги мне не забывать делать добро и делиться с другими. Пусть мои
      дела будут жертвой, которая Тебе приятна, и светом для окружающих.
    en: Father, help me not forget to do good and share with others. May my actions
      be a sacrifice that pleases You and a light to those around me.
    es: Padre, ayúdame a no olvidar hacer el bien y compartir. Que mis acciones sean
      un sacrificio que Te agrada y luz para los demás.
    uk: Отче, допоможи мені не забувати робити добро і ділитися з іншими. Нехай мої
      справи будуть жертвою, яка Тобі приємна, і світлом для оточуючих.
- id: service_witness_20
  ref: jo:15:16
  title:
    ru: Плодотворный путь
    en: Fruitful journey
    es: Un camino fructífero
    uk: Плідний шлях
  text:
    ru: Господь, Ты избрал меня приносить плод. Помоги мне пребывать в Тебе, чтобы
      мой труд приносил вечную пользу и прославлял Твое святое имя.
    en: Lord, You chose me to bear fruit. Help me abide in You so that my labor may
      bring eternal value and glorify Your holy name.
    es: Señor, me elegiste para llevar fruto. Ayúdame a permanecer en Ti para que
      mi trabajo dé valor eterno y glorifique Tu santo nombre.
    uk: Господи, Ти обрав мене приносити плід. Допоможи мені перебувати в Тобі, щоб
      моя праця приносила вічну користь і прославляла Твоє святе ім'я.
- id: service_witness_21
  ref: mt:5:16
  title:
    ru: Свет для мира
    en: Light for the world
    es: Luz para el mundo
    uk: Світло для світу
  text:
    ru: Господь, помоги мне сегодня светить Твоей любовью. Пусть мои дела прославляют
      Тебя, чтобы люди видели Твой свет во мне и тянулись к Твоему великому спасению.
    en: Lord, help me shine with Your love today. May my actions glorify You, so that
      people see Your light in me and are drawn toward Your great salvation.
    es: Señor, ayúdame a brillar con tu amor hoy. Que mis acciones te glorifiquen,
      para que la gente vea tu luz en mí y se acerque a tu gran salvación.
    uk: Господи, допоможи мені сьогодні світити Твоєю любов'ю. Нехай мої справи прославляють
      Тебе, щоб люди бачили Твоє світло в мені і тягнулися до Твого спасіння.
- id: service_witness_22
  ref: act:1:8
  title:
    ru: Сила свидетельства
    en: Power of witness
    es: Poder del testimonio
    uk: Сила свідчення
  text:
    ru: Боже, дай мне смелости быть Твоим свидетелем. Наполни меня силой Святого Духа,
      чтобы я мог делиться благой вестью с любовью и уверенностью везде, где я нахожусь.
    en: God, give me courage to be Your witness. Fill me with the power of the Holy
      Spirit so I can share the good news with love and confidence wherever I am.
    es: Dios, dame valor para ser tu testigo. Lléname con el poder del Espíritu Santo
      para que pueda compartir las buenas nuevas con amor y confianza dondequiera
      que esté.
    uk: Боже, дай мені сміливості бути Твоїм свідком. Наповни мене силою Святого Духа,
      щоб я міг ділитися доброю новиною з любов'ю та впевненістю скрізь, де я є.
- id: service_witness_23
  ref: eph:2:10
  title:
    ru: Твое призвание
    en: Your calling
    es: Tu llamado
    uk: Твоє покликання
  text:
    ru: Отец, благодарю, что Ты сотворил меня для добрых дел. Направь мои шаги сегодня,
      чтобы я исполнил то, что Ты приготовил для меня прежде начала времен. Аминь.
    en: Father, thank You for creating me for good works. Direct my steps today so
      I may fulfill what You prepared for me before the beginning of time. Amen.
    es: Padre, gracias por crearme para buenas obras. Dirige mis pasos hoy para que
      cumpla lo que preparaste para mí desde antes del principio de los tiempos. Amén.
    uk: Отче, дякую, що Ти створив мене для добрих справ. Спрямуй мої кроки сьогодні,
      щоб я виконав те, що Ти приготував для мене ще до початку часів. Амінь.
- id: service_witness_24
  ref: mt:28:19
  title:
    ru: Великое поручение
    en: The Great Commission
    es: La Gran Comisión
    uk: Велике доручення
  text:
    ru: Господь Иисус, дай мне сердце, горящее желанием рассказывать о Тебе. Пусть
      мой путь станет путем ученичества, чтобы другие могли узнать о Твоей благодати.
    en: Lord Jesus, give me a heart burning with the desire to tell others about You.
      May my path become a journey of discipleship so others can know Your grace.
    es: Señor Jesús, dame un corazón ardiendo con el deseo de hablar de Ti. Que mi
      camino sea un sendero de discipulado para que otros conozcan tu gracia.
    uk: Господи Ісусе, дай мені серце, що палає бажанням розповідати про Тебе. Нехай
      мій шлях стане дорогою учнівства, щоб інші могли дізнатися про Твою благодать.
- id: service_witness_25
  ref: cl:4:5
  title:
    ru: Мудрость в общении
    en: Wisdom in conduct
    es: Sabiduría en el trato
    uk: Мудрість у спілкуванні
  text:
    ru: Господи, дай мне мудрости, как общаться с неверующими. Пусть мои слова будут
      исполнены благодати, чтобы каждый, кого я встречу, почувствовал Твою любовь.
    en: Lord, give me wisdom in how to interact with those who do not know You. May
      my words be full of grace so everyone I meet feels Your love.
    es: Señor, dame sabiduría en cómo tratar con los que no te conocen. Que mis palabras
      estén llenas de gracia para que todos los que encuentre sientan tu amor.
    uk: Господи, дай мені мудрості у спілкуванні з невіруючими. Нехай мої слова будуть
      сповнені благодаті, щоб кожен, кого я зустріну, відчув Твою любов.
- id: service_witness_26
  ref: rm:1:16
  title:
    ru: Сила Евангелия
    en: Power of the Gospel
    es: Poder del Evangelio
    uk: Сила Євангелія
  text:
    ru: Боже, я не стыжусь Твоего Евангелия, ведь это сила для спасения каждого верующего.
      Помоги мне открыто и с радостью делиться этой доброй вестью с людьми.
    en: God, I am not ashamed of Your Gospel, for it is the power for salvation to
      everyone who believes. Help me openly and joyfully share this good news.
    es: Dios, no me avergüenzo de tu Evangelio, pues es poder para salvación a todo
      el que cree. Ayúdame a compartir abierta y alegremente estas buenas nuevas.
    uk: Боже, я не соромлюся Твого Євангелія, бо це сила для спасіння кожного віруючого.
      Допоможи мені відкрито і з радістю ділитися цією доброю новиною.
- id: service_witness_27
  ref: 1pe:3:15
  title:
    ru: Надежда во мне
    en: The Hope Within Me
    es: La esperanza en mí
    uk: Надія в мені
  text:
    ru: Господи, помоги мне всегда быть готовым рассказать о надежде, которая живет
      во мне. Пусть мой ответ будет кротким, уважительным и направленным к Тебе.
    en: Lord, help me always be ready to speak about the hope that lives in me. May
      my response be gentle, respectful, and directed toward You.
    es: Señor, ayúdame a estar siempre listo para hablar de la esperanza que vive
      en mí. Que mi respuesta sea amable, respetuosa y dirigida hacia Ti.
    uk: Господи, допоможи мені завжди бути готовим розповісти про надію, що живе в
      мені. Нехай моя відповідь буде лагідною, шанобливою і спрямованою до Тебе.
- id: service_witness_28
  ref: 2co:5:20
  title:
    ru: Примиритесь с Богом
    en: Be Reconciled to God
    es: Reconciliaos con Dios
    uk: Примиріться з Богом
  text:
    ru: Отец, спасибо за честь быть Твоим послом. Помоги мне сегодня представлять
      Твое Царство с достоинством, призывая людей примириться с Тобой через Христа.
    en: Father, thank You for the honor of being Your ambassador. Help me today to
      represent Your Kingdom with dignity, calling people to reconcile with You.
    es: Padre, gracias por el honor de ser tu embajador. Ayúdame hoy a representar
      tu Reino con dignidad, llamando a la gente a reconciliarse contigo por Cristo.
    uk: Отче, дякую за честь бути Твоїм послом. Допоможи мені сьогодні представляти
      Твоє Царство з гідністю, закликаючи людей примиритися з Тобою через Христа.
- id: service_witness_29
  ref: is:6:8
  title:
    ru: Сердце, открытое к призыву
    en: A Heart Open to Your Call
    es: Corazón abierto a tu llamado
    uk: Серце, відкрите до поклику
  text:
    ru: Господь, мое сердце открыто для Твоего призыва. Вот я, пошли меня туда, где
      Ты хочешь видеть меня сегодня, чтобы я мог послужить людям во имя Твое.
    en: Lord, my heart is open to Your call. Here am I, send me where You want me
      to be today, so I can serve people in Your name.
    es: Señor, mi corazón está abierto a tu llamado. Heme aquí, envíame a donde quieras
      que esté hoy, para que pueda servir a la gente en tu nombre.
    uk: Господи, моє серце відкрите для Твого заклику. Ось я, пошли мене туди, де
      Ти хочеш бачити мене сьогодні, щоб я міг послужити людям в ім'я Твоє.
- id: service_witness_30
  ref: ph:2:15
  title:
    ru: Сияние среди тьмы
    en: Shining in darkness
    es: Brillando en la oscuridad
    uk: Сяйво серед темряви
  text:
    ru: Боже, помоги мне быть безупречным и чистым среди этого мира. Пусть моя жизнь
      станет ярким светилом, указывающим путь к Твоей любви и вечной истине.
    en: God, help me to be blameless and pure in this world. May my life become a
      bright light, pointing the way to Your love and eternal truth.
    es: Dios, ayúdame a ser irreprensible y puro en este mundo. Que mi vida sea una
      luz brillante, señalando el camino a tu amor y a la verdad eterna.
    uk: Боже, допоможи мені бути бездоганним і чистим серед цього світу. Нехай моє
      життя стане яскравим світлом, що вказує шлях до Твоєї любові та вічної істини.
- id: spiritual_growth_01
  ref: 2pe:3:18
  title:
    ru: Рост в благодати
    en: Growing in Grace
    es: Creciendo en gracia
    uk: Зростання в благодаті
  text:
    ru: Господь, помоги мне возрастать в познании Тебя. Пусть Твоя благодать наполняет
      моё сердце каждый день, преображая мой характер в Твой образ. Аминь.
    en: Lord, help me to grow in the knowledge of You. May Your grace fill my heart
      every day, transforming my character into Your image. Amen.
    es: Señor, ayúdame a crecer en tu conocimiento. Que tu gracia llene mi corazón
      cada día, transformando mi carácter a tu imagen. Amén.
    uk: Господи, допоможи мені зростати в пізнанні Тебе. Нехай Твоя благодать наповнює
      моє серце щодня, перетворюючи мій характер на Твій образ. Амінь.
- id: spiritual_growth_02
  ref: rm:12:2
  title:
    ru: Обновление ума
    en: Renewing the Mind
    es: Renovando la mente
    uk: Оновлення розуму
  text:
    ru: Боже, обнови мой ум, чтобы я не сообразовывался с этим миром. Направь мои
      мысли к Твоей воле, чтобы я мог познавать, что есть добро и совершенство. Аминь.
    en: God, renew my mind so I do not conform to this world. Direct my thoughts to
      Your will so I may discern what is good, acceptable, and perfect. Amen.
    es: Dios, renueva mi mente para no conformarme a este mundo. Dirige mis pensamientos
      a tu voluntad para discernir lo que es bueno y perfecto. Amén.
    uk: Боже, онови мій розум, щоб я не пристосовувався до цього світу. Спрямуй мої
      думки до Твоєї волі, щоб я міг пізнавати, що є добре і досконале. Амінь.
- id: spiritual_growth_03
  ref: ph:1:6
  title:
    ru: Твой верный труд
    en: Your Faithful Work
    es: Tu obra fiel
    uk: Твоя вірна праця
  text:
    ru: Господь, благодарю, что Ты начал во мне доброе дело. Верю, что Ты будешь совершать
      его до самого конца, пока я не стану подобным Тебе. Аминь.
    en: Lord, thank You for starting a good work in me. I trust that You will complete
      it until the end, until I am made like You. Amen.
    es: Señor, gracias por comenzar una buena obra en mí. Confío en que la completarás
      hasta el final, hasta que sea hecho a tu semejanza. Amén.
    uk: Господи, дякую, що Ти розпочав у мені добру справу. Вірю, що Ти звершуватимеш
      її до самого кінця, поки я не стану подібним до Тебе. Амінь.
- id: spiritual_growth_04
  ref: cl:3:10
  title:
    ru: Обновление образа
    en: Renewal in His Image
    es: Renovación a su imagen
    uk: Оновлення образу
  text:
    ru: Отец, помоги мне облечься в нового человека. Обновляй мой дух ежедневно, чтобы
      я отражал Твою святость и любовь в своей повседневной жизни. Аминь.
    en: Father, help me to put on the new self. Renew my spirit daily so that I may
      reflect Your holiness and love in my everyday life. Amen.
    es: Padre, ayúdame a vestirme del nuevo hombre. Renueva mi espíritu diariamente
      para que refleje tu santidad y amor en mi vida cotidiana. Amén.
    uk: Отче, допоможи мені зодягнутися в нову людину. Оновлюй мій дух щодня, щоб
      я відображав Твою святість і любов у своєму повсякденному житті. Амінь.
- id: spiritual_growth_05
  ref: 2co:3:18
  title:
    ru: Сияние Твоей славы
    en: Reflecting Your Glory
    es: Reflejando tu gloria
    uk: Сяйво Твоєї слави
  text:
    ru: Господь, открой моё лицо, чтобы я мог созерцать Твою славу. Преображай меня
      из славы в славу, пока я не стану полностью похожим на Тебя. Аминь.
    en: Lord, unveil my face so I may behold Your glory. Transform me from glory to
      glory, until I become completely like You. Amen.
    es: Señor, quita el velo de mi rostro para contemplar tu gloria. Transfórmame
      de gloria en gloria hasta ser hecho a tu semejanza. Amén.
    uk: Господи, відкрий моє обличчя, щоб я міг споглядати Твою славу. Перетворюй
      мене зі слави в славу, поки я не стану повністю схожим на Тебе. Амінь.
- id: spiritual_growth_06
  ref: eph:4:15
  title:
    ru: Истина в любви
    en: Truth in Love
    es: La verdad en amor
    uk: Істина в любові
  text:
    ru: Боже, помоги мне говорить истину с любовью. Пусть мой характер растёт во всем
      к Тебе, который есть наш Глава и Спаситель. Аминь.
    en: God, help me to speak the truth in love. May my character grow in every way
      toward You, who are our Head and Savior. Amen.
    es: Dios, ayúdame a decir la verdad con amor. Que mi carácter crezca en todo hacia
      ti, quien eres nuestra Cabeza y Salvador. Amén.
    uk: Боже, допоможи мені говорити істину з любов'ю. Нехай мій характер зростає
      в усьому до Тебе, який є наш Голова і Спаситель. Амінь.
- id: spiritual_growth_07
  ref: 1jo:3:3
  title:
    ru: Чистота сердца
    en: Purity of Heart
    es: Pureza de corazón
    uk: Чистота серця
  text:
    ru: Господь, дай мне надежду на встречу с Тобой. Помоги мне очищать себя, как
      Ты чист, чтобы моя жизнь была угодна Тебе во всём. Аминь.
    en: Lord, give me hope for meeting You. Help me to purify myself just as You are
      pure, so that my life may be pleasing to You in everything. Amen.
    es: Señor, dame la esperanza de encontrarte. Ayúdame a purificarme así como tú
      eres puro, para que mi vida te sea agradable en todo. Amén.
    uk: Господи, дай мені надію на зустріч із Тобою. Допоможи мені очищати себе, як
      Ти чистий, щоб моє життя було вгодне Тобі в усьому. Амінь.
- id: spiritual_growth_08
  ref: jm:1:4
  title:
    ru: Терпение и зрелость
    en: Patience and Maturity
    es: Paciencia y madurez
    uk: Терпіння та зрілість
  text:
    ru: Отец, позволь терпению совершить свою работу во мне. Сделай меня зрелым и
      совершенным, чтобы я ни в чём не имел недостатка в Твоём пути. Аминь.
    en: Father, let patience complete its work in me. Make me mature and complete,
      so that I may lack nothing in Your way. Amen.
    es: Padre, permite que la paciencia haga su obra en mí. Hazme maduro y completo,
      para que no me falte nada en tu camino. Amén.
    uk: Отче, дозволь терпінню звершити свою роботу в мені. Зроби мене зрілим і досконалим,
      щоб я ні в чому не мав недостатку на Твоєму шляху. Амінь.
- id: spiritual_growth_09
  ref: hb:12:1
  title:
    ru: Бег к цели
    en: Running the Race
    es: Corriendo hacia la meta
    uk: Біг до мети
  text:
    ru: Господь, помоги мне отложить всякий грех и бремя. Дай сил терпеливо бежать
      дистанцию, которую Ты предложил мне, глядя только на Тебя. Аминь.
    en: Lord, help me to lay aside every sin and burden. Give me strength to run with
      patience the race You set before me, keeping my eyes on You. Amen.
    es: Señor, ayúdame a dejar todo pecado y carga. Dame fuerzas para correr con paciencia
      la carrera que me has puesto, mirando solo a ti. Amén.
    uk: Господи, допоможи мені відкласти всякий гріх і тягар. Дай сил терпляче бігти
      дистанцію, яку Ти визначив для мене, дивлячись тільки на Тебе. Амінь.
- id: spiritual_growth_10
  ref: prv:6:23
  title:
    ru: Твой верный свет
    en: Your Faithful Light
    es: Tu luz fiel
    uk: Твоє вірне світло
  text:
    ru: Боже, Твоё Слово — светильник для моих ног. Направляй каждый мой шаг, чтобы
      я не сбивался с пути святости и следовал за Тобой всегда. Аминь.
    en: God, Your Word is a lamp to my feet. Guide every step I take, so that I do
      not stray from the path of holiness and follow You always. Amen.
    es: Dios, tu Palabra es lámpara a mis pies. Guía cada uno de mis pasos para no
      desviarme del camino de santidad y seguirte siempre. Amén.
    uk: Боже, Твоє Слово — світильник для моїх ніг. Спрямовуй кожен мій крок, щоб
      я не збивався зі шляху святості і слідував за Тобою завжди. Амінь.
- id: spiritual_growth_11
  ref: 1ts:5:23
  title:
    ru: Освящение во всём
    en: Sanctified Completely
    es: Santificados por completo
    uk: Освячення в усьому
  text:
    ru: Господь мира, освяти меня полностью. Сохрани мой дух, душу и тело в безупречности
      до дня Твоего возвращения. Ты верен, я верю Тебе. Аминь.
    en: Lord of peace, sanctify me completely. Keep my whole spirit, soul, and body
      blameless until Your return. You are faithful, I trust You. Amen.
    es: Señor de paz, santifícame por completo. Guarda mi espíritu, alma y cuerpo
      irreprochables hasta tu regreso. Tú eres fiel, en ti confío. Amén.
    uk: Господи миру, освяти мене повністю. Збережи мій дух, душу і тіло бездоганними
      до дня Твого повернення. Ти вірний, я довіряю Тобі. Амінь.
- id: spiritual_growth_12
  ref: 2tm:2:21
  title:
    ru: Сосуд для чести
    en: Vessel for Honor
    es: Vaso para honra
    uk: Посудина для честі
  text:
    ru: Отец, очисти меня от всего нечистого. Сделай меня сосудом для чести, освящённым
      и пригодным для Твоего доброго употребления. Аминь.
    en: Father, cleanse me from everything impure. Make me a vessel for honor, sanctified
      and useful for Your good work. Amen.
    es: Padre, límpiame de toda impureza. Hazme un vaso para honra, santificado y
      útil para tu buena obra. Amén.
    uk: Отче, очисти мене від усього нечистого. Зроби мене посудиною для честі, освяченою
      і придатною для Твого доброго вжитку. Амінь.
- id: spiritual_growth_13
  ref: ph:2:13
  title:
    ru: Твоё желание во мне
    en: Your Will in Me
    es: Tu voluntad en mí
    uk: Твоє бажання в мені
  text:
    ru: Господь, действуй во мне, чтобы я и хотел, и делал по Твоему благоволению.
      Пусть вся моя жизнь прославляет Твоё святое имя. Аминь.
    en: Lord, work in me so that I both desire and act according to Your good purpose.
      May my whole life bring glory to Your holy name. Amen.
    es: Señor, actúa en mí para que quiera y haga según tu beneplácito. Que toda mi
      vida glorifique tu santo nombre. Amén.
    uk: Господи, дій у мені, щоб я і хотів, і робив згідно з Твоєю доброю волею. Нехай
      усе моє життя прославляє Твоє святе ім'я. Амінь.
- id: spiritual_growth_14
  ref: cl:1:10
  title:
    ru: Достойная жизнь
    en: Living Worthily
    es: Viviendo dignamente
    uk: Гідне життя
  text:
    ru: Боже, помоги мне поступать достойно Тебя. Плодотворяй меня во всяком добром
      деле и умножай моё познание о Тебе с каждым днём. Аминь.
    en: God, help me to live in a way worthy of You. Make me fruitful in every good
      work and increase my knowledge of You each day. Amen.
    es: Dios, ayúdame a vivir de una manera digna de ti. Hazme fructífero en toda
      buena obra y aumenta mi conocimiento de ti cada día. Amén.
    uk: Боже, допоможи мені поводитися гідно Тебе. Роби мене плідним у кожній добрій
      справі й примножуй моє пізнання про Тебе щодня. Амінь.
- id: spiritual_growth_15
  ref: prv:4:18
  title:
    ru: Путь праведных
    en: Path of the Righteous
    es: Camino de los justos
    uk: Шлях праведних
  text:
    ru: Господь, пусть мой путь будет как свет лучезарный, сияющий всё ярче до полного
      дня. Веди меня в правде и чистоте сердца. Аминь.
    en: Lord, let my path be like the morning sun, shining ever brighter until the
      full day. Lead me in truth and purity of heart. Amen.
    es: Señor, que mi camino sea como la luz de la aurora, que brilla cada vez más
      hasta el día perfecto. Guíame en verdad y pureza. Amén.
    uk: Господи, нехай мій шлях буде як світло променисте, що сяє дедалі яскравіше
      до повного дня. Веди мене в правді та чистоті серця. Амінь.
- id: spiritual_growth_16
  ref: 2co:7:1
  title:
    ru: Совершенство святости
    en: Perfecting Holiness
    es: Perfeccionando la santidad
    uk: Досконалість святості
  text:
    ru: Отец, дай мне силы очиститься от всякой скверны. Помоги мне совершать святость
      в страхе Божьем, стремясь к Тебе всем сердцем. Аминь.
    en: Father, give me strength to cleanse myself from every defilement. Help me
      to perfect holiness in the fear of God, seeking You with all my heart. Amen.
    es: Padre, dame fuerzas para limpiarme de toda contaminación. Ayúdame a perfeccionar
      la santidad en el temor de Dios, buscándote con todo mi corazón. Amén.
    uk: Отче, дай мені сили очиститися від усякої скверни. Допоможи мені звершувати
      святість у страху Божому, прагнучи до Тебе всім серцем. Амінь.
- id: spiritual_growth_17
  ref: 1pe:2:2
  title:
    ru: Духовное молоко
    en: Spiritual Milk
    es: Leche espiritual
    uk: Духовне молоко
  text:
    ru: Господь, пробуди во мне жажду по Твоему Слову, как у младенца по молоку. Пусть
      оно питает меня для спасения и духовного роста. Аминь.
    en: Lord, awaken in me a thirst for Your Word, like a baby for milk. May it nourish
      me for salvation and spiritual growth. Amen.
    es: Señor, despierta en mí sed por tu Palabra, como un bebé por la leche. Que
      me nutra para la salvación y el crecimiento espiritual. Amén.
    uk: Господи, пробуди в мені спрагу до Твого Слова, як у немовляти до молока. Нехай
      воно живить мене для спасіння та духовного зростання. Амінь.
- id: spiritual_growth_18
  ref: eph:3:16
  title:
    ru: Сила во внутреннем человеке
    en: Strength Within
    es: Fortaleza interior
    uk: Сила у внутрішній людині
  text:
    ru: Боже, дай мне силу Духом Твоим укрепиться во внутреннем человеке. Пусть Христос
      живёт в моём сердце через веру каждый день. Аминь.
    en: God, give me strength through Your Spirit to be strengthened in my inner being.
      May Christ dwell in my heart through faith every day. Amen.
    es: Dios, dame fuerza mediante tu Espíritu para ser fortalecido en el hombre interior.
      Que Cristo habite en mi corazón por la fe cada día. Amén.
    uk: Боже, дай мені силу Духом Твоїм зміцнитися у внутрішній людині. Нехай Христос
      живе в моєму серці через віру щодня. Амінь.
- id: spiritual_growth_19
  ref: gl:5:22
  title:
    ru: Возрастать в Духе
    en: Growing in the Spirit
    es: Crecer en el Espíritu
    uk: Зростати в Дусі
  text:
    ru: Господь, наполни меня Своим Духом. Пусть в моей жизни прорастает любовь, радость,
      мир и долготерпение, чтобы люди видели Твой свет. Аминь.
    en: Lord, fill me with Your Spirit. Let love, joy, peace, and patience grow in
      my life, so that people may see Your light. Amen.
    es: Señor, lléname de tu Espíritu. Que en mi vida broten amor, gozo, paz y paciencia,
      para que los demás vean tu luz. Amén.
    uk: Господи, наповни мене Своїм Духом. Нехай у моєму житті проростає любов, радість,
      мир і довготерпіння, щоб люди бачили Твоє світло. Амінь.
- id: spiritual_growth_20
  ref: 1tm:4:15
  title:
    ru: Успехи в вере
    en: Progress in Faith
    es: Progreso en la fe
    uk: Успіхи у вірі
  text:
    ru: Отец, помоги мне размышлять о духовном и предаваться этому. Пусть мои успехи
      будут очевидны всем, кто видит моё смирение перед Тобой. Аминь.
    en: Father, help me to meditate on spiritual things and give myself to them. May
      my progress be evident to all who see my humility before You. Amen.
    es: Padre, ayúdame a meditar en lo espiritual y a dedicarme a ello. Que mi progreso
      sea evidente a todos los que ven mi humildad ante ti. Amén.
    uk: Отче, допоможи мені роздумувати про духовне і віддаватися цьому. Нехай мої
      успіхи будуть очевидні всім, хто бачить моє смирення перед Тобою. Амінь.
- id: spiritual_growth_21
  ref: 2pe:3:18
  title:
    ru: Расти в благодати
    en: Grow in Grace
    es: Crecer en gracia
    uk: Зростати в благодаті
  text:
    ru: Господь, помоги мне возрастать в познании Тебя и Твоей благодати. Пусть каждый
      мой день будет шагом ближе к Твоему свету и Твоей совершенной любви.
    en: Lord, help me grow in the knowledge of You and Your grace. May every day be
      a step closer to Your light and Your perfect love. Amen.
    es: Señor, ayúdame a crecer en el conocimiento de Ti y de Tu gracia. Que cada
      día sea un paso más cerca de Tu luz y de Tu amor perfecto.
    uk: Господи, допоможи мені зростати в пізнанні Тебе і Твоєї благодаті. Нехай кожен
      мій день буде кроком ближче до Твого світла і Твоєї любові.
- id: spiritual_growth_22
  ref: ph:1:6
  title:
    ru: Твой добрый труд
    en: Your Good Work
    es: Tu buena obra
    uk: Твоя добра праця
  text:
    ru: Боже, я благодарю Тебя за то, что Ты начал во мне доброе дело. Прошу, веди
      меня и дальше, до самого конца, преображая мое сердце в Твой образ.
    en: God, I thank You for starting a good work in me. Please continue to lead me
      until the end, transforming my heart into Your image.
    es: Dios, te agradezco por haber comenzado una buena obra en mí. Por favor, guíame
      hasta el final, transformando mi corazón a Tu imagen.
    uk: Боже, я дякую Тобі за те, що Ти почав у мені добру справу. Прошу, веди мене
      і далі, до самого кінця, перетворюючи моє серце на Твій образ.
- id: spiritual_growth_23
  ref: cl:3:10
  title:
    ru: Обновление души
    en: Renewal of Soul
    es: Renovación del alma
    uk: Оновлення душі
  text:
    ru: Господь, обнови мой разум и сердце. Помоги мне сбросить старое и облечься
      в нового человека, созданного по Твоему подобию в истинной святости.
    en: Lord, renew my mind and heart. Help me put off the old and put on the new
      self, created in Your likeness in true holiness.
    es: Señor, renueva mi mente y corazón. Ayúdame a dejar lo viejo y revestirme del
      nuevo hombre, creado a Tu semejanza en verdadera santidad.
    uk: Господи, онови мій розум і серце. Допоможи мені скинути старе і зодягнутися
      в нову людину, створену за Твоєю подобою у правдивій святості.
- id: spiritual_growth_24
  ref: rm:12:2
  title:
    ru: Различать волю Божью
    en: Discerning God's Will
    es: Discernir la voluntad de Dios
    uk: Розпізнавати волю Божу
  text:
    ru: Отец, не позволь мне подстраиваться под этот мир. Преображай мой разум, чтобы
      я мог ясно различать Твою добрую и совершенную волю для моей жизни.
    en: Father, do not let me conform to this world. Renew my mind so I can clearly
      discern Your good and perfect will for my life.
    es: Padre, no permitas que me adapte a este mundo. Transforma mi mente para que
      pueda discernir Tu buena y perfecta voluntad para mi vida.
    uk: Отче, не дозволь мені підлаштовуватися під цей світ. Перетворюй мій розум,
      щоб я міг ясно розрізняти Твою добру і досконалу волю для мого життя.
- id: spiritual_growth_25
  ref: 2co:7:1
  title:
    ru: Стремление к святости
    en: Pursuit of Holiness
    es: Búsqueda de santidad
    uk: Прагнення до святості
  text:
    ru: Господь, дай мне силы очиститься от всего, что оскверняет дух. Помоги мне
      совершать святость в страхе Божьем, стремясь к чистоте каждый день.
    en: Lord, give me strength to cleanse myself from everything that defiles. Help
      me to perfect holiness in the fear of God, seeking purity daily.
    es: Señor, dame fuerzas para limpiarme de todo lo que contamina. Ayúdame a perfeccionar
      la santidad en el temor de Dios, buscando pureza cada día.
    uk: Господи, дай мені сили очиститися від усього, що оскверняє дух. Допоможи мені
      вдосконалювати святість у страху Божому, прагнучи чистоти щодня.
- id: spiritual_growth_26
  ref: eph:4:23
  title:
    ru: Обновление духа
    en: Renewal of Spirit
    es: Renovación del espíritu
    uk: Оновлення духа
  text:
    ru: Боже, обновляй дух моего ума каждый день. Пусть Твое присутствие наполняет
      меня изнутри, делая мои мысли чистыми и угодными Тебе во всем.
    en: God, renew the spirit of my mind every day. May Your presence fill me from
      within, making my thoughts pure and pleasing to You in all.
    es: Dios, renueva el espíritu de mi mente cada día. Que Tu presencia me llene
      desde adentro, haciendo mis pensamientos puros y agradables a Ti.
    uk: Боже, оновлюй дух мого розуму щодня. Нехай Твоя присутність наповнює мене
      зсередини, роблячи мої думки чистими і приємними Тобі в усьому.
- id: spiritual_growth_27
  ref: 1ts:5:23
  title:
    ru: Дух, душа и тело
    en: Spirit, Soul, and Body
    es: Espíritu, alma y cuerpo
    uk: Дух, душа і тіло
  text:
    ru: Отец, освяти меня целиком. Пусть мой дух, душа и тело будут сохранены в чистоте
      до пришествия Господа Иисуса. Будь моим светом и хранителем.
    en: Father, sanctify me completely. May my spirit, soul, and body be kept blameless
      until the coming of Jesus. Be my light and my keeper.
    es: Padre, santifícame por completo. Que mi espíritu, alma y cuerpo sean guardados
      sin mancha hasta la venida de Jesús. Sé mi luz y guardián.
    uk: Отче, освяти мене цілком. Нехай мій дух, душа і тіло будуть збережені в чистоті
      до приходу Ісуса. Будь моїм світлом і охоронцем.
- id: spiritual_growth_28
  ref: hb:12:14
  title:
    ru: Мир и святость
    en: Peace and Holiness
    es: Paz y santidad
    uk: Мир і святість
  text:
    ru: Господи, помоги мне жить в мире со всеми и стремиться к святости. Без Тебя
      я не увижу Твоего лица, поэтому веди меня Своим путем истины.
    en: Lord, help me live at peace with everyone and pursue holiness. Without You
      I will not see Your face, so lead me on Your path of truth.
    es: Señor, ayúdame a vivir en paz con todos y buscar la santidad. Sin Ti no veré
      Tu rostro, así que guíame por Tu camino de verdad.
    uk: Господи, допоможи мені жити в мирі з усіма і прагнути святості. Без Тебе я
      не побачу Твого обличчя, тому веди мене Своїм шляхом істини.
- id: spiritual_growth_29
  ref: 1pe:1:16
  title:
    ru: Будьте святы
    en: Be Holy
    es: Sean santos
    uk: Будьте святі
  text:
    ru: Святой Боже, Ты призвал меня быть святым, как Ты. Прошу, наполни мою жизнь
      Твоей красотой и отдели меня для служения, исполненного Твоей любви.
    en: Holy God, You have called me to be holy as You are. Please fill my life with
      Your beauty and set me apart for a service full of Your love.
    es: Dios Santo, me has llamado a ser santo como Tú. Por favor, llena mi vida con
      Tu belleza y apártame para un servicio lleno de Tu amor.
    uk: Святий Боже, Ти покликав мене бути святим, як Ти. Прошу, наповни моє життя
      Твоєю красою і відділи мене для служіння, сповненого Твоєю любов'ю.
- id: spiritual_growth_30
  ref: 2tm:2:21
  title:
    ru: Сосуд чести
    en: Vessel of Honor
    es: Vaso de honra
    uk: Посуд честі
  text:
    ru: Господь, очисти мое сердце, чтобы я стал сосудом в чести, освященным и пригодным
      для Твоего великого дела. Используй меня для Своей славы.
    en: Lord, cleanse my heart so I may be a vessel for honor, sanctified and useful
      for Your great work. Use me for Your glory.
    es: Señor, limpia mi corazón para que sea un vaso de honra, santificado y útil
      para Tu gran obra. Úsame para Tu gloria.
    uk: Господи, очисти моє серце, щоб я став посудом честі, освяченим і придатним
      для Твоєї великої справи. Використовуй мене для Своєї слави.
- id: spiritual_growth_31
  ref: 1jo:3:3
  title:
    ru: Очищение надеждой
    en: Cleansed by Hope
    es: Purificados por la esperanza
    uk: Очищення надією
  text:
    ru: Отец, я имею надежду на встречу с Тобой. Помоги мне очищать себя, как Ты чист,
      чтобы я мог с радостью ожидать Твоего славного пришествия.
    en: Father, I have the hope of meeting You. Help me purify myself, just as You
      are pure, so I can joyfully await Your glorious coming.
    es: Padre, tengo la esperanza de encontrarme contigo. Ayúdame a purificarme, tal
      como Tú eres puro, para esperar con gozo Tu venida gloriosa.
    uk: Отче, я маю надію на зустріч із Тобою. Допоможи мені очищати себе, як Ти чистий,
      щоб я міг з радістю очікувати на Твій славний прихід.
- id: spiritual_growth_32
  ref: 2co:5:17
  title:
    ru: Обнови дух мой
    en: Renew My Spirit
    es: Renueva mi espíritu
    uk: Онови мій дух
  text:
    ru: Боже, сотвори во мне чистое сердце и обнови внутри меня верный дух. Не отлучай
      меня от Своего лица и поддержи меня Своей благодатной силой.
    en: God, create in me a clean heart and renew a right spirit within me. Do not
      cast me away from Your presence and sustain me with Your power.
    es: Dios, crea en mí un corazón limpio y renueva un espíritu firme dentro de mí.
      No me alejes de Tu presencia y sostenme con Tu poder.
    uk: Боже, створи в мені чисте серце і онови всередині мене правильний дух. Не
      відлучай мене від Свого обличчя і підтримай мене Своєю силою.
- id: spiritual_growth_33
  ref: 1ts:4:3
  title:
    ru: Возрастать в святости
    en: Growing in Holiness
    es: Crecer en santidad
    uk: Зростати у святості
  text:
    ru: Господь, я хочу исполнять Твою волю. Помоги мне возрастать в святости, избегая
      всякого греха и посвящая свою жизнь исключительно Тебе.
    en: Lord, I want to do Your will. Help me grow in holiness, avoiding every sin
      and dedicating my life exclusively to You.
    es: Señor, quiero hacer Tu voluntad. Ayúdame a crecer en santidad, evitando todo
      pecado y dedicando mi vida exclusivamente a Ti.
    uk: Господи, я хочу виконувати Твою волю. Допоможи мені зростати у святості, уникаючи
      будь-якого гріха і присвячуючи своє життя виключно Тобі.
- id: spiritual_growth_34
  ref: jm:4:8
  title:
    ru: Приближение к Богу
    en: Drawing Near
    es: Acercarse a Dios
    uk: Наближення до Бога
  text:
    ru: Отец, я хочу приблизиться к Тебе. Очисти мои руки и исправь мое сердце, чтобы
      я мог пребывать в Твоем присутствии и слышать Твой голос.
    en: Father, I want to draw near to You. Cleanse my hands and correct my heart,
      so I can dwell in Your presence and hear Your voice.
    es: Padre, quiero acercarme a Ti. Limpia mis manos y corrige mi corazón para que
      pueda habitar en Tu presencia y escuchar Tu voz.
    uk: Отче, я хочу наблизитися до Тебе. Очисти мої руки і виправ моє серце, щоб
      я міг перебувати в Твоїй присутності і чути Твій голос.
- id: spiritual_growth_35
  ref: 2co:3:18
  title:
    ru: В Твой образ
    en: Into Your Image
    es: A Tu imagen
    uk: У Твій образ
  text:
    ru: Господь, созерцая Твою славу, меняй меня. Преображай меня в Твой образ, от
      славы в славу, действием Твоего Святого Духа. Веди меня вперед.
    en: Lord, beholding Your glory, change me. Transform me into Your image, from
      glory to glory, by the action of Your Holy Spirit. Lead me on.
    es: Señor, al contemplar Tu gloria, cámbiame. Transfórmame a Tu imagen, de gloria
      en gloria, por la acción de Tu Espíritu Santo. Guíame adelante.
    uk: Господи, споглядаючи Твою славу, змінюй мене. Перетворюй мене на Твій образ,
      від слави у славу, дією Твого Святого Духа. Веди мене вперед.
