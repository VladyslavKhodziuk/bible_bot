id: bible_year
emoji: "📚"
duration_days: 365
names:
  ru: "Библия за год"
  en: "Bible in a year"
  es: "Biblia en un año"
  uk: "Біблія за рік"
descriptions:
  ru: "Прочитать всю Библию за год. По 3-4 главы в день, последовательно от Бытия до Откровения. Серьёзная цель для тех, кто хочет знать всё Писание."
  en: "Read the entire Bible in a year. 3-4 chapters per day, sequentially from Genesis to Revelation. A serious goal for those who want to know the whole Scripture."
  es: "Leer toda la Biblia en un año. 3-4 capítulos al día, secuencialmente desde Génesis hasta Apocalipsis. Una meta seria para quienes quieren conocer toda la Escritura."
  uk: "Прочитати всю Біблію за рік. По 3-4 розділи на день, послідовно від Буття до Об'явлення. Серйозна мета для тих, хто хоче знати все Письмо."
