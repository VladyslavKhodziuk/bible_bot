descriptions:
  ru: "Прочитать весь Новый Завет за месяц. Около 9 глав в день — серьёзный темп для тех, кто хочет погрузиться глубоко."
  en: "Read the entire New Testament in a month. About 9 chapters per day — a serious pace for deep immersion."
  es: "Leer todo el Nuevo Testamento en un mes. Unos 9 capítulos al día — un ritmo serio para una inmersión profunda."
  uk: "Прочитати весь Новий Заповіт за місяць. Близько 9 розділів на день — серйозний темп для глибокого занурення."
