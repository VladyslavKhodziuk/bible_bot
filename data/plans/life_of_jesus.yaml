descriptions:
  ru: "40 дней по Евангелиям — путь от Рождества до Воскресения. Подобран тематически, чтобы видеть жизнь Иисуса в её полноте."
  en: "40 days through the Gospels — a journey from Nativity to Resurrection. Thematically arranged to see the life of Jesus in its fullness."
  es: "40 días a través de los Evangelios — un viaje desde el Nacimiento hasta la Resurrección. Organizado temáticamente para ver la vida de Jesús en su plenitud."
  uk: "40 днів через Євангелія — шлях від Різдва до Воскресіння. Підібрано тематично, щоб бачити життя Ісуса в його повноті."
