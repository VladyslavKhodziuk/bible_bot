  es: "Salmos en un mes"
  uk: "Псалми за місяць"
descriptions:
  ru: "Прочитать всю Псалтирь за 30 дней. По 5 псалмов в день — молитвенное чтение, которое настраивает сердце на день."
  en: "Read the entire Psalter in 30 days. 5 psalms a day — prayerful reading that tunes the heart for the day."
  es: "Leer todo el Salterio en 30 días. 5 salmos al día — lectura orante que sintoniza el corazón con el día."
  uk: "Прочитати всю Псалтир за 30 днів. По 5 псалмів на день — молитовне читання, що налаштовує серце на день."
