streak:
  indicator: "🔥 {days} дн. подряд"
  indicator_single: "🔥 1 день со Словом"
  none: ""
  onboarding: |
    🔥 <b>Твоя серия началась!</b>

    Каждый день, когда ты читаешь стих дня или открываешь главу Библии — день засчитывается. Так формируется привычка возвращаться к Писанию каждый день.

    🛡 У тебя есть <b>2 заморозки</b> — они защитят серию, если ты пропустишь день. Защита сработает автоматически. Заморозки восполняются по мере роста серии.

    Не сдавайся, я буду рядом 🙏
  onboarding_button: "Понятно 🙌"
  freeze_used: |
    🛡 <b>Доброе утро, {name}!</b>

    Вчера ты пропустил день — я использовал одну заморозку, чтобы сохранить твою серию.
    🔥 Серия: <b>{streak} дн.</b>
    🛡 Заморозок осталось: <b>{freezes}</b>

    Не теряй ритм — Слово ждёт тебя.
  encouragement: |
    🕊 <b>Привет, {name}.</b>

    Я заметил, что нас не было какое-то время. Это нормально — жизнь полна обстоятельств.

    Бог не считает дни. Он просто рад каждому твоему возвращению.

    Начнём заново? 🙏
  milestones:
    "3": "🎉 Три дня подряд со Словом! Привычка начинается."
    "7": "🔥 Целая неделя! Это уже ритм жизни."
    "14": "✨ Две недели! Слово становится твоим хлебом."
    "30": "🏆 Месяц подряд! Это уже не случайность."
    "50": "💎 Пятьдесят дней! Удивительное постоянство."
    "100": "👑 СТО ДНЕЙ! Невероятно. Бог видит твоё сердце."
    "200": "🌟 Двести дней! Ты вдохновение для других."
    "365": "🕊️ ГОД СО СЛОВОМ! Это уже образ жизни."

