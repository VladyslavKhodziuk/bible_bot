    🎲 Показывать случайный стих и мудрость дня
    ⭐ Сохранять любимые места
    📚 Вести по плану чтения
    🔥 Считать твою серию — со Словом и в молитве

    <i>«Слово Твоё — светильник ноге моей и свет стезе моей» (Пс 118:105)</i>

    Готов начать? 👇
