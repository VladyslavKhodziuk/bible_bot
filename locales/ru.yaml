  onboarding: |
    🔥 <b>Твоя серия началась!</b>

    Каждый день, когда ты читаешь стих дня или открываешь главу Библии — день засчитывается. Так формируется привычка возвращаться к Писанию каждый день.

    🛡 У тебя есть <b>2 заморозки</b> — они защитят серию, если ты пропустишь день. Защита сработает автоматически. Заморозки восполняются по мере роста серии.

    Не сдавайся, я буду рядом 🙏
