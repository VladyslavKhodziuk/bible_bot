search:
  prompt: |
    🔍 <b>Поиск по слову</b>

    Напиши слово или фразу, которую хочешь найти в Библии.

    Например: <i>любовь, не бойся, пастырь</i>

  too_short: "⚠️ Введи хотя бы 2 буквы для поиска."
  too_long: "⚠️ Запрос слишком длинный. Попробуй покороче."
  wrong_alphabet: |
    ⚠️ Похоже, ты ищешь "{query}".

    Но твой перевод Библии — <b>{translation}</b>.

    Этот перевод не содержит слов в этом алфавите. Попробуй слово на нужном языке.

  # === Экран выбора раздела ===
  choose_scope: |
    🔍 По запросу <i>«{query}»</i>

    Найдено всего: <b>{total} стихов</b>

    Где искать?
  scope_all: "📖 Вся Библия · {count}"
  scope_ot: "📜 Ветхий Завет · {count}"
  scope_nt: "✝️ Новый Завет · {count}"

  # === Экран результатов ===
  results_title_all: "🔍 <i>«{query}»</i> — вся Библия"
  results_title_ot: "🔍 <i>«{query}»</i> — Ветхий Завет"
  results_title_nt: "🔍 <i>«{query}»</i> — Новый Завет"
  found_limited: "<i>(показываю первые {limit})</i>"

  # === Детальный экран ===
  detail_title: "🔍 Результат поиска"

  # === Сообщения и кнопки ===
  no_results: |
    😔 По запросу "<i>{query}</i>" ничего не найдено.

    Попробуй другое слово или фразу.

    Хорошо ищутся:
    • любовь
    • вера
    • пастырь
    • не бойся
    • прощение

  result_header: "<b>{book} {chapter}:{verse}</b>"
  new_search: "🔍 Новый поиск"
  change_scope: "🔄 Изменить раздел"
  try_anyway: "🔍 Всё равно искать"
  back_to_results: "🔍 К результатам"
  cancel: "← Отмена"

