feedback:
  # Подменю и основные тексты
  cabinet_idea: "💡 Предложить идею"
  cabinet_bug: "🐞 Сообщить о проблеме"
  cabinet_review: "😊 Оставить отзыв"

  # Экран ожидания идеи
  idea_prompt: |
    💡 <b>Предложить идею</b>

    Напиши свою идею одним сообщением — что хочется улучшить или добавить в боте?

    Я передам её автору проекта.
  idea_thanks: |
    🙏 <b>Спасибо!</b>

    Твоя идея получена. Автор обязательно её прочитает.

  # Экран ожидания багрепорта
  bug_prompt: |
    🐞 <b>Сообщить о проблеме</b>

    Опиши, что не работает или работает странно. Расскажи как можно подробнее — что ты делал, что ожидал, что произошло.
  bug_thanks: |
    🙏 <b>Спасибо!</b>

    Сообщение о проблеме получено. Постараюсь исправить как можно скорее.

  # Экран отзыва
  review_prompt: |
    😊 <b>Оставить отзыв</b>

    Расскажи в одном-двух сообщениях, что тебе нравится в боте или что тебя коснулось.
    
