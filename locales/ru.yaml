    🏦 <b>Monobank — Банка</b>

    ❤️ Поддержать проект
    Сбор на хостинг, серверы и техническую поддержку бесплатного бота «Bible Way». Чтобы Слово Божье оставалось доступным каждому!

    🎯 Цель: 10 000 ₴
