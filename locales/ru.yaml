  # === Детальный экран ===
  detail_title: "🔍 Результат поиска"

  # === Сообщения и кнопки ===
  no_results: |
    😔 По запросу "<i>{query}</i>" ничего не найдено.

    Попробуй другое слово или фразу.

    Хорошо ищутся:
