welcome:
  text: |
    Мир тебе, {name}! 🕊️

    Я — <b>Bible Way</b>, твой помощник в чтении Священного Писания.

    Вот что я умею:

    📖 Читать Библию в разных переводах
    🔍 Искать стихи по словам и темам
    💭 Подбирать Слово для любой жизненной ситуации
    ⭐ Сохранять любимые места
    📅 Присылать стих дня каждое утро
    📚 Вести по плану чтения
    🎨 Создавать красивые карточки со стихами, чтобы делиться с близкими

    <i>«Слово Твоё — светильник ноге моей и свет стезе моей» (Пс 118:105)</i>

    Готов начать? 👇
  button: "📖 Открыть меню"

welcome_back: "🕊️ С возвращением, {name}!"

