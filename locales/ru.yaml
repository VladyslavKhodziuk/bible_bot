welcome:
  text: |
    Мир тебе, {name}! 🕊️

    Я — <b>Bible Way</b>, твой помощник в чтении Священного Писания.

    {verse_line}

    Вот что я умею:

    🙋 Выслушать и поддержать словом — поговори с пастырем
    📖 Читать Библию в разных переводах
    🙏 Присылать молитву на каждый день — с кнопкой «Аминь»
    🔔 Напоминать о молитве в твоё время
    🔍 Искать стихи по словам и темам
