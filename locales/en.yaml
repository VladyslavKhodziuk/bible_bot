    Every day you read the verse of the day or open a chapter of the Bible — counts as a day. This is how a habit of returning to Scripture forms.

    🛡 You have <b>2 freezes</b> — they will protect your streak if you miss a day. Protection activates automatically. Freezes are replenished as your streak grows.

    Don't give up, I'm with you 🙏
