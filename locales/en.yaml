streak:
  indicator: "🔥 {days} days in a row"
  indicator_single: "🔥 1 day with the Word"
  none: ""
  onboarding: |
    🔥 <b>Your streak has begun!</b>

    Every day you read the verse of the day or open a chapter of the Bible — counts as a day. This is how a habit of returning to Scripture forms.

    🛡 You have <b>2 freezes</b> — they will protect your streak if you miss a day. Protection activates automatically. Freezes are replenished as your streak grows.

    Don't give up, I'm with you 🙏
  onboarding_button: "Got it 🙌"
  freeze_used: |
    🛡 <b>Good morning, {name}!</b>

    You missed yesterday — I used one freeze to preserve your streak.
    🔥 Streak: <b>{streak} days</b>
    🛡 Freezes left: <b>{freezes}</b>

    Don't lose the rhythm — the Word is waiting for you.
  encouragement: |
    🕊 <b>Hi, {name}.</b>

    I noticed you've been away for a while. That's normal — life is full of circumstances.

    God doesn't count days. He simply rejoices over every return.

    Shall we start again? 🙏
  milestones:
    "3": "🎉 Three days in a row with the Word! A habit is forming."
    "7": "🔥 A whole week! This is becoming a rhythm of life."
    "14": "✨ Two weeks! The Word is becoming your bread."
    "30": "🏆 A whole month! This is no coincidence."
    "50": "💎 Fifty days! Remarkable consistency."
    "100": "👑 ONE HUNDRED DAYS! Incredible. God sees your heart."
    "200": "🌟 Two hundred days! You're an inspiration to others."
    "365": "🕊️ A YEAR WITH THE WORD! This is now a way of life."

