welcome:
  text: |
    Peace to you, {name}! 🕊️

    I'm <b>Bible Way</b>, your companion in reading the Holy Scripture.

    Here's what I can do:

    📖 Read the Bible in different translations
    🔍 Search verses by words and topics
    💭 Find the Word for any life situation
    ⭐ Save your favorite passages
    📅 Send you a daily verse every morning
    📚 Guide you through a reading plan
    🎨 Create beautiful verse cards to share with loved ones

    <i>"Your word is a lamp for my feet, a light on my path" (Psalm 119:105)</i>

    Ready to begin? 👇
  button: "📖 Open menu"

welcome_back: "🕊️ Welcome back, {name}!"

