  cabinet_bug: "🐞 Report a problem"
  cabinet_review: "😊 Leave a review"

  idea_prompt: |
    💡 <b>Suggest an idea</b>

    Write your idea in one message — what would you like to improve or add to the bot?

    I'll pass it to the project author.
  idea_thanks: |
    🙏 <b>Thank you!</b>

    Your idea has been received. The author will definitely read it.

