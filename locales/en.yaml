  too_long: "⚠️ Query is too long. Try a shorter one."
  wrong_alphabet: |
    ⚠️ It seems you're searching for "{query}".

    But your Bible translation is <b>{translation}</b>.

    This translation doesn't contain words in this alphabet. Try a word in the right language.

  choose_scope: |
    🔍 Search for <i>«{query}»</i>

    Total found: <b>{total} verses</b>

    Where to search?
