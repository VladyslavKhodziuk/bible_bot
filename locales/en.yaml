    🐞 <b>Report a problem</b>

    Describe what doesn't work or works strangely. Tell as much as you can — what you did, what you expected, what happened.
  bug_thanks: |
    🙏 <b>Thank you!</b>

    Problem report received. I'll try to fix it as soon as possible.

  review_prompt: |
    😊 <b>Leave a review</b>

    Tell in one or two messages what you like about the bot or what has touched you.

    Your review is real support for the project 🙏
  review_thanks: |
    ❤️ <b>Thank you for your review!</b>

    This means a lot to the project.

    If you want — you can support the project so it grows and helps even more people:

