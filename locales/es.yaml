ai_pastor:
  consent_text: |
    💬 <b>Un amigo con la Biblia abierta</b>

    Soy un compañero IA que te escuchará y te ofrecerá un versículo bíblico para reflexionar.

    <b>Es importante entender:</b>
    • <b>No</b> soy pastor, sacerdote, médico ni psicólogo.
    • Soy un amigo con la Biblia abierta, buscando una Palabra para tu situación.
    • Para temas serios (salud, crisis, violencia) — acude a un especialista o a una línea de ayuda.
