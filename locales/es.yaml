welcome:
  text: |
    ¡La paz sea contigo, {name}! 🕊️

    Soy <b>Bible Way</b>, tu compañero en la lectura de las Sagradas Escrituras.

    Esto es lo que puedo hacer:

    📖 Leer la Biblia en diferentes traducciones
    🔍 Buscar versículos por palabras y temas
    💭 Encontrar la Palabra para cualquier situación de la vida
    ⭐ Guardar tus pasajes favoritos
    📅 Enviarte un versículo cada mañana
    📚 Guiarte por un plan de lectura
    🎨 Crear hermosas tarjetas con versículos para compartir con tus seres queridos

    <i>«Lámpara es a mis pies tu palabra, y lumbrera a mi camino» (Salmo 119:105)</i>

    ¿Listo para comenzar? 👇
  button: "📖 Abrir el menú"

