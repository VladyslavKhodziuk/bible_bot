streak:
  indicator: "🔥 {days} días seguidos"
  indicator_single: "🔥 1 día con la Palabra"
  none: ""
  onboarding: |
    🔥 <b>¡Tu racha ha comenzado!</b>

    Cada día que lees el versículo del día o abres un capítulo de la Biblia — cuenta como un día. Así se forma el hábito de volver a la Escritura cada día.

    🛡 Tienes <b>2 protecciones</b> — te cuidarán la racha si pierdes un día. La protección se activa automáticamente. Las protecciones se renuevan a medida que crece tu racha.

    No te rindas, estoy contigo 🙏
  onboarding_button: "Entendido 🙌"
  freeze_used: |
    🛡 <b>Racha preservada</b>

    Ayer perdiste un día — usé una protección para conservar tu racha.
    🔥 Racha: <b>{streak} días</b>
    🛡 Protecciones restantes: <b>{freezes}</b>

    No pierdas el ritmo — la Palabra te espera.
  encouragement: |
    🕊 <b>Hola, {name}.</b>

    Noté que no nos vimos por un tiempo. Es normal — la vida está llena de circunstancias.

    Dios no cuenta los días. Simplemente se alegra de cada regreso.

    ¿Volvemos a empezar? 🙏
  milestones:
    "3": "🎉 ¡Tres días seguidos con la Palabra! Se está formando un hábito."
    "7": "🔥 ¡Una semana entera! Esto se está volviendo un ritmo de vida."
    "14": "✨ ¡Dos semanas! La Palabra se está volviendo tu pan."
    "30": "🏆 ¡Un mes entero! Esto no es coincidencia."
    "50": "💎 ¡Cincuenta días! Constancia notable."
    "100": "👑 ¡CIEN DÍAS! Increíble. Dios ve tu corazón."
    "200": "🌟 ¡Doscientos días! Eres inspiración para otros."
    "365": "🕊️ ¡UN AÑO CON LA PALABRA! Esto ya es un estilo de vida."

