feedback:
  cabinet_idea: "💡 Sugerir una idea"
  cabinet_bug: "🐞 Reportar un problema"
  cabinet_review: "😊 Dejar una reseña"

  idea_prompt: |
    💡 <b>Sugerir una idea</b>

    Escribe tu idea en un mensaje — ¿qué te gustaría mejorar o añadir al bot?

    La transmitiré al autor del proyecto.
  idea_thanks: |
    🙏 <b>¡Gracias!</b>

    Tu idea ha sido recibida. El autor seguramente la leerá.

  bug_prompt: |
    🐞 <b>Reportar un problema</b>

    Describe qué no funciona o funciona de forma extraña. Cuenta lo más detalladamente posible — qué hacías, qué esperabas, qué pasó.
  bug_thanks: |
    🙏 <b>¡Gracias!</b>

    Reporte recibido. Trataré de arreglarlo lo antes posible.

  review_prompt: |
    😊 <b>Dejar una reseña</b>

    Cuenta en uno o dos mensajes qué te gusta del bot o qué te ha tocado.

    Tu reseña es un verdadero apoyo para el proyecto 🙏
  review_thanks: |
    ❤️ <b>¡Gracias por tu reseña!</b>

    Esto significa mucho para el proyecto.

    Si quieres — puedes apoyar el proyecto para que crezca y ayude a más personas:

  cancel: "← Cancelar"
  cancelled: "Cancelado"
  too_short: "Tu mensaje es demasiado corto. Por favor escribe un poco más de detalle."
  support_button: "❤️ Apoyar el proyecto"
  later_button: "Más tarde"