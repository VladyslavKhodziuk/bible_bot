  cabinet_bug: "🐞 Повідомити про проблему"
  cabinet_review: "😊 Залишити відгук"

  idea_prompt: |
    💡 <b>Запропонувати ідею</b>

    Напиши свою ідею одним повідомленням — що хочеться покращити або додати в боті?

    Я передам її автору проєкту.
  idea_thanks: |
    🙏 <b>Дякую!</b>

    Твою ідею отримано. Автор обов'язково її прочитає.

  bug_prompt: |
    🐞 <b>Повідомити про проблему</b>

    Опиши, що не працює або працює дивно. Розкажи якомога детальніше — що ти робив, що очікував, що сталося.
  bug_thanks: |
    🙏 <b>Дякую!</b>

    Повідомлення про проблему отримано. Постараюся виправити якомога швидше.

  review_prompt: |
    😊 <b>Залишити відгук</b>

    Розкажи в одному-двох повідомленнях, що тобі подобається в боті або що тебе зворушило.

    Твій відгук — це підтримка для проєкту 🙏
  review_thanks: |
    ❤️ <b>Дякую за відгук!</b>

    Це дуже цінно для проєкту.

    Якщо хочеш — можеш підтримати проєкт, щоб він зростав і допомагав ще більшій кількості людей:

  cancel: "← Скасувати"
  cancelled: "Скасовано"
  too_short: "Повідомлення занадто коротке. Напиши, будь ласка, трохи детальніше."
  support_button: "❤️ Підтримати проєкт"
  later_button: "Пізніше"