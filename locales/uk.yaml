    🔥 <b>Твоя серія розпочалася!</b>

    Кожен день, коли ти читаєш вірш дня або відкриваєш розділ Біблії — день зараховується. Так формується звичка повертатися до Письма щодня.

    🛡 У тебе є <b>2 заморозки</b> — вони захистять серію, якщо ти пропустиш день. Захист спрацює автоматично. Заморозки поповнюються в міру зростання серії.

    Не здавайся, я поруч 🙏
