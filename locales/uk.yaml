  indicator: "🔥 {days} дн. поспіль"
  indicator_single: "🔥 1 день зі Словом"
  none: ""
  onboarding: |
    🔥 <b>Твоя серія розпочалася!</b>

    Кожен день, коли ти читаєш вірш дня або відкриваєш розділ Біблії — день зараховується. Так формується звичка повертатися до Письма щодня.

    🛡 У тебе є <b>2 заморозки</b> — вони захистять серію, якщо ти пропустиш день. Захист спрацює автоматично. Заморозки поповнюються в міру зростання серії.

    Не здавайся, я поруч 🙏
  onboarding_button: "Зрозуміло 🙌"
  freeze_used: |
    🛡 <b>Доброго ранку, {name}!</b>

    Учора ти пропустив день — я використав одну заморозку, щоб зберегти твою серію.
    🔥 Серія: <b>{streak} дн.</b>
    🛡 Заморозок залишилося: <b>{freezes}</b>

    Не втрачай ритму — Слово чекає на тебе.
  encouragement: |
    🕊 <b>Привіт, {name}.</b>

    Я помітив, що нас не було якийсь час. Це нормально — життя сповнене обставин.

    Бог не лічить дні. Він просто радіє кожному твоєму поверненню.

    Почнемо знову? 🙏
  milestones:
    "3": "🎉 Три дні поспіль зі Словом! Звичка починається."
    "7": "🔥 Цілий тиждень! Це вже ритм життя."
