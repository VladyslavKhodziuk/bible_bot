welcome:
  text: |
    Мир тобі, {name}! 🕊️

    Я — <b>Bible Way</b>, твій помічник у читанні Святого Письма.

    Ось що я вмію:

    📖 Читати Біблію різними перекладами
    🔍 Шукати вірші за словами й темами
    💭 Підбирати Слово для будь-якої життєвої ситуації
    ⭐ Зберігати улюблені місця
    📅 Надсилати вірш дня щоранку
    📚 Вести за планом читання
    🎨 Створювати красиві картки з віршами, щоб ділитися з близькими

    <i>«Слово Твоє — то світильник для моєї ноги, то світло для стежки моєї» (Псалом 118:105)</i>

    Готовий розпочати? 👇
  button: "📖 Відкрити меню"

