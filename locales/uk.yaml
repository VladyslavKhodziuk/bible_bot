donate:
  # Головний екран
  title: |
    ❤️ <b>Підтримати проєкт</b>

    Цей бот створений, щоб Слово Боже було доступне кожному. Він безкоштовний і таким залишиться назавжди.

    Ваша підтримка допомагає:
    – Оплачувати сервери
    – Розвивати нові функції
    – Робити бота доступнішим

  # Кнопки головного екрана
  stars_button: "⭐ Підтримати зірками Telegram"
  buymeacoffee_button: "☕ Buy Me a Coffee"
  crypto_button: "🪙 Криптовалютою"
  paypal_button: "💳 PayPal"
  where_button: "📊 Куди йдуть кошти"

  # Екран вибору суми Stars
  choose_amount: "⭐ <b>Оберіть суму підтримки:</b>"
  preset_label: "{amount} ⭐ (≈ ${usd})"
  custom_amount: "🎨 Інша сума"

  # FSM: введення довільної суми
  enter_amount: |
    Введіть кількість зірок (від {min} до {max}):
  invalid_amount: "⚠️ Введіть ціле число від {min} до {max}."

  # Invoice
  invoice_title: "Підтримка Bible Way"
  invoice_description: "Підтримка проєкту Bible Way — {amount} ⭐"

  # Після оплати
  thanks: |
    🙏 <b>Дякуємо за підтримку!</b>

    Ваш внесок ({amount} ⭐) дуже цінний. Завдяки вам Слово Боже стає доступнішим.

    Бог бачить вашу щедрість ❤️

  # Екран «Куди йдуть кошти»
  where_title: |
    📊 <b>Куди йдуть кошти</b>

    🖥 <b>Сервери та інфраструктура</b>
    Хостинг, база даних, резервні копії — щоб бот працював стабільно 24/7.

    ⚙️ <b>Розробка</b>
    Нові функції, переклади, покращення пошуку — щоб бот ставав кориснішим.

    🌍 <b>Доступність</b>
    Підтримка нових мов і перекладів Біблії.

    💡 Усі кошти йдуть на розвиток проєкту. Бот створений однією людиною з вірою та любов'ю.

  # Навігація
  back: "← Назад"
  cancel: "← Скасувати"

